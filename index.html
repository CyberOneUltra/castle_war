// Fit canvas to viewport with correct aspect ratio (no object-fit)
function resizeCanvas() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const scale = Math.min(vw / W, vh / H);
  const cw = Math.floor(W * scale), ch = Math.floor(H * scale);
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
  canvas.style.left = Math.floor((vw - cw) / 2) + 'px';
  canvas.style.top = Math.floor((vh - ch) / 2) + 'px';
}
window.addEventListener('resize', resizeCanvas);

menuBgImg.onload = () => { menuBgReady = true; };

function drawMenuBg() {
  if (menuBgReady) {
    // Cover mode: scale to fill canvas, crop overflow
    const iw = menuBgImg.naturalWidth, ih = menuBgImg.naturalHeight;
    const scale = Math.max(W / iw, H / ih);
    const dw = iw * scale, dh = ih * scale;
    ctx.drawImage(menuBgImg, (W - dw) / 2, (H - dh) / 2, dw, dh);
  } else {
    // Fallback gradient while loading
    const grad = ctx.createLinearGradient(0, 0, W, H);
    grad.addColorStop(0, '#080818');
    grad.addColorStop(0.5, '#0d0d28');
    grad.addColorStop(1, '#060612');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }
}

// ── Audio System (Web Audio API) ──
let audioCtx = null;
const audioBuffers = {};
const SPELL_VOICE = {
  fireball: 'https://cdn.jsdelivr.net/gh/CyberOneUltra/castle_war@main/voice/1_fire.mp3',
  heal:     'https://cdn.jsdelivr.net/gh/CyberOneUltra/castle_war@main/voice/2_cure.mp3',
  freeze:   'https://cdn.jsdelivr.net/gh/CyberOneUltra/castle_war@main/voice/3_freeze.mp3',
  lightning:'https://cdn.jsdelivr.net/gh/CyberOneUltra/castle_war@main/voice/4_ligthing.mp3',
  gargoyle: 'https://cdn.jsdelivr.net/gh/CyberOneUltra/castle_war@main/voice/5_defense.mp3',
  doomsday: 'https://cdn.jsdelivr.net/gh/CyberOneUltra/castle_war@main/voice/6_raid.mp3'
};
let openingBuffer = null;
let openingSource = null;

// Fallback Audio objects (for file:// protocol)
const fallbackAudios = {};
let fallbackOpening = null;
let audioSetupDone = false;

async function unlockAudio() {
  if (audioSetupDone) return;
  audioSetupDone = true;
  // Try Web Audio API via fetch first (works on HTTP/HTTPS)
  let webAudioOk = false;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const resp = await fetch('https://cdn.jsdelivr.net/gh/CyberOneUltra/castle_war@main/voice/1_fire.mp3');
    if (resp.ok) {
      for (const [id, src] of Object.entries(SPELL_VOICE)) {
        try {
          const r = await fetch(src);
          const buf = await r.arrayBuffer();
          audioBuffers[id] = await audioCtx.decodeAudioData(buf);
        } catch (e) { console.warn('Load fail:', src); }
      }
      try {
        const r = await fetch('https://cdn.jsdelivr.net/gh/CyberOneUltra/castle_war@main/voice/opening.mp3');
        const buf = await r.arrayBuffer();
        openingBuffer = await audioCtx.decodeAudioData(buf);
      } catch (e) {}
      webAudioOk = Object.keys(audioBuffers).length > 0;
    }
  } catch (e) {}
  if (webAudioOk) return;
  // Fallback: file:// or fetch failed → use new Audio() (created in user gesture)
  audioCtx = null;
  for (const [id, src] of Object.entries(SPELL_VOICE)) {
    const a = new Audio(src);
    a.preload = 'auto';
    a.volume = 0.9;
    fallbackAudios[id] = a;
  }
  fallbackOpening = new Audio('https://cdn.jsdelivr.net/gh/CyberOneUltra/castle_war@main/voice/opening.mp3');
  fallbackOpening.preload = 'auto';
  fallbackOpening.volume = 0.8;
}

function playBuffer(buffer, volume, useMusicVolume) {
  if (!audioCtx || !buffer) return;
  const source = audioCtx.createBufferSource();
  const gain = audioCtx.createGain();
  source.buffer = buffer;
  gain.gain.value = volume * ((useMusicVolume ? musicVolume : sfxVolume) / 100);
  source.connect(gain);
  gain.connect(audioCtx.destination);
  source.start(0);
  return source;
}

async function playVoice(spellId) {
  if (!audioCtx && !fallbackAudios[spellId]) await unlockAudio();
  if (audioCtx) {
    playBuffer(audioBuffers[spellId], 0.9);
  } else {
    const a = fallbackAudios[spellId];
    if (a) { a.currentTime = 0; a.volume = 0.9 * (sfxVolume / 100); a.play().catch(() => {}); }
  }
}

function playOpening() {
  if (audioCtx) {
    openingSource = playBuffer(openingBuffer, 0.8, true);
  } else if (fallbackOpening) {
    fallbackOpening.currentTime = 0;
    fallbackOpening.volume = 0.8 * (musicVolume / 100);
    fallbackOpening.play().catch(() => {});
    openingSource = fallbackOpening; // reuse for stop
  }
}

function stopOpening() {
  if (audioCtx && openingSource) {
    try { openingSource.stop(); } catch(e) {}
    openingSource = null;
  } else if (fallbackOpening) {
    fallbackOpening.pause();
    fallbackOpening.currentTime = 0;
  }
}

// ============================================================
//  BGM System — 淡入淡出 + 同曲循环间隔2秒
// ============================================================
const BGM_FADE_DURATION = 1.5; // 淡入淡出时长(秒)
const BGM_LOOP_GAP = 2.0;      // 同曲循环间隔(秒)
const BGM_MAX_VOLUME = 0.5;    // BGM最大音量基准
function BGM_VOLUME() { return BGM_MAX_VOLUME * (musicVolume / 100); }

// 实时同步BGM音量（滑块变化时调用）
function syncBgmVolume() {
  const audio = currentBgm ? bgmAudio[currentBgm] : null;
  if (audio && !bgmFading) {
    audio.volume = BGM_VOLUME();
  }
}

const bgmAudio = {
  menu:   new Audio('https://cdn.jsdelivr.net/gh/CyberOneUltra/castle_war@main/music/menu_bgm.mp3'),
  battle: new Audio('https://cdn.jsdelivr.net/gh/CyberOneUltra/castle_war@main/music/battle_bgm.mp3'),
  boss:   new Audio('https://cdn.jsdelivr.net/gh/CyberOneUltra/castle_war@main/music/boss_bgm.mp3')
};
// 预加载 & 循环设为false(我们手动控制循环间隔)
for (const a of Object.values(bgmAudio)) {
  a.preload = 'auto';
  a.loop = false;
  a.volume = 0;
}

let currentBgm = null;    // 当前正在播放的BGM名称: 'menu'|'battle'|'boss'|null
let bgmFading = false;    // 是否正在淡出
let bgmFadeTimer = null;  // 淡出interval id
let bgmLoopTimer = null;  // 循环间隔timeout id

// 停止所有BGM的淡出/循环定时器
function clearBgmTimers() {
  if (bgmFadeTimer) { clearInterval(bgmFadeTimer); bgmFadeTimer = null; }
  if (bgmLoopTimer) { clearTimeout(bgmLoopTimer); bgmLoopTimer = null; }
}

// 淡出当前BGM，完成后回调
function bgmFadeOut(callback) {
  const audio = currentBgm ? bgmAudio[currentBgm] : null;
  if (!audio || audio.paused) {
    currentBgm = null;
    if (callback) callback();
    return;
  }
  clearBgmTimers();
  bgmFading = true;
  const startVol = audio.volume;
  const steps = 20;
  const interval = (BGM_FADE_DURATION * 1000) / steps;
  let step = 0;
  bgmFadeTimer = setInterval(() => {
    step++;
    audio.volume = Math.max(0, startVol * (1 - step / steps));
    if (step >= steps) {
      clearInterval(bgmFadeTimer);
      bgmFadeTimer = null;
      audio.pause();
      audio.currentTime = 0;
      audio.volume = 0;
      bgmFading = false;
      currentBgm = null;
      if (callback) callback();
    }
  }, interval);
}

// 淡入指定BGM
function bgmFadeIn(name) {
  const audio = bgmAudio[name];
  if (!audio) return;
  clearBgmTimers();
  audio.currentTime = 0;
  audio.volume = 0;
  audio.play().catch(() => {});
  currentBgm = name;
  const steps = 20;
  const interval = (BGM_FADE_DURATION * 1000) / steps;
  let step = 0;
  bgmFadeTimer = setInterval(() => {
    step++;
    const maxVol = BGM_VOLUME();
    audio.volume = Math.min(maxVol, maxVol * (step / steps));
    if (step >= steps) {
      clearInterval(bgmFadeTimer);
      bgmFadeTimer = null;
    }
  }, interval);
  // 同曲循环：播放结束后间隔2秒再播放
  audio.onended = () => {
    if (currentBgm !== name) return;
    audio.currentTime = 0;
    audio.volume = 0;
    bgmLoopTimer = setTimeout(() => {
      if (currentBgm !== name) return;
      audio.play().catch(() => {});
      // 淡入
      let s = 0;
      bgmFadeTimer = setInterval(() => {
        s++;
        const maxVol2 = BGM_VOLUME();
        audio.volume = Math.min(maxVol2, maxVol2 * (s / steps));
        if (s >= steps) {
          clearInterval(bgmFadeTimer);
          bgmFadeTimer = null;
        }
      }, interval);
    }, BGM_LOOP_GAP * 1000);
  };
}

// 切换BGM（带交叉淡入淡出）
function switchBgm(name) {
  if (currentBgm === name && !bgmFading) return; // 已经在播了
  if (currentBgm === name) return;
  bgmFadeOut(() => {
    if (name) bgmFadeIn(name);
  });
}

// 停止所有BGM
function stopAllBgm() {
  clearBgmTimers();
  for (const a of Object.values(bgmAudio)) {
    a.pause();
    a.currentTime = 0;
    a.volume = 0;
    a.onended = null;
  }
  currentBgm = null;
}

// ============================================================
//  VOLUME SETTINGS (persistent)
// ============================================================
let musicVolume = 80; // 0~100
let sfxVolume = 80;   // 0~100

function loadVolumeSettings() {
  try {
    const v = JSON.parse(localStorage.getItem('castleWarVolume'));
    if (v && typeof v.music === 'number' && typeof v.sfx === 'number') {
      musicVolume = Math.max(0, Math.min(100, v.music));
      sfxVolume = Math.max(0, Math.min(100, v.sfx));
      syncBgmVolume();
    }
  } catch(e) {}
}

function saveVolumeSettings() {
  try {
    localStorage.setItem('castleWarVolume', JSON.stringify({ music: musicVolume, sfx: sfxVolume }));
  } catch(e) {}
}

function loadSave() {
  // Try localStorage first
  try {
    const d = JSON.parse(localStorage.getItem('castleWarSave'));
    if (d && d.unlockedLevels) return d;
  } catch(e) {}
  // Try cookie fallback
  try {
    const match = document.cookie.match(/castleSave=([^;]+)/);
    if (match) {
      const d = JSON.parse(decodeURIComponent(escape(atob(match[1]))));
      if (d && d.unlockedLevels) {
        localStorage.setItem('castleWarSave', JSON.stringify(d));
        return d;
      }
    }
  } catch(e) {}
  return defaultSave();
}

function defaultSave() {
  return {
    unlockedLevels: ['1-1'],
    stars: {},
    gold: 0,
    permanentUpgrades: { weapon: 0, armor: 0, training: 0, spellMastery: 0, repairTech: 0 },
    unlockedUnits: ['militia', 'archer']
  };
}

function saveToDisk() {
  const json = JSON.stringify(saveData);
  localStorage.setItem('castleWarSave', json);
  // Cookie backup
  try { document.cookie = `castleSave=${btoa(unescape(encodeURIComponent(json)))};max-age=31536000;path=/`; } catch(e) {}
}

function getSaveSlots() {
  try {
    const slots = JSON.parse(localStorage.getItem('castleWarSaveSlots'));
    if (Array.isArray(slots) && slots.length === 3) return slots;
  } catch(e) {}
  return [null, null, null];
}

function writeSaveSlots(slots) {
  localStorage.setItem('castleWarSaveSlots', JSON.stringify(slots));
}

function saveToSlot(slotIndex) {
  const slots = getSaveSlots();
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const timeStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  slots[slotIndex] = {
    timestamp: timeStr,
    data: JSON.parse(JSON.stringify(saveData)),
    levelCount: saveData.unlockedLevels.length,
    gold: saveData.gold
  };
  writeSaveSlots(slots);
}

function loadFromSlot(slotIndex) {
  const slots = getSaveSlots();
  if (slots[slotIndex] && slots[slotIndex].data) {
    saveData = slots[slotIndex].data;
    saveToDisk();
    return true;
  }
  return false;
}

function deleteSlot(slotIndex) {
  const slots = getSaveSlots();
  slots[slotIndex] = null;
  writeSaveSlots(slots);
}

function exportSave() {
  const data = {
    main: saveData,
    slots: getSaveSlots()
  };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'castle_war_save.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importSave() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.main && data.main.unlockedLevels) {
          saveData = data.main;
          saveToDisk();
          if (data.slots && Array.isArray(data.slots)) {
            writeSaveSlots(data.slots);
          }
          alert('存档导入成功！');
        } else {
          alert('文件格式不对，这不是游戏存档文件。');
        }
      } catch(err) {
        alert('读取文件失败：' + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function getUnlockedSpells() {
  const spells = [];
  for (const sp of SPELLS) {
    const lvlIdx = LEVELS.findIndex(l => l.id === sp.unlock);
    const currentIdx = LEVELS.findIndex(l => saveData.unlockedLevels.includes(l.id));
    // Unlock if the level or any later level is unlocked
    if (saveData.unlockedLevels.includes(sp.unlock)) spells.push(sp.id);
  }
  if (spells.length === 0) spells.push('fireball'); // Always have fireball if 1-1 unlocked
  return spells;
}

// ============================================================
//  BATTLE STATE
// ============================================================

function createBattle(levelId) {
  const level = LEVELS.find(l => l.id === levelId);
  if (!level) return null;
  const diff = DIFFICULTY_PARAMS[level.difficulty];
  const colors = COLORS[level.difficulty];

  const permBonus = saveData.permanentUpgrades;
  const atkMult = 1 + PERMANENT_UPGRADES[0].values[(permBonus.weapon||1)-1] || 1;
  const hpMult = 1 + PERMANENT_UPGRADES[1].values[(permBonus.armor||1)-1] || 1;
  const trainMult = 1 - (PERMANENT_UPGRADES[2].values[(permBonus.training||1)-1] || 0);
  const cdMult = 1 - (PERMANENT_UPGRADES[3].values[(permBonus.spellMastery||1)-1] || 0);

  const b = {
    level, diff, colors,
    time: 0,
    maxTime: level.boss ? 1200 : 600, // Boss关20分钟，普通关10分钟
    gameOver: false,
    result: null,
    gold: 120,
    mana: 30,
    maxMana: 100,
    goldPerSec: CASTLE_MODULES.goldGen.values[0] * diff.goldMult,
    manaPerSec: CASTLE_MODULES.manaGen.values[0] * diff.manaMult,

    // Castle
    playerCastle: {
      wallHp: CASTLE_MODULES.wall.values[0],
      wallMaxHp: CASTLE_MODULES.wall.values[0],
      towerDps: CASTLE_MODULES.tower.values[0],
      towerRange: 300,
      modules: { wall: 0, tower: 0, goldGen: 0, manaGen: 0 }
    },
    aiCastle: {
      wallHp: CASTLE_MODULES.wall.values[0] * (level.wallMult || 1),
      wallMaxHp: CASTLE_MODULES.wall.values[0] * (level.wallMult || 1),
      towerDps: CASTLE_MODULES.tower.values[1],
      towerRange: 300,
      modules: { wall: 1, tower: 1, goldGen: 1, manaGen: 1 },
      towers: level.boss && level.wallMult >= 2 ? (level.finalBoss ? 3 : 2) : 1
    },

    // Units
    playerUnits: [],
    aiUnits: [],
    projectiles: [],
    effects: [],
    nextUnitId: 1,

    // Training queue
    trainQueue: [],

    // Unit upgrades (in-match)
    unitUpgrades: {},

    // AI state
    aiGold: diff.aiGold,
    aiMana: 15 * diff.manaMult,
    aiGoldPerSec: CASTLE_MODULES.goldGen.values[1] * diff.goldMult,
    aiManaPerSec: CASTLE_MODULES.manaGen.values[0] * diff.manaMult,
    aiDecisionTimer: 0,
    aiSpellCooldowns: {},
    aiUnitUpgrades: {},
    aiLastPlayerUnits: {},

    // Terrain
    terrain: level.terrain,
    terrainEvents: [],
    terrainTimer: 0,

    // Raid waves (nightmare)
    raidTimer: 0,
    raidActive: false,

    // Mine points
    mines: [],
    poisonFogLeft: BATTLEFIELD.left,
    poisonFogRight: BATTLEFIELD.right,

    // Stats for star rating
    startTime: 0,

    // Permanent bonuses
    atkMult, hpMult, trainMult, cdMult,

    // Unlocked spells for this level
    availableSpells: getUnlockedSpells(),

    // Initial CD for doomsday (奇袭): 5 minutes
    player_doomsday: 300,

    // Tutorial
    tutorialStep: 0,
    tutorialShown: false,

    // Screen shake
    shakeTimer: 0,
    shakeIntensity: 0,

    // Pause
    paused: false,

    // Speed multiplier (x1 / x2 / x3)
    speedMult: 1,

    // Sub-tower (2-4)
    subTower: null,

    // Vision fog (3-1)
    visionFog: level.terrain === 'fog',

    // Anime-style skill banner
    skillBanner: null,

    // Boss system
    boss: null,         // { unit, type, maxHp, abilities, phase, phaseSummoned, entranceTimer, dying }
    bossDefeated: false,
    bossEntranceDone: false,

    // Castle destroyed animation flag
    aiCastleDestroyed: false,

    // Castle repair system
    repairActive: false,
    repairTimer: 0,      // remaining seconds of current repair
    repairDuration: 10,  // base duration (modified by upgrade)
    repairCooldown: 0,   // cooldown timer in seconds
    repairCooldownMax: 120
  };

  // Setup mines
  if (level.terrain === 'mine') {
    b.mines = [{ x: 600, owner: null, timer: 0 }];
  } else if (level.terrain === 'dualMine') {
    b.mines = [{ x: 400, owner: null, timer: 0 }, { x: 800, owner: null, timer: 0 }];
  }

  // Setup sub-tower
  if (level.terrain === 'subTower') {
    b.subTower = { x: 1050, hp: 500, maxHp: 500, dps: 15, range: 250 };
  }

  // Initialize rolling counter display values
  displayGold = b.gold;
  displayMana = b.mana;

  return b;
}

// ============================================================
//  UNIT CREATION
// ============================================================

function createUnit(type, team, b) {
  const base = UNIT_TYPES[type];
  const diff = b.diff;
  const isPlayer = team === 'player';
  const startX = isPlayer ? BATTLEFIELD.left + 10 : BATTLEFIELD.right - 10;
  const dir = isPlayer ? 1 : -1;

  let hp = base.hp * b.hpMult;
  let atk = base.atk * b.atkMult;
  let spd = base.spd;
  let range = base.range;
  let aoeRadius = base.aoeRadius || 0;
  let siegeMult = base.siegeMultiplier || 1;

  // Apply difficulty bonuses for AI
  if (!isPlayer) {
    hp *= (1 + diff.hpBonus);
    atk *= (1 + diff.atkBonus);
  }

  // Apply in-match unit upgrades
  const upgrades = isPlayer ? b.unitUpgrades : b.aiUnitUpgrades;
  if (upgrades[type]) {
    const branch = UPGRADE_BRANCHES[type][upgrades[type]];
    if (branch) {
      hp = (branch.hp || base.hp) * (isPlayer ? b.hpMult : (1 + diff.hpBonus));
      atk = (branch.atk || base.atk) * (isPlayer ? b.atkMult : (1 + diff.atkBonus));
      if (branch.spd) spd = branch.spd;
      if (branch.range) range = branch.range;
      if (branch.aoeRadius) aoeRadius = branch.aoeRadius;
    }
  }

  const unit = {
    id: b.nextUnitId++,
    type, team, dir, baseDir: dir,
    x: startX,
    y: 300 + Math.random() * 200,
    hp, maxHp: hp,
    atk, spd, range,
    aoeRadius, siegeMult,
    state: 'walk', // walk, attack, die, idle
    stateTimer: 0,
    attackCooldown: 0,
    animFrame: 0,
    animTimer: 0,
    branch: upgrades[type] || null,
    flying: base.flying || false,
    // Special states
    frozen: 0,
    burning: 0,
    burnDps: 0,
    ashBurn: 0,
    ashBurnTick: 0,
    slowed: 0,
    slowAmount: 0,
    paralyzed: 0,
    paralyzeAmount: 0,
    frightened: 0,
    stealth: 0,
    shield: 0,
    // Knight charge
    charged: false,
    chargeTimer: 0,
    // Assassin
    firstAttack: true,
    killCount: 0,
    // Giant death obstacle
    isObstacle: false,
    obstacleTimer: 0
  };

  // Branch-specific init
  if (type === 'assassin' && !unit.branch) {
    unit.stealth = 3;
  }
  if (type === 'assassin' && unit.branch === 'A') {
    unit.stealth = 3;
  }
  if (type === 'knight' && !unit.charged) {
    unit.charged = false;
  }

  return unit;
}

// ============================================================
//  COMBAT SYSTEM
// ============================================================

function findTarget(unit, enemies) {
  let best = null;
  let bestDist = Infinity;
  const unitDef = UNIT_TYPES[unit.type];
  const isMelee = unitDef && unitDef.type === 'melee';
  for (const e of enemies) {
    if (e.state === 'die' || e.hp <= 0) continue;
    if (e.stealth > 0 && unit.team !== e.team) continue;
    // 近战单位（非boss）无法攻击飞行单位
    if (e.flying && isMelee && !unit.isBoss) continue;
    const dx = e.x - unit.x, dy = e.y - unit.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < bestDist && dist <= unit.range) {
      bestDist = dist;
      best = e;
    }
  }
  return best;
}

function findNearestEnemy(unit, enemies) {
  let best = null;
  let bestDist = Infinity;
  for (const e of enemies) {
    if (e.state === 'die' || e.hp <= 0) continue;
    if (e.stealth > 0 && unit.team !== e.team) continue;
    const dx = e.x - unit.x, dy = e.y - unit.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < bestDist) {
      bestDist = dist;
      best = e;
    }
  }
  return best;
}

// 找到靠近城堡的敌方单位（用于触发防御响应）
function findCastleThreat(unit, b) {
  const isPlayer = unit.team === 'player';
  const castleX = isPlayer ? BATTLEFIELD.left : BATTLEFIELD.right;
  const castleThreatZone = 130; // 敌人进入城堡前方130px内视为威胁
  const defenseRangeX = 170;    // 响应防御的最大X轴距离
  const enemies = isPlayer ? b.aiUnits : b.playerUnits;

  let nearestThreat = null;
  let nearestDist = Infinity;
  for (const e of enemies) {
    if (e.state === 'die' || e.hp <= 0) continue;
    // 判断敌人是否在城堡附近
    const nearCastle = isPlayer ? (e.x < castleX + castleThreatZone) : (e.x > castleX - castleThreatZone);
    if (!nearCastle) continue;
    // 用X轴距离判断该单位是否在响应范围内（Y轴距离不影响防御响应）
    const xDist = Math.abs(e.x - unit.x);
    if (xDist < defenseRangeX && xDist < nearestDist) {
      nearestDist = xDist;
      nearestThreat = e;
    }
  }
  return nearestThreat;
}

function dealDamage(attacker, target, b, isCrit = false) {
  let dmg = attacker.atk;
  // 斗志昂扬 ATK buff
  if (attacker.fightSpirit > 0) dmg *= (attacker.fightSpiritAtkMult || 1);
  if (isCrit) dmg *= 2;

  // Knight charge bonus
  if (attacker.type === 'knight' && !attacker.charged) {
    const mult = attacker.branch === 'B' ? 3 : 2;
    dmg *= mult;
    attacker.charged = true;
    if (attacker.branch === 'B') attacker.chargeTimer = 3;
  }

  // Siege multiplier
  if (target.isCastle) dmg *= (attacker.siegeMult || 1);
  if (attacker.branch === 'B' && attacker.type === 'mage' && target.isCastle) dmg *= 1.5;
  if ((attacker.branch === 'B' || attacker.type === 'dragon') && target.isCastle && attacker.branch === 'B') dmg *= 2;

  // Shield
  if (target.shield > 0) {
    const absorbed = Math.min(target.shield, dmg);
    target.shield -= absorbed;
    dmg -= absorbed;
  }

  // Branch A militia damage reduction
  if (target.branch === 'A' && target.type === 'militia' && attacker.type !== 'mage') {
    dmg *= 0.75;
  }

  // Giant damage reduction
  if (target.branch === 'A' && target.type === 'giant') {
    dmg *= 0.75;
  }

  // Assassin dodge
  if (target.branch === 'A' && target.type === 'assassin' && Math.random() < 0.25) {
    b.effects.push({ type: 'text', text: '闪避!', x: target.x, y: target.y - 20, timer: 1, color: '#fff' });
    return;
  }

  target.hp -= dmg;

  // Ash Brand retaliation: melee attackers get burned if boss has ashBrand active
  if (target.isBoss && b.boss && b.boss.ashBrand > 0 && attacker.team === 'player' && !attacker.ashBurn && UNIT_TYPES[attacker.type] && UNIT_TYPES[attacker.type].type === 'melee') {
    const retalAb = b.boss.type.abilities.find(a => a.type === 'retaliation');
    attacker.ashBurn = retalAb ? retalAb.burnDur : 8;
    attacker.ashBurnTick = 0;
    b.effects.push({ type: 'text', text: '🔥烙印!', x: attacker.x, y: attacker.y - 25, timer: 1, color: '#ff6622' });
  }

  // Berserker lifesteal
  if (attacker.branch === 'B' && attacker.type === 'militia' && target.hp <= 0) {
    attacker.hp = Math.min(attacker.maxHp, attacker.hp + 10);
  }

  // Blood assassin kill stacking
  if (attacker.branch === 'B' && attacker.type === 'assassin' && target.hp <= 0) {
    attacker.atk += 10;
    attacker.killCount++;
  }

  // Blood assassin crit
  if (attacker.branch === 'B' && attacker.type === 'assassin' && attacker.firstAttack) {
    // Already handled in dealDamage call
  }

  // Visual
  b.effects.push({ type: 'hit', x: target.x, y: target.y - 15, timer: 0.3 });

  return dmg;
}

function updateCombat(unit, b, dt) {
  if (unit.state === 'die') return;

  // Frozen
  if (unit.frozen > 0) {
    unit.frozen -= dt;
    // Freeze damage tick (e.g. 3hp every 2s)
    if (unit.freezeDmg > 0 && unit.freezeDmgInterval > 0) {
      unit.freezeDmgTick = (unit.freezeDmgTick || 0) + dt;
      if (unit.freezeDmgTick >= unit.freezeDmgInterval) {
        unit.freezeDmgTick -= unit.freezeDmgInterval;
        unit.hp -= unit.freezeDmg;
        b.effects.push({ type: 'hit', x: unit.x, y: unit.y - 15, timer: 0.3, color: '#88ccff' });
        if (unit.hp <= 0) {
          unit.state = 'die';
          unit.stateTimer = 0.5;
          return;
        }
      }
    }
    unit.state = 'idle';
    return;
  }

  // Burning DOT
  if (unit.burning > 0) {
    unit.burning -= dt;
    unit.hp -= unit.burnDps * dt;
    if (unit.hp <= 0) {
      unit.state = 'die';
      unit.stateTimer = 0.5;
      return;
    }
  }

  // Ash Brand burn DOT (8 dmg every 2s, non-stackable)
  if (unit.ashBurn > 0) {
    unit.ashBurn -= dt;
    unit.ashBurnTick += dt;
    if (unit.ashBurnTick >= 2) {
      unit.ashBurnTick -= 2;
      unit.hp -= 8;
      b.effects.push({ type: 'hit', x: unit.x, y: unit.y, timer: 0.3 });
      if (unit.hp <= 0) {
        unit.state = 'die';
        unit.stateTimer = 0.5;
        return;
      }
    }
  }

  // 斗志昂扬 buff timer
  if (unit.fightSpirit > 0) {
    unit.fightSpirit -= dt;
    if (unit.fightSpirit <= 0) {
      unit.fightSpirit = 0;
      unit.fightSpiritAtkMult = 1;
      unit.fightSpiritSpdMult = 1;
    }
  }

  // Stealth timer
  if (unit.stealth > 0) {
    unit.stealth -= dt;
  }

  // Knight charge timer
  if (unit.chargeTimer > 0) {
    unit.chargeTimer -= dt;
    if (unit.chargeTimer <= 0) {
      unit.chargeTimer = 0;
    }
  }

  // Slow
  if (unit.slowed > 0) {
    unit.slowed -= dt;
  }

  // Paralysis timer (麻痹: 移速/攻速 -25%)
  if (unit.paralyzed > 0) {
    unit.paralyzed -= dt;
    if (unit.paralyzed <= 0) {
      unit.paralyzed = 0;
      unit.paralyzeAmount = 0;
    }
  }

  // Frighten timer (惊吓: 无法攻击)
  if (unit.frightened > 0) {
    unit.frightened -= dt;
    if (unit.frightened <= 0) {
      unit.frightened = 0;
    }
  }

  // Shield regen for holy knight
  if (unit.branch === 'A' && unit.type === 'knight' && unit.shield <= 0) {
    unit.shield = Math.min(100, unit.shield + 33 * dt); // Regen 100 in 3s
  }

  // Giant berserk mode
  if (unit.branch === 'B' && unit.type === 'giant' && unit.hp < unit.maxHp * 0.5) {
    unit.attackCooldown = Math.max(0, unit.attackCooldown - dt * 0.5);
  }

  // Determine enemies
  const enemies = unit.team === 'player' ? b.aiUnits : b.playerUnits;
  const target = findTarget(unit, enemies);

  if (target) {
    unit.state = 'attack';
    unit.attackCooldown -= dt;
    if (unit.attackCooldown <= 0) {
      // Attack
      const isCrit = unit.type === 'assassin' && unit.firstAttack;
      if (unit.aoeRadius > 0) {
        // AOE attack
        for (const e of enemies) {
          if (e.state === 'die') continue;
          const dx = e.x - target.x, dy = e.y - target.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist <= unit.aoeRadius) {
            dealDamage(unit, e, b, isCrit);
            // Mage branch effects
            if (unit.branch === 'A' && unit.type === 'mage') {
              e.slowed = 2;
              e.slowAmount = 0.4;
              if (Math.random() < 0.15) e.frozen = 1;
            }
            if (unit.branch === 'B' && unit.type === 'mage') {
              e.burning = 3;
              e.burnDps = 10;
            }
          }
        }
        // AOE visual
        b.effects.push({ type: 'aoe', x: target.x, y: target.y, radius: unit.aoeRadius, timer: 0.3, color: unit.branch === 'A' ? '#88ccff' : '#ff6633' });
      } else {
        dealDamage(unit, target, b, isCrit);
        // Archer burn
        if (unit.branch === 'B' && unit.type === 'archer') {
          target.burning = 3;
          target.burnDps = 5;
          b.effects.push({ type: 'aoe', x: target.x, y: target.y, radius: 40, timer: 0.3, color: '#ff6633' });
        }
      }
      unit.firstAttack = false;

      // Projectile visual for ranged
      if (unit.type === 'archer' || unit.type === 'mage' || unit.type === 'dragon' || unit.isGargoyle) {
        b.projectiles.push({
          x: unit.x, y: unit.y - 15,
          tx: target.x, ty: target.y - 15,
          speed: 400, timer: 0.5,
          color: unit.isGargoyle ? '#ffcc44' : unit.type === 'mage' ? '#aa44ff' : '#ffcc00',
          size: unit.isGargoyle ? 3 : 2
        });
      }

      // Attack speed
      let atkSpeed = 1.0;
      if (unit.branch === 'B' && unit.type === 'assassin') atkSpeed = 0.7;
      if (unit.branch === 'B' && unit.type === 'knight' && unit.chargeTimer > 0) atkSpeed = 0.5;
      if (unit.isGargoyle) atkSpeed = 0.8;
      // 麻痹 ATK speed debuff
      if (unit.paralyzed > 0) atkSpeed *= (1 + unit.paralyzeAmount);
      // 斗志昂扬 attack speed buff
      if (unit.fightSpirit > 0) atkSpeed /= (unit.fightSpiritSpdMult || 1);
      // 惊吓: 无法攻击 — set cooldown to Infinity
      if (unit.frightened > 0) {
        unit.attackCooldown = Infinity;
      } else {
        unit.attackCooldown = atkSpeed;
      }
    }
  } else {
    // Move
    unit.state = 'walk';
    let spd = unit.spd;
    if (unit.slowed > 0) spd *= (1 - unit.slowAmount);
    // 麻痹 SPD debuff
    if (unit.paralyzed > 0) spd *= (1 - unit.paralyzeAmount);
    // 斗志昂扬 SPD buff
    if (unit.fightSpirit > 0) spd *= (unit.fightSpiritSpdMult || 1);

    // === 城堡防御覆盖：检测是否有敌人靠近城堡 ===
    const castleThreat = findCastleThreat(unit, b);
    if (castleThreat) {
      // 有威胁：优先打威胁目标
      unit.dir = castleThreat.x < unit.x ? -1 : 1;
    } else {
      // 无威胁：恢复原始前进方向
      unit.dir = unit.baseDir;
    }

    // Terrain effects
    if (b.terrain === 'river' && !unit.flying) {
      // River in middle
      if (unit.x > 500 && unit.x < 700) spd *= 0.7;
    }
    // Bridge restricts
    if (b.terrain === 'bridge' && !unit.flying) {
      if (unit.x > 500 && unit.x < 700) {
        // Only 60px wide, units must be single file
        const inBridge = b.playerUnits.filter(u => u.x > 500 && u.x < 700 && u.state !== 'die')
          .concat(b.aiUnits.filter(u => u.x > 500 && u.x < 700 && u.state !== 'die'));
        if (inBridge.length > 2) spd *= 0.3;
      }
    }

    unit.x += unit.dir * spd * dt;

    // Steer toward nearest enemy on Y-axis when close on X-axis
    const nearest = findNearestEnemy(unit, enemies);
    if (nearest) {
      const xDist = Math.abs(nearest.x - unit.x);
      if (xDist < unit.range * 3) {
        const dy = nearest.y - unit.y;
        if (Math.abs(dy) > 2) {
          unit.y += Math.sign(dy) * Math.min(Math.abs(dy), spd * 0.6) * dt;
        }
      }
    }

    // Clamp to battlefield
    unit.x = Math.max(BATTLEFIELD.left - 10, Math.min(BATTLEFIELD.right + 10, unit.x));
    unit.y = Math.max(200, Math.min(600, unit.y));
  }

  // Attack castle if reached
  if (unit.team === 'player' && unit.x >= BATTLEFIELD.right - 20) {
    unit.state = 'attack';
    unit.attackCooldown -= dt;
    if (unit.attackCooldown <= 0) {
      let dmg = unit.atk * (unit.siegeMult || 1);
      if (unit.branch === 'B' && unit.type === 'mage') dmg *= 1.5;
      if (unit.branch === 'B' && unit.type === 'dragon') dmg *= 2;
      b.aiCastle.wallHp = Math.max(0, b.aiCastle.wallHp - dmg);
      b.effects.push({ type: 'hit', x: BATTLEFIELD.right - 10, y: 280, timer: 0.3 });
      unit.attackCooldown = 1.0;
    }
  }
  if (unit.team === 'ai' && unit.x <= BATTLEFIELD.left + 20) {
    // Check if there's a living gargoyle (圣像守卫) to absorb castle damage
    const gargoyleGuard = b.playerUnits.find(u => u.isGargoyle && u.state !== 'die');
    if (gargoyleGuard) {
      unit.state = 'attack';
      unit.attackCooldown -= dt;
      if (unit.attackCooldown <= 0) {
        gargoyleGuard.hp -= unit.atk * (unit.siegeMult || 1);
        b.effects.push({ type: 'hit', x: gargoyleGuard.x, y: gargoyleGuard.y - 15, timer: 0.3, color: '#ffcc44' });
        unit.attackCooldown = 1.0;
      }
    } else {
      unit.state = 'attack';
      unit.attackCooldown -= dt;
      if (unit.attackCooldown <= 0) {
        b.playerCastle.wallHp = Math.max(0, b.playerCastle.wallHp - unit.atk * (unit.siegeMult || 1));
        b.effects.push({ type: 'hit', x: BATTLEFIELD.left + 10, y: 280, timer: 0.3 });
        unit.attackCooldown = 1.0;
      }
    }
  }

  // Death
  if (unit.hp <= 0 && unit.state !== 'die') {
    unit.state = 'die';
    unit.stateTimer = 0.5;

    // Giant death obstacle
    if (unit.branch === 'A' && unit.type === 'giant') {
      unit.isObstacle = true;
      unit.obstacleTimer = 10;
    }

    // Dragon death explosion
    if (unit.branch === 'B' && unit.type === 'dragon') {
      b.effects.push({ type: 'aoe', x: unit.x, y: unit.y, radius: 100, timer: 0.5, color: '#ff4400' });
      for (const e of (unit.team === 'player' ? b.aiUnits : b.playerUnits)) {
        const dx = e.x - unit.x, dy = e.y - unit.y;
        if (Math.sqrt(dx * dx + dy * dy) < 100) e.hp -= 80;
      }
    }

    // Gold drop
    const goldDrop = 5 + Math.floor(Math.random() * 11);
    if (unit.team === 'ai') {
      b.gold += goldDrop;
      b.effects.push({ type: 'gold', text: `+${goldDrop}`, x: unit.x, y: unit.y - 30, timer: 1 });
    }
  }
}

// ============================================================
//  TOWER & ARROW SYSTEM
// ============================================================

function updateTowers(b, dt) {
  // Player tower
  const pTower = b.playerCastle;
  if (pTower.towerDps > 0) {
    let target = null;
    let minDist = pTower.towerRange;
    for (const u of b.aiUnits) {
      if (u.state === 'die') continue;
      const d = Math.abs(u.x - BATTLEFIELD.left);
      if (d < minDist) { minDist = d; target = u; }
    }
    if (target) {
      target.hp -= pTower.towerDps * dt;
      if (Math.random() < 0.1) {
        b.projectiles.push({
          x: BATTLEFIELD.left + 30, y: 220,
          tx: target.x, ty: target.y - 10,
          speed: 500, timer: 0.3, color: '#ffcc00'
        });
      }
    }
  }

  // AI towers
  const aiTowers = b.aiCastle.towers || 1;
  for (let t = 0; t < aiTowers; t++) {
    const towerX = BATTLEFIELD.right - 30 - t * 40;
    let target = null;
    let minDist = b.aiCastle.towerRange;
    for (const u of b.playerUnits) {
      if (u.state === 'die') continue;
      const d = Math.abs(u.x - towerX);
      if (d < minDist) { minDist = d; target = u; }
    }
    if (target) {
      target.hp -= b.aiCastle.towerDps * dt;
      if (Math.random() < 0.1) {
        b.projectiles.push({
          x: towerX, y: 220,
          tx: target.x, ty: target.y - 10,
          speed: 500, timer: 0.3, color: '#ff6644'
        });
      }
    }
  }

  // Sub-tower (2-4)
  if (b.subTower && b.subTower.hp > 0) {
    let target = null;
    let minDist = b.subTower.range;
    for (const u of b.playerUnits) {
      if (u.state === 'die') continue;
      const d = Math.abs(u.x - b.subTower.x);
      if (d < minDist) { minDist = d; target = u; }
    }
    if (target) {
      target.hp -= b.subTower.dps * dt;
      if (Math.random() < 0.08) {
        b.projectiles.push({
          x: b.subTower.x, y: 280,
          tx: target.x, ty: target.y - 10,
          speed: 450, timer: 0.3, color: '#ff8844'
        });
      }
    }
  }
}

// ============================================================
//  SPELL SYSTEM
// ============================================================

function castSpell(spellId, targetX, targetY, b, team) {
  const spell = SPELLS.find(s => s.id === spellId);
  if (!spell) return false;

  const isPlayer = team === 'player';
  const mana = isPlayer ? b.mana : b.aiMana;
  if (mana < spell.mana) return false;

  const cdKey = `${team}_${spellId}`;
  if (b[cdKey] && b[cdKey] > 0) return false;

  if (isPlayer) b.mana -= spell.mana;
  else b.aiMana -= spell.mana;
  b[cdKey] = spell.cd * b.cdMult;

  // Anime-style skill banner + voice (player spells only)
  if (isPlayer) {
    const spellIcons = { fireball: '🔥', heal: '💚', freeze: '❄️', lightning: '⚡', gargoyle: '🛡️', doomsday: '⚔️' };
    const spellColors = SPELL_COLORS;
    b.skillBanner = {
      name: spell.name,
      icon: spellIcons[spellId] || '✦',
      color: SPELL_COLORS[spellId] || '#ffcc00',
      timer: 2.0,
      duration: 2.0
    };
    playVoice(spellId);
  }

  const enemies = isPlayer ? b.aiUnits : b.playerUnits;
  const allies = isPlayer ? b.playerUnits : b.aiUnits;
  const castleX = isPlayer ? BATTLEFIELD.left : BATTLEFIELD.right;

  switch(spellId) {
    case 'fireball':
      b.effects.push({ type: 'fireball_explosion', x: targetX, y: targetY, radius: spell.radius, timer: 1.2 });
      for (const u of enemies) {
        if (u.state === 'die') continue;
        const dx = u.x - targetX, dy = u.y - targetY;
        if (Math.sqrt(dx * dx + dy * dy) < spell.radius) {
          u.hp -= spell.dmg;
          b.effects.push({ type: 'hit', x: u.x, y: u.y - 15, timer: 0.3 });
        }
      }
      b.shakeTimer = 0.35;
      b.shakeIntensity = 8;
      break;

    case 'heal':
      for (const u of allies) {
        if (u.state === 'die') continue;
        u.hp = Math.min(u.maxHp, u.hp + Math.floor(u.maxHp * spell.healPct));
        // Heal glow around each living unit (tracks unit position)
        b.effects.push({ type: 'heal', unit: u, timer: 1, color: '#44ff44' });
      }
      break;

    case 'freeze':
      b.effects.push({ type: 'freeze_explosion', x: targetX, y: targetY, radius: spell.radius, timer: 1.8 });
      for (const u of enemies) {
        if (u.state === 'die') continue;
        const dx = u.x - targetX, dy = u.y - targetY;
        if (Math.sqrt(dx * dx + dy * dy) < spell.radius) {
          u.frozen = spell.duration;
          u.freezeDmg = spell.freezeDmg || 3;
          u.freezeDmgInterval = spell.freezeDmgInterval || 2;
          u.freezeDmgTick = 0;
        }
      }
      b.shakeTimer = 0.3;
      b.shakeIntensity = 6;
      break;

    case 'lightning': {
      // Chain Lightning: bounce between enemies with decaying damage + paralysis
      const alive = enemies.filter(u => u.state !== 'die');
      if (alive.length === 0) break;
      let currentDmg = spell.dmg;
      const hitSet = new Set();
      let prevX = null, prevY = null;
      // Start from a random first target
      let current = alive[Math.floor(Math.random() * alive.length)];
      for (let i = 0; i < spell.hits && current; i++) {
        current.hp -= Math.round(currentDmg);
        hitSet.add(current.id);
        // ⚡ Paralysis effect: slow move & attack speed by 25% for 5s
        current.paralyzed = spell.paralyzeDur || 5;
        current.paralyzeAmount = spell.paralyzeAmt || 0.25;
        // Chain bolt effect from previous to current
        b.effects.push({
          type: 'chain_lightning',
          fromX: prevX !== null ? prevX : current.x,
          fromY: prevY !== null ? prevY : 0,
          toX: current.x, toY: current.y,
          timer: 0.6, isFirst: i === 0
        });
        // Impact flash on target
        b.effects.push({ type: 'lightning_impact', x: current.x, y: current.y, timer: 0.4 });
        // Paralysis text indicator
        b.effects.push({ type: 'text', text: '⚡麻痹!', x: current.x, y: current.y - 30, timer: 1.2, color: '#88ccff' });
        prevX = current.x;
        prevY = current.y;
        currentDmg *= spell.decayRate;
        // Find nearest unhit enemy for next bounce
        const candidates = alive.filter(u => !hitSet.has(u.id));
        if (candidates.length === 0) break;
        let nearest = null, minDist = Infinity;
        for (const c of candidates) {
          const d = Math.hypot(c.x - current.x, c.y - current.y);
          if (d < minDist) { minDist = d; nearest = c; }
        }
        current = nearest;
      }
      b.shakeTimer = 0.4;
      b.shakeIntensity = 10;
      break;
    }

    case 'gargoyle':
      const gargoyle = {
        id: b.nextUnitId++,
        type: 'gargoyle', team, dir: isPlayer ? 1 : -1, baseDir: isPlayer ? 1 : -1,
        x: castleX + (isPlayer ? 60 : -60),
        y: 350,
        hp: spell.hp, maxHp: spell.hp,
        atk: spell.atk || 30, spd: 0, range: spell.range || 300,
        state: 'idle', stateTimer: spell.duration,
        attackCooldown: 0, animFrame: 0, animTimer: 0,
        flying: false, frozen: 0, burning: 0, burnDps: 0, ashBurn: 0, ashBurnTick: 0,
        slowed: 0, slowAmount: 0, paralyzed: 0, paralyzeAmount: 0, frightened: 0, stealth: 0, shield: 0,
        siegeMult: 1, firstAttack: false, isGargoyle: true,
        branch: null, aoeRadius: 0
      };
      allies.push(gargoyle);
      b.effects.push({ type: 'text', text: '🛡️ 圣像守卫降临!', x: gargoyle.x, y: gargoyle.y - 40, timer: 2, color: '#ffcc44' });
      b.effects.push({ type: 'holyShield', x: gargoyle.x, y: gargoyle.y, timer: 1.5, maxTimer: 1.5 });
      break;

    case 'doomsday': {
      // 奇袭: teleport 5 random friendly units to target position + buff + frighten enemies
      const alive = allies.filter(u => u.state !== 'die');
      const count = Math.min(spell.teleportCount || 5, alive.length);
      // Pick random units
      const shuffled = alive.sort(() => Math.random() - 0.5);
      const chosen = shuffled.slice(0, count);
      // Teleport with spread around target
      for (let i = 0; i < chosen.length; i++) {
        const u = chosen[i];
        const angle = (i / count) * Math.PI * 2;
        const spread = 20 + Math.random() * 15;
        u.x = targetX + Math.cos(angle) * spread;
        u.y = targetY + Math.sin(angle) * spread;
        // Clamp to battlefield
        u.x = Math.max(BATTLEFIELD.left, Math.min(BATTLEFIELD.right, u.x));
        u.y = Math.max(250, Math.min(550, u.y));
        // Apply 斗志昂扬 buff
        u.fightSpirit = spell.buffDuration || 10;
        u.fightSpiritAtkMult = spell.buffAtkMult || 1.5;
        u.fightSpiritSpdMult = spell.buffSpdMult || 1.5;
        // Teleport flash effect
        b.effects.push({ type: 'teleportFlash', x: u.x, y: u.y, timer: 0.6, maxTimer: 0.6 });
        b.effects.push({ type: 'text', text: '⚔️斗志昂扬!', x: u.x, y: u.y - 30, timer: 1.5, color: '#ff8800' });
      }
      // 🔥 Frighten enemies in teleport radius: lose attack ability for 5s
      const frightenRadius = spell.radius || 80;
      const frightenDur = spell.frightenDur || 5;
      for (const e of enemies) {
        if (e.state === 'die') continue;
        const dist = Math.hypot(e.x - targetX, e.y - targetY);
        if (dist <= frightenRadius) {
          e.frightened = frightenDur;
          b.effects.push({ type: 'text', text: '😱惊吓!', x: e.x, y: e.y - 30, timer: 1.5, color: '#ff4444' });
        }
      }
      // Target area circle effect
      b.effects.push({ type: 'raidCircle', x: targetX, y: targetY, radius: frightenRadius, timer: 1.2, maxTimer: 1.2 });
      b.shakeTimer = 0.4;
      b.shakeIntensity = 10;
      break;
    }
  }

  return true;
}

// ============================================================
//  AI SYSTEM
// ============================================================

function updateAI(b, dt) {
  const diff = b.diff;
  const level = b.level;

  // 城堡已毁：停止训练和城堡升级，但Boss召唤/增援不受影响（由updateBattle独立处理）
  if (b.aiCastle.wallHp <= 0) return;

  // Resource generation
  b.aiGold += b.aiGoldPerSec * dt;
  b.aiMana = Math.min(100, b.aiMana + b.aiManaPerSec * dt);

  b.aiDecisionTimer -= dt;
  if (b.aiDecisionTimer > 0) return;
  b.aiDecisionTimer = diff.decisionInterval;

  // Decide what to train
  const availableUnits = level.aiUnits.filter(u => saveData.unlockedUnits.includes(u) || true);
  let chosen = null;

  if (diff.strategy === 'random') {
    chosen = availableUnits[Math.floor(Math.random() * availableUnits.length)];
  } else if (diff.strategy === 'counter') {
    // Count player units
    const pCounts = {};
    for (const u of b.playerUnits) {
      if (u.state !== 'die') pCounts[u.type] = (pCounts[u.type] || 0) + 1;
    }
    // Find most common player unit
    let maxType = 'militia', maxCount = 0;
    for (const [t, c] of Object.entries(pCounts)) {
      if (c > maxCount) { maxCount = c; maxType = t; }
    }
    chosen = getCounterUnit(maxType, availableUnits);
  } else if (diff.strategy === 'precise') {
    const pCounts = {};
    for (const u of b.playerUnits) {
      if (u.state !== 'die') pCounts[u.type] = (pCounts[u.type] || 0) + 1;
    }
    let maxType = 'militia', maxCount = 0;
    for (const [t, c] of Object.entries(pCounts)) {
      if (c > maxCount) { maxCount = c; maxType = t; }
    }
    chosen = getCounterUnit(maxType, availableUnits);
  }

  if (chosen && b.aiGold >= UNIT_TYPES[chosen].gold) {
    b.aiGold -= UNIT_TYPES[chosen].gold;
    const unit = createUnit(chosen, 'ai', b);
    b.aiUnits.push(unit);
  }

  // AI Spells
  if (Math.random() < diff.spellChance) {
    const availableSpells = SPELLS.filter(s => {
      const cdKey = `ai_${s.id}`;
      return b[cdKey] <= 0 && b.aiMana >= s.mana && saveData.unlockedLevels.includes(s.unlock);
    });
    if (availableSpells.length > 0) {
      const spell = availableSpells[Math.floor(Math.random() * availableSpells.length)];
      let tx = BATTLEFIELD.left + 100 + Math.random() * 400;
      let ty = 300 + Math.random() * 200;
      castSpell(spell.id, tx, ty, b, 'ai');
    }
  }

  // AI Castle upgrades
  if (Math.random() < diff.upgradeChance) {
    const modules = ['wall', 'tower', 'goldGen', 'manaGen'];
    const mod = modules[Math.floor(Math.random() * modules.length)];
    const currentLv = b.aiCastle.modules[mod];
    if (currentLv < 4) {
      const cost = CASTLE_MODULES[mod].costs[currentLv + 1];
      if (b.aiGold >= cost) {
        b.aiGold -= cost;
        b.aiCastle.modules[mod] = currentLv + 1;
        if (mod === 'wall') {
          b.aiCastle.wallMaxHp = CASTLE_MODULES.wall.values[currentLv + 1] * (b.level.wallMult || 1);
          b.aiCastle.wallHp = Math.min(b.aiCastle.wallHp + 500, b.aiCastle.wallMaxHp);
        }
        if (mod === 'tower') b.aiCastle.towerDps = CASTLE_MODULES.tower.values[currentLv + 1];
        if (mod === 'goldGen') b.aiGoldPerSec = CASTLE_MODULES.goldGen.values[currentLv + 1] * diff.goldMult;
        if (mod === 'manaGen') b.aiManaPerSec = CASTLE_MODULES.manaGen.values[currentLv + 1] * diff.manaMult;
      }
    }
  }

  // AI Unit upgrades (hard+)
  if (diff.unitUpgrade) {
    const unupgraded = Object.keys(UNIT_TYPES).filter(t =>
      !b.aiUnitUpgrades[t] && availableUnits.includes(t)
    );
    if (unupgraded.length > 0 && Math.random() < 0.1) {
      const type = unupgraded[Math.floor(Math.random() * unupgraded.length)];
      const cost = UPGRADE_COSTS[type];
      if (b.aiGold >= cost) {
        b.aiGold -= cost;
        b.aiUnitUpgrades[type] = Math.random() < 0.5 ? 'A' : 'B';
      }
    }
  }
}

function getCounterUnit(playerType, available) {
  const counters = {
    archer: 'knight', knight: 'mage', mage: 'militia',
    militia: 'archer', giant: 'archer', dragon: 'archer',
    assassin: 'militia'
  };
  const counter = counters[playerType] || 'militia';
  return available.includes(counter) ? counter : available[Math.floor(Math.random() * available.length)];
}

// ============================================================
//  TERRAIN SYSTEM
// ============================================================

function updateTerrain(b, dt) {
  b.terrainTimer += dt;

  switch(b.terrain) {
    case 'fireTrap':
      // Random fire trap every 10s
      if (b.terrainTimer >= 10) {
        b.terrainTimer = 0;
        const tx = BATTLEFIELD.left + 100 + Math.random() * (BATTLEFIELD.width - 200);
        b.effects.push({ type: 'aoe', x: tx, y: 400, radius: 60, timer: 1, color: '#ff4400', delay: 1 });
        // Damage after delay
        setTimeout(() => {
          for (const u of b.playerUnits.concat(b.aiUnits)) {
            if (u.state === 'die' || u.flying) continue;
            const dx = u.x - tx, dy = u.y - 400;
            if (Math.sqrt(dx * dx + dy * dy) < 60) u.hp -= 80;
          }
        }, 1000);
      }
      break;

    case 'rockfall':
      if (b.terrainTimer >= 15) {
        b.terrainTimer = 0;
        const rx = 400 + Math.random() * 200;
        b.effects.push({ type: 'warning', x: rx, y: 400, radius: 80, timer: 1 });
        setTimeout(() => {
          for (const u of b.playerUnits.concat(b.aiUnits)) {
            if (u.state === 'die' || u.flying) continue;
            const dx = u.x - rx, dy = u.y - 400;
            if (Math.sqrt(dx * dx + dy * dy) < 80) u.hp -= 100;
          }
          b.effects.push({ type: 'aoe', x: rx, y: 400, radius: 80, timer: 0.5, color: '#886644' });
        }, 1000);
      }
      break;

    case 'volcano':
      if (b.terrainTimer >= 25) {
        b.terrainTimer = 0;
        b.effects.push({ type: 'warning', x: 600, y: 360, radius: 600, timer: 3 });
        setTimeout(() => {
          for (const u of b.playerUnits.concat(b.aiUnits)) {
            if (u.state === 'die') continue;
            u.hp -= 60;
          }
          b.shakeTimer = 0.5;
          b.shakeIntensity = 10;
        }, 3000);
      }
      break;

    case 'poison':
      if (b.terrainTimer >= 20) {
        b.terrainTimer = 0;
        b.poisonFogLeft += 50;
        b.poisonFogRight -= 50;
      }
      // Damage units in fog
      for (const u of b.playerUnits.concat(b.aiUnits)) {
        if (u.state === 'die' || u.flying) continue;
        if (u.x < b.poisonFogLeft || u.x > b.poisonFogRight) {
          u.hp = 0;
          u.state = 'die';
          u.stateTimer = 0.5;
        }
      }
      break;
  }

  // Raid waves (nightmare 3-3+)
  if (b.level.raidWave && b.time > 60) {
    b.raidTimer -= dt;
    if (b.raidTimer <= 0) {
      b.raidTimer = 30;
      // Spawn raid
      const types = ['knight', 'knight', 'giant'];
      if (Math.random() < 0.5) types.push('dragon');
      if (Math.random() < 0.5) types.push('mage');
      for (const t of types) {
        const unit = createUnit(t, 'ai', b);
        b.aiUnits.push(unit);
      }
      b.effects.push({ type: 'text', text: '⚠️ 突袭波!', x: 640, y: 200, timer: 2, color: '#ff0000' });
      b.shakeTimer = 0.3;
      b.shakeIntensity = 6;
    }
  }

  // Boss level reinforcements
  if (b.boss && !b.bossDefeated) {
    if (b.level.id === '1-5' && Math.floor(b.time) % 15 === 0 && Math.floor(b.time) > 0 && Math.floor(b.time - dt) % 15 !== 0) {
      b.aiUnits.push(createUnit('archer', 'ai', b));
      b.effects.push({ type: 'text', text: '⚠️ 烬牙骑士召唤弓箭手!', x: 640, y: 180, timer: 2, color: '#cc44ff' });
    }
    if (b.level.id === '2-5' && Math.floor(b.time) % 18 === 0 && Math.floor(b.time) > 0 && Math.floor(b.time - dt) % 18 !== 0) {
      b.aiUnits.push(createUnit('militia', 'ai', b));
      b.aiUnits.push(createUnit('archer', 'ai', b));
      b.effects.push({ type: 'text', text: '⚠️ 岩心将军召唤增援!', x: 640, y: 180, timer: 2, color: '#cc44ff' });
    }
    if (b.level.id === '3-5' && Math.floor(b.time) % 21 === 0 && Math.floor(b.time) > 0 && Math.floor(b.time - dt) % 21 !== 0) {
      b.aiUnits.push(createUnit('militia', 'ai', b));
      b.aiUnits.push(createUnit('archer', 'ai', b));
      b.aiUnits.push(createUnit('knight', 'ai', b));
      b.effects.push({ type: 'text', text: '⚠️ 暗主召唤增援!', x: 640, y: 180, timer: 2, color: '#cc44ff' });
    }
  }

  // ── Boss System ──
  if (b.level.boss) {
    // Spawn boss when AI castle HP drops below 25%
    if (!b.boss && !b.bossDefeated) {
      const aiHpRatio = b.aiCastle.wallHp / b.aiCastle.wallMaxHp;
      if (aiHpRatio <= 0.25) {
        const bossKey = b.level.id === '1-5' ? 'boss_ashfang' : b.level.id === '2-5' ? 'boss_rockcore' : 'boss_darklord';
        const bt = BOSS_TYPES[bossKey];
        const diff = b.diff;
        const hpMult = 1 + diff.hpBonus * 0.5;
        const atkMult = 1 + diff.atkBonus * 0.5;

        const bossUnit = {
          id: b.nextUnitId++,
          type: bossKey,
          team: 'ai',
          dir: -1,
          baseDir: -1,
          x: BATTLEFIELD.right - 60,
          y: 380,
          hp: bt.hp * hpMult,
          maxHp: bt.hp * hpMult,
          atk: bt.atk * atkMult,
          spd: bt.spd,
          range: bt.range,
          aoeRadius: 0,
          siegeMult: 2,
          state: 'walk',
          stateTimer: 0,
          attackCooldown: 0,
          animFrame: 0,
          animTimer: 0,
          branch: null,
          flying: false,
          frozen: 0,
          burning: 0,
          burnDps: 0,
          ashBurn: 0,
          ashBurnTick: 0,
          slowed: 0,
          slowAmount: 0,
          paralyzed: 0,
          paralyzeAmount: 0,
          frightened: 0,
          stealth: 0,
          shield: 0,
          charged: false,
          chargeTimer: 0,
          firstAttack: true,
          killCount: 0,
          isObstacle: false,
          obstacleTimer: 0,
          isBoss: true
        };

        b.boss = {
          unit: bossUnit,
          type: bt,
          maxHp: bossUnit.maxHp,
          abilities: bt.abilities.map(a => ({ ...a, timer: a.cd })),
          phase: 1,
          phaseSummoned: 1,  // already summoned 1 at spawn
          entranceTimer: 2.5,
          dying: false,
          deathTimer: 0,
          abilityGlow: 0,
          ashBrand: 0  // countdown timer for retaliation shield
        };
        switchBgm('boss');

        b.aiUnits.push(bossUnit);

        // Boss initial summon (1 unit at spawn)
        if (bt.summonTypes) {
          const t = bt.summonTypes[Math.floor(Math.random() * bt.summonTypes.length)];
          const unit = createUnit(t, 'ai', b);
          unit.x = bossUnit.x + (Math.random() - 0.5) * 80;
          b.aiUnits.push(unit);
        }

        // ⚠️ 警告横幅 + 震屏
        b.skillBanner = {
          name: `⚠️ 警告！BOSS【${bt.name}】出现！`,
          icon: bt.icon,
          timer: 3.5,
          duration: 3.5,
          color: '#ff4444'
        };
        b.shakeTimer = 1.5;
        b.shakeIntensity = 10;
      }
    }

    // Update boss logic
    if (b.boss && !b.bossDefeated) {
      const boss = b.boss;
      const bu = boss.unit;
      const diff = b.diff;

      // Entrance animation
      if (boss.entranceTimer > 0) {
        boss.entranceTimer -= dt;
        bu.state = 'idle';
        if (boss.entranceTimer <= 0) {
          b.effects.push({ type: 'text', text: `⚔️ ${boss.type.storyName} · ${boss.type.title}`, x: 640, y: 190, timer: 2.5, color: '#ffcc00' });
        }
      }

      // Active boss logic (not during entrance, not dead)
      if (boss.entranceTimer <= 0 && bu.state !== 'die') {
        // Phase transitions (based on HP)
        const hpRatio = bu.hp / boss.maxHp;
        if (hpRatio < 0.3 && boss.phase < 3) {
          boss.phase = 3;
          b.effects.push({ type: 'text', text: '🔥 最终阶段!', x: 640, y: 200, timer: 2, color: '#ff0000' });
          b.shakeTimer = 0.5;
          b.shakeIntensity = 10;
          bu.atk = Math.floor(bu.atk * 1.2);
          bu.spd = Math.floor(bu.spd * 1.15);
          // Phase 3 summon: 3 units
          if (boss.type.summonTypes) {
            for (let i = 0; i < 3; i++) {
              const t = boss.type.summonTypes[Math.floor(Math.random() * boss.type.summonTypes.length)];
              const unit = createUnit(t, 'ai', b);
              unit.x = bu.x + (Math.random() - 0.5) * 80;
              b.aiUnits.push(unit);
            }
            boss.phaseSummoned = 3;
          }
        } else if (hpRatio < 0.6 && boss.phase < 2) {
          boss.phase = 2;
          b.effects.push({ type: 'text', text: '⚡ 第二阶段!', x: 640, y: 200, timer: 2, color: '#ff8800' });
          b.shakeTimer = 0.3;
          b.shakeIntensity = 6;
          bu.atk = Math.floor(bu.atk * 1.1);
          // Phase 2 summon: 2 units
          if (boss.type.summonTypes) {
            for (let i = 0; i < 2; i++) {
              const t = boss.type.summonTypes[Math.floor(Math.random() * boss.type.summonTypes.length)];
              const unit = createUnit(t, 'ai', b);
              unit.x = bu.x + (Math.random() - 0.5) * 80;
              b.aiUnits.push(unit);
            }
            boss.phaseSummoned = 2;
          }
        }

        // Ability glow effect
        if (boss.abilityGlow > 0) boss.abilityGlow -= dt;
        if (boss.ashBrand > 0) boss.ashBrand -= dt;

        // Boss abilities
        for (const ab of boss.abilities) {
          ab.timer -= dt;
          if (ab.timer <= 0) {
            ab.timer = ab.cd * (boss.phase === 3 ? 0.6 : boss.phase === 2 ? 0.8 : 1);

            if (ab.type === 'aoe') {
              const targets = b.playerUnits.filter(u => u.state !== 'die' && Math.abs(u.x - bu.x) < ab.range && Math.abs(u.y - bu.y) < 100);
              for (const t of targets) {
                t.hp -= ab.dmg * (1 + diff.atkBonus);
                b.effects.push({ type: 'hit', x: t.x, y: t.y, timer: 0.3 });
                if (t.hp <= 0) { t.hp = 0; t.state = 'die'; t.stateTimer = 0.5; }
              }
              b.effects.push({ type: 'text', text: `💥 ${ab.name}!`, x: bu.x, y: bu.y - 40, timer: 1.5, color: '#ff6644' });
              b.shakeTimer = 0.3;
              b.shakeIntensity = 5;
              boss.abilityGlow = 0.5;
              b.effects.push({ type: 'bossAoe', x: bu.x, y: bu.y, radius: ab.range, timer: 0.5, maxTimer: 0.5, color: boss.type.color });
            }
            else if (ab.type === 'charge') {
              let nearest = null, minD = Infinity;
              for (const u of b.playerUnits) { if (u.state !== 'die') { const d = Math.abs(u.x - bu.x); if (d < minD) { minD = d; nearest = u; } } }
              if (nearest && minD > 50) {
                bu.x = nearest.x + 30 * bu.dir;
                nearest.hp -= ab.dmg * (1 + diff.atkBonus);
                b.effects.push({ type: 'hit', x: nearest.x, y: nearest.y, timer: 0.3 });
                b.effects.push({ type: 'text', text: `⚡ ${ab.name}!`, x: nearest.x, y: nearest.y - 30, timer: 1.5, color: '#ffaa00' });
                if (nearest.hp <= 0) { nearest.hp = 0; nearest.state = 'die'; nearest.stateTimer = 0.5; }
                b.shakeTimer = 0.4; b.shakeIntensity = 8; boss.abilityGlow = 0.5;
              }
            }
            else if (ab.type === 'ranged') {
              let nearest = null, minD = Infinity;
              for (const u of b.playerUnits) { if (u.state !== 'die') { const d = Math.abs(u.x - bu.x); if (d < minD) { minD = d; nearest = u; } } }
              if (nearest) {
                b.projectiles.push({ x: bu.x, y: bu.y - 20, tx: nearest.x, ty: nearest.y, speed: 400, timer: 2, dmg: ab.dmg * (1 + diff.atkBonus), team: 'ai', color: boss.type.color, size: 3, trail: true });
                b.effects.push({ type: 'text', text: `🎯 ${ab.name}!`, x: bu.x, y: bu.y - 40, timer: 1, color: '#ff4444' });
                boss.abilityGlow = 0.3;
              }
            }
            else if (ab.type === 'buff') {
              for (const u of b.aiUnits) { if (u.state !== 'die' && u !== bu && Math.abs(u.x - bu.x) < 200) { u.atk *= 1.3; u.shield += 50; } }
              b.effects.push({ type: 'text', text: `🛡️ ${ab.name}!`, x: bu.x, y: bu.y - 40, timer: 1.5, color: '#4488ff' });
              boss.abilityGlow = 0.5;
            }
            else if (ab.type === 'debuff') {
              for (const u of b.playerUnits) { if (u.state !== 'die') { u.slowed = 3; u.slowAmount = 0.5; } }
              b.effects.push({ type: 'text', text: `🌀 ${ab.name}!`, x: 640, y: 200, timer: 2, color: '#8844cc' });
              boss.abilityGlow = 0.5;
            }
            else if (ab.type === 'retaliation') {
              boss.ashBrand = ab.duration;
              b.effects.push({ type: 'text', text: `🔥 ${ab.name}!`, x: bu.x, y: bu.y - 40, timer: 1.5, color: '#ff6622' });
              b.effects.push({ type: 'bossAoe', x: bu.x, y: bu.y, radius: 60, timer: 0.8, maxTimer: 0.8, color: '#ff4400' });
              b.shakeTimer = 0.3;
              b.shakeIntensity = 4;
              boss.abilityGlow = ab.duration;
            }
          }
        }


      }

      // Check boss death (runs regardless of entrance/active state)
      if (bu.hp <= 0 && !boss.dying) {
        boss.dying = true;
        boss.deathTimer = 3.0;
        bu.state = 'die';
        bu.stateTimer = 3.5;
        b.effects.push({ type: 'text', text: boss.type.deathMsg, x: 640, y: 250, timer: 3, color: '#ffdd00' });
        b.shakeTimer = 1.5;
        b.shakeIntensity = 12;

        for (let i = 0; i < 30; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 50 + Math.random() * 150;
          b.effects.push({ type: 'bossDeathParticle', x: bu.x, y: bu.y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 80, timer: 1 + Math.random(), color: boss.type.color, size: 2 + Math.random() * 4 });
        }
      }

      // Boss dying animation countdown
      if (boss.dying) {
        boss.deathTimer -= dt;
        if (boss.deathTimer <= 0) {
          b.bossDefeated = true;
          switchBgm('battle');
          // Boss defeated — victory is now checked in the main victory/defeat check
          // (requires both boss dead AND castle HP <= 0)
        }
      }
    }
  }

  // Mine capture
  for (const mine of b.mines) {
    const playerNear = b.playerUnits.some(u => u.state !== 'die' && Math.abs(u.x - mine.x) < 40);
    const aiNear = b.aiUnits.some(u => u.state !== 'die' && Math.abs(u.x - mine.x) < 40);
    if (playerNear && mine.owner !== 'player') {
      mine.owner = 'player';
      mine.timer = 0;
    }
    if (aiNear && mine.owner !== 'ai') {
      mine.owner = 'ai';
      mine.timer = 0;
    }
    if (mine.owner === 'player') b.goldPerSec = CASTLE_MODULES.goldGen.values[b.playerCastle.modules.goldGen] * b.diff.goldMult + 2;
    if (mine.owner === 'ai') b.aiGoldPerSec = CASTLE_MODULES.goldGen.values[b.aiCastle.modules.goldGen] * b.diff.goldMult + 2;
  }
}

// ============================================================
//  MAIN UPDATE
// ============================================================

function updateBattle(b, dt) {
  if (b.gameOver || b.paused) return;

  b.time += dt;
  animFrame++;

  // Screen shake
  if (b.shakeTimer > 0) b.shakeTimer -= dt;

  // Skill banner timer
  if (b.skillBanner) {
    b.skillBanner.timer -= dt;
    if (b.skillBanner.timer <= 0) b.skillBanner = null;
  }

  // Resource generation
  b.gold += b.goldPerSec * dt;
  b.mana = Math.min(b.maxMana, b.mana + b.manaPerSec * dt);

  // Castle repair
  if (b.repairCooldown > 0) b.repairCooldown -= dt;
  if (b.repairActive) {
    b.repairTimer -= dt;
    b.playerCastle.wallHp = Math.min(b.playerCastle.wallMaxHp, b.playerCastle.wallHp + 10 * dt);
    if (b.repairTimer <= 0) {
      b.repairActive = false;
      b.repairCooldown = b.repairCooldownMax;
    }
  }

  // 城堡崩塌动画（仅触发一次）
  if (b.aiCastle.wallHp <= 0 && !b.aiCastleDestroyed) {
    b.aiCastleDestroyed = true;
    // 崩塌特效：碎片 + 火焰
    const cx = BATTLEFIELD.right - 40;
    for (let i = 0; i < 25; i++) {
      b.effects.push({
        type: 'castleDebris',
        x: cx + (Math.random() - 0.5) * 80,
        y: 200 + Math.random() * 200,
        vx: (Math.random() - 0.5) * 200,
        vy: -100 - Math.random() * 200,
        timer: 2 + Math.random() * 1.5,
        size: 4 + Math.random() * 10,
        color: ['#aa6644', '#886644', '#664422', '#cc8855', '#553311'][Math.floor(Math.random() * 5)],
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 8
      });
    }
    // 火焰烟雾
    for (let i = 0; i < 12; i++) {
      b.effects.push({
        type: 'castleSmoke',
        x: cx + (Math.random() - 0.5) * 60,
        y: 250 + Math.random() * 100,
        vx: (Math.random() - 0.5) * 30,
        vy: -40 - Math.random() * 60,
        timer: 2.5 + Math.random() * 2,
        size: 20 + Math.random() * 30,
        alpha: 0.8
      });
    }
    // 横幅 + 震屏
    b.skillBanner = {
      name: '💥 城堡崩塌！敌方训练终止！',
      icon: '🏰',
      timer: 3,
      duration: 3,
      color: '#ff6622'
    };
    b.shakeTimer = 1.2;
    b.shakeIntensity = 12;
  }

  // Training queue
  for (let i = b.trainQueue.length - 1; i >= 0; i--) {
    b.trainQueue[i].timer -= dt;
    if (b.trainQueue[i].timer <= 0) {
      const unit = createUnit(b.trainQueue[i].type, 'player', b);
      b.playerUnits.push(unit);
      b.trainQueue.splice(i, 1);
    }
  }

  // Update units
  for (const unit of b.playerUnits) updateCombat(unit, b, dt);
  for (const unit of b.aiUnits) updateCombat(unit, b, dt);

  // Expire gargoyle duration (圣像守卫 存在时间)
  for (const unit of b.playerUnits.concat(b.aiUnits)) {
    if (unit.isGargoyle && unit.state !== 'die') {
      unit.stateTimer -= dt;
      if (unit.stateTimer <= 0) {
        unit.state = 'die';
        unit.stateTimer = 0.5;
      }
    }
  }

  // Clean dead units (with death animation)
  b.playerUnits = b.playerUnits.filter(u => {
    if (u.state === 'die') {
      u.stateTimer -= dt;
      return u.stateTimer > 0;
    }
    return true;
  });
  b.aiUnits = b.aiUnits.filter(u => {
    if (u.state === 'die') {
      // Boss units have extended death animation
      if (u.isBoss && b.boss && b.boss.dying) {
        u.stateTimer -= dt;
        return b.boss.deathTimer > 0; // Keep boss alive until death timer expires
      }
      u.stateTimer -= dt;
      return u.stateTimer > 0;
    }
    return true;
  });

  // Giant obstacles
  for (const u of b.playerUnits.concat(b.aiUnits)) {
    if (u.isObstacle && u.obstacleTimer > 0) {
      u.obstacleTimer -= dt;
      // Slow enemies passing through
      const enemies = u.team === 'player' ? b.aiUnits : b.playerUnits;
      for (const e of enemies) {
        const dx = e.x - u.x, dy = e.y - u.y;
        if (Math.sqrt(dx * dx + dy * dy) < 30) {
          e.slowed = 0.5;
          e.slowAmount = 0.5;
        }
      }
    }
  }

  // Update towers
  updateTowers(b, dt);

  // AI
  updateAI(b, dt);

  // Spell cooldowns
  for (const sp of SPELLS) {
    const pk = `player_${sp.id}`;
    const ak = `ai_${sp.id}`;
    if (b[pk] > 0) b[pk] -= dt;
    if (b[ak] > 0) b[ak] -= dt;
  }

  // Terrain
  updateTerrain(b, dt);

  // Update projectiles
  for (const p of b.projectiles) {
    const dx = p.tx - p.x;
    const dy = p.ty - p.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 10) {
      p.timer = 0;
    } else {
      p.x += (dx/dist) * p.speed * dt;
      p.y += (dy/dist) * p.speed * dt;
    }
    p.timer -= dt;
  }
  b.projectiles = b.projectiles.filter(p => p.timer > 0);

  // Update effects
  for (const e of b.effects) {
    e.timer -= dt;
    // Move boss death particles
    if (e.type === 'bossDeathParticle') {
      e.x += (e.vx || 0) * dt;
      e.y += (e.vy || 0) * dt;
      if (e.vy !== undefined) e.vy += 200 * dt; // gravity
    }
  }
  b.effects = b.effects.filter(e => e.timer > 0);

  // Victory / Defeat check
  // Boss levels: victory requires BOTH boss defeated AND castle HP <= 0
  // Non-boss levels: victory requires castle HP <= 0
  const bossAlive = b.level.boss && b.boss && !b.bossDefeated;
  const castleDown = b.aiCastle.wallHp <= 0;

  if (b.level.boss) {
    // Boss level: need boss dead + castle destroyed
    if (b.bossDefeated && castleDown && !b.gameOver) {
      b.gameOver = true;
      b.result = 'victory';
      const hpRatio = b.playerCastle.wallHp / b.playerCastle.wallMaxHp;
      let stars = 1;
      if (hpRatio > 0.5) stars = 2;
      if (hpRatio > 0.8) stars = 3;
      b.stars = stars;

      const idx = LEVELS.findIndex(l => l.id === b.level.id);
      if (idx < LEVELS.length - 1) {
        const nextId = LEVELS[idx + 1].id;
        if (!saveData.unlockedLevels.includes(nextId)) saveData.unlockedLevels.push(nextId);
      }
      const unitUnlocks = { '1-1': ['militia','archer'], '1-3': ['knight'], '1-5': ['mage'], '2-1': ['giant'], '2-3': ['dragon'], '2-5': ['assassin'] };
      for (const [lvl, units] of Object.entries(unitUnlocks)) {
        if (saveData.unlockedLevels.includes(lvl)) { for (const u of units) { if (!saveData.unlockedUnits.includes(u)) saveData.unlockedUnits.push(u); } }
      }
      const prev = saveData.stars[b.level.id] || 0;
      if (stars > prev) saveData.stars[b.level.id] = stars;
      const baseReward = b.level.difficulty === 'normal' ? 150 : b.level.difficulty === 'hard' ? 300 : 600;
      saveData.gold += baseReward * stars;
      saveToDisk();
    }
  } else {
    // Non-boss level: castle destruction = victory
    if (castleDown && !b.gameOver) {
      b.gameOver = true;
      b.result = 'victory';
      const hpRatio = b.playerCastle.wallHp / b.playerCastle.wallMaxHp;
      let stars = 1;
      if (hpRatio > 0.5) stars = 2;
      if (hpRatio > 0.8) stars = 3;
      b.stars = stars;

      const idx = LEVELS.findIndex(l => l.id === b.level.id);
      if (idx < LEVELS.length - 1) {
        const nextId = LEVELS[idx + 1].id;
        if (!saveData.unlockedLevels.includes(nextId)) saveData.unlockedLevels.push(nextId);
      }
      const unitUnlocks = { '1-1': ['militia','archer'], '1-3': ['knight'], '1-5': ['mage'], '2-1': ['giant'], '2-3': ['dragon'], '2-5': ['assassin'] };
      for (const [lvl, units] of Object.entries(unitUnlocks)) {
        if (saveData.unlockedLevels.includes(lvl)) { for (const u of units) { if (!saveData.unlockedUnits.includes(u)) saveData.unlockedUnits.push(u); } }
      }
      const prev = saveData.stars[b.level.id] || 0;
      if (stars > prev) saveData.stars[b.level.id] = stars;
      const baseReward = b.level.difficulty === 'normal' ? 100 : b.level.difficulty === 'hard' ? 200 : 400;
      saveData.gold += baseReward * stars;
      saveToDisk();
    }
  }

  // Defeat check (both boss and non-boss)
  if (b.playerCastle.wallHp <= 0 && !b.gameOver) {
    b.gameOver = true;
    b.result = 'defeat';
  }
  if (b.time >= b.maxTime) {
    // Overtime: both castles take 50 DPS
    b.playerCastle.wallHp = Math.max(0, b.playerCastle.wallHp - 50 * dt);
    b.aiCastle.wallHp = Math.max(0, b.aiCastle.wallHp - 50 * dt);
    if (b.playerCastle.wallHp <= 0 && !b.gameOver) { b.gameOver = true; b.result = 'defeat'; }
    if (b.aiCastle.wallHp <= 0 && !b.gameOver) {
      if (b.level.boss && !b.bossDefeated) {
        // Boss level: castle down but boss still alive — no victory yet
      } else {
        b.gameOver = true; b.result = 'victory'; b.stars = 1;
      }
    }
  }
}
