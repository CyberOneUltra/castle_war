function drawVictoryDefeat(b) {
  // Overlay
  ctx.fillStyle = 'rgba(0, 0, 10, 0.75)';
  ctx.fillRect(0, 0, W, H);
  const vign = ctx.createRadialGradient(W/2, H/2, 50, W/2, H/2, 500);
  vign.addColorStop(0, 'rgba(0,0,0,0)');
  vign.addColorStop(1, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = vign;
  ctx.fillRect(0, 0, W, H);

  const isVictory = b.result === 'victory';
  const story = LEVEL_STORIES[b.level.id];
  const hasEpilogue = isVictory && story && story.epilogue;

  // 动态计算面板高度：根据结语文本行数自适应
  const pw = 480;
  let ph;
  if (hasEpilogue) {
    const epLines = story.epilogue.split('\n');
    const epilogueH = epLines.reduce((h, line) => h + (line ? 22 : 8), 0);
    // 标题区(178) + 分隔线(16) + 结语 + 按钮区(94: 重试/返回42 + 间距10 + 下一关42) + 上下留白(40)
    ph = 178 + 16 + epilogueH + 94 + 40;
    ph = Math.max(ph, 360); // 最小高度
  } else {
    ph = 320;
  }
  const ppx = W/2 - pw/2, ppy = Math.max(20, H/2 - ph/2 - 20);
  drawGlass(ppx, ppy, pw, ph, {
    alpha: 0.5,
    glow: isVictory ? 'rgba(200,168,78,0.25)' : 'rgba(200,50,50,0.2)'
  });

  // Title with glow
  ctx.save();
  ctx.shadowColor = isVictory ? 'rgba(200,168,78,0.6)' : 'rgba(200,50,50,0.5)';
  ctx.shadowBlur = 25;
  drawGlassText(isVictory ? '🏆 胜利!' : '💀 失败', W/2, ppy + 55, { font: 'bold 44px "Noto Serif SC", serif', color: isVictory ? '#c8a84e' : '#cc4444', align: 'center' });
  ctx.restore();

  if (isVictory) {
    // Stars with glow
    ctx.save();
    ctx.shadowColor = '#ffcc00';
    ctx.shadowBlur = 10;
    drawGlassText('★'.repeat(b.stars) + '☆'.repeat(3 - b.stars), W/2, ppy + 95, { font: '26px "Noto Sans SC", sans-serif', color: '#ffcc00', align: 'center' });
    ctx.restore();

    const baseReward = b.level.difficulty === 'normal' ? 100 : b.level.difficulty === 'hard' ? 200 : 400;
    drawGoldLabel(`获得黄金: ${baseReward * b.stars}`, W/2, ppy + 125, { font: '15px "Noto Sans SC", sans-serif', color: '#ffaa00', align: 'center', iconSize: 13 });
  }

  // Stats
  const remainTime = Math.max(0, b.maxTime - b.time);
  drawGlassText(`剩余时间: ${Math.floor(remainTime / 60)}分${Math.floor(remainTime % 60)}秒`, W/2, ppy + 155, { font: '13px "Noto Sans SC", sans-serif', color: 'rgba(255,255,255,0.5)', align: 'center' });
  drawGlassText(`剩余城墙HP: ${Math.ceil(b.playerCastle.wallHp)}/${b.playerCastle.wallMaxHp}`, W/2, ppy + 178, { font: '13px "Noto Sans SC", sans-serif', color: 'rgba(255,255,255,0.5)', align: 'center' });

  // Epilogue text for boss victories
  if (hasEpilogue) {
    const epLines = story.epilogue.split('\n');
    let ey = ppy + 210;
    // Divider
    ctx.strokeStyle = 'rgba(200, 168, 78, 0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(ppx + 40, ey - 8);
    ctx.lineTo(ppx + pw - 40, ey - 8);
    ctx.stroke();
    ctx.font = '14px serif';
    ctx.textAlign = 'center';
    for (const line of epLines) {
      if (!line) { ey += 8; continue; }
      ctx.fillStyle = 'rgba(200, 168, 78, 0.7)';
      ctx.fillText(line, W/2, ey);
      ey += 22;
    }
  }

  // Buttons — 按钮区域：重试/返回(42) + 间距(10) + 下一关(42) = 总高94
  const by = hasEpilogue ? ppy + ph - 94 : ppy + 210;
  drawGlassBtn(W/2 - 155, by, 140, 42, { color: 'rgba(68,136,68,0.25)', border: 'rgba(100,180,100,0.4)' });
  drawGlassText('🔄 重试', W/2 - 85, by + 27, { font: '15px "Noto Sans SC", sans-serif', color: '#aaddaa', align: 'center' });

  drawGlassBtn(W/2 + 15, by, 140, 42, { color: 'rgba(68,68,136,0.25)', border: 'rgba(100,100,200,0.4)' });
  drawGlassText('← 返回', W/2 + 85, by + 27, { font: '15px "Noto Sans SC", sans-serif', color: '#aaccdd', align: 'center' });

  if (isVictory) {
    const idx = LEVELS.findIndex(l => l.id === b.level.id);
    if (idx < LEVELS.length - 1) {
      drawGlassBtn(W/2 - 70, by + 52, 140, 42, { color: 'rgba(136,68,68,0.25)', border: 'rgba(200,100,100,0.4)' });
      drawGlassText('下一关 →', W/2, by + 77, { font: '15px "Noto Sans SC", sans-serif', color: '#ddaaaa', align: 'center' });
    }
  }
}

//  INPUT HANDLING

let mouseX = 0, mouseY = 0;

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (W / rect.width);
  mouseY = (e.clientY - rect.top) * (H / rect.height);
});

// 滑块拖拽：mousedown在滑块区域时启动拖拽
canvas.addEventListener('mousedown', (e) => {
  if (gameState !== 'settings' && !(gameState === 'battle' && battleVolPanel)) return;
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top) * (H / rect.height);

  let sliderX, sliderW, handleH, musicY, sfxY;

  if (gameState === 'settings') {
    const pw = 420, ph = 280;
    const ppx = W/2 - pw/2, ppy = 100;
    sliderX = ppx + 100;
    sliderW = 220;
    handleH = 22;
    musicY = ppy + 70;
    sfxY = ppy + 160;
  } else {
    // Battle volume panel
    const pauseBtnX = 170, pauseBtnW = 55;
    const spdBtnX = pauseBtnX + pauseBtnW + 8, spdBtnW = 64;
    const volBtnX = spdBtnX + spdBtnW + 8, volBtnY = 7, volBtnH = 28;
    const pvX = volBtnX, pvY = volBtnY + volBtnH + 4;
    sliderX = pvX + 90;
    sliderW = 180;
    handleH = 18;
    musicY = pvY + 40;
    sfxY = pvY + 110;
  }

  if (mx >= sliderX - 10 && mx <= sliderX + sliderW + 10) {
    if (my >= musicY - 15 && my <= musicY + handleH + 5) {
      settingsDragging = 'music';
      settingsJustDragged = true;
      musicVolume = Math.max(0, Math.min(100, Math.round(((mx - sliderX) / sliderW) * 100)));
      saveVolumeSettings();
      syncBgmVolume();
    } else if (my >= sfxY - 15 && my <= sfxY + handleH + 5) {
      settingsDragging = 'sfx';
      settingsJustDragged = true;
      sfxVolume = Math.max(0, Math.min(100, Math.round(((mx - sliderX) / sliderW) * 100)));
      saveVolumeSettings();
    }
  }
});

// 拖拽结束
canvas.addEventListener('mouseup', () => {
  settingsDragging = null;
});

canvas.addEventListener('mouseleave', () => {
  settingsDragging = null;
});

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (W / rect.width);
  const y = (e.clientY - rect.top) * (H / rect.height);

  handleClick(x, y);
});

// ── Double-click: play CG video on opening screen ──
canvas.addEventListener('dblclick', (e) => {
  if (gameState !== 'opening') return;

function playCGVideo() {
  cgVideoActive = true;
  // Create video overlay container
  const overlay = document.createElement('div');
  overlay.id = 'cgOverlay';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:#000;display:flex;align-items:center;justify-content:center;';

  const video = document.createElement('video');
  video.src = 'https://cdn.jsdelivr.net/gh/CyberOneUltra/castle_war@main/CG.mp4';
  video.style.cssText = 'width:100%;height:100%;object-fit:contain;';
  video.autoplay = true;
  video.playsInline = true;
  video.volume = musicVolume / 100;

  // Skip button — top-left on the black bar area
  const skipBtn = document.createElement('button');
  skipBtn.textContent = '跳过';
  skipBtn.style.cssText = 'position:absolute;top:20px;right:20px;padding:7px 20px;font-size:16px;font-weight:600;font-family:"Noto Sans SC",sans-serif;color:rgba(255,255,255,0.5);background:transparent;border:1.5px solid rgba(255,255,255,0.5);border-radius:4px;cursor:pointer;letter-spacing:2px;transition:opacity 0.3s;';
  skipBtn.onmouseenter = () => { skipBtn.style.color = "rgba(255,255,255,0.8)"; skipBtn.style.borderColor = "rgba(255,255,255,0.8)"; };
  skipBtn.onmouseleave = () => { skipBtn.style.color = "rgba(255,255,255,0.5)"; skipBtn.style.borderColor = "rgba(255,255,255,0.5)"; };

  function endCG() {
    video.pause();
    overlay.remove();
    cgVideoActive = false;
    gameState = 'menu';
    switchBgm('menu');
  }

  skipBtn.addEventListener('click', (ev) => { ev.stopPropagation(); endCG(); });
  video.addEventListener('ended', endCG);

  overlay.appendChild(video);
  overlay.appendChild(skipBtn);
  document.body.appendChild(overlay);
}

      handleH = 18;
      musicY = pvY + 40;
      sfxY = pvY + 110;

});

async function handleClick(x, y) {
  // Opening screen - click to continue to menu
  if (gameState === 'opening') {
    // Fullscreen suggestion popup (shown immediately on opening)
    if (showFullscreenSuggest) {
      const fsPw = 380, fsPh = 200;
      const fsPx = W/2 - fsPw/2, fsPy = H/2 - fsPh/2;
      const fsBtnW = 120, fsBtnH = 38;
      const fsBtnY = fsPy + 130;
      // Yes button
      if (x >= W/2 - fsBtnW - 15 && x <= W/2 - 15 && y >= fsBtnY && y <= fsBtnY + fsBtnH) {
        showFullscreenSuggest = false;
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen();
        }
        await unlockAudio();
        openingAlpha = Date.now();
        playOpening();
        return;
      }
      // No button
      if (x >= W/2 + 15 && x <= W/2 + fsBtnW + 15 && y >= fsBtnY && y <= fsBtnY + fsBtnH) {
        showFullscreenSuggest = false;
        await unlockAudio();
        openingAlpha = Date.now();
        playOpening();
        return;
      }
      // Click outside popup closes it
      if (x < fsPx || x > fsPx + fsPw || y < fsPy || y > fsPy + fsPh) {
        showFullscreenSuggest = false;
        await unlockAudio();
        openingAlpha = Date.now();
        playOpening();
        return;
      }
      return; // consume click while popup is open
    }
    // Single click on opening does nothing — require double-click to continue
    return;
  }

  // Story intro screen
  if (gameState === 'story') {
    // Start battle button
    const btnY = H - 70;
    if (x >= W/2 - 80 && x <= W/2 + 80 && y >= btnY && y <= btnY + 45) {
      battle = createBattle(storyLevelId);
      if (battle) { gameState = 'battle'; switchBgm('battle'); }
      return;
    }
    // Back button
    if (x >= 10 && x <= 100 && y >= H - 40 && y <= H - 10) {
      gameState = 'levelSelect';
      storyLevelId = null;
      return;
    }
    return;
  }

  if (gameState === 'menu') {
    // Fullscreen suggestion popup
    if (showFullscreenSuggest) {
      const fsPw = 380, fsPh = 200;
      const fsPx = W/2 - fsPw/2, fsPy = H/2 - fsPh/2;
      const fsBtnW = 120, fsBtnH = 38;
      const fsBtnY = fsPy + 130;
      // Yes button
      if (x >= W/2 - fsBtnW - 15 && x <= W/2 - 15 && y >= fsBtnY && y <= fsBtnY + fsBtnH) {
        showFullscreenSuggest = false;
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen();
        }
        return;
      }
      // No button
      if (x >= W/2 + 15 && x <= W/2 + fsBtnW + 15 && y >= fsBtnY && y <= fsBtnY + fsBtnH) {
        showFullscreenSuggest = false;
        return;
      }
      // Click outside popup closes it
      if (x < fsPx || x > fsPx + fsPw || y < fsPy || y > fsPy + fsPh) {
        showFullscreenSuggest = false;
        return;
      }
      return; // consume click while popup is open
    }

    const bx = W/2 - 90, bw = 180, bh = 44;
    const py = 225;
    // Start button: py+20 to py+20+bh = 245..289
    if (x >= bx && x <= bx + bw && y >= py + 20 && y <= py + 20 + bh) {
      gameState = 'levelSelect';
    }
    // Blacksmith: py+78
    if (x >= bx && x <= bx + bw && y >= py + 78 && y <= py + 78 + bh) {
      gameState = 'blacksmith';
    }
    // Help: py+136
    if (x >= bx && x <= bx + bw && y >= py + 136 && y <= py + 136 + bh) {
      helpScroll = 0;
      gameState = 'help';
    }
    // Save progress: py+194
    if (x >= bx && x <= bx + bw && y >= py + 194 && y <= py + 194 + bh) {
      gameState = 'saveGame';
    }
    // Load progress: py+252
    if (x >= bx && x <= bx + bw && y >= py + 252 && y <= py + 252 + bh) {
      gameState = 'loadGame';
    }
    // Settings: py+310
    if (x >= bx && x <= bx + bw && y >= py + 310 && y <= py + 310 + bh) {
      gameState = 'settings';
    }
    // About button (bottom right corner)
    if (x >= W - 80 && x <= W - 20 && y >= H - 34 && y <= H - 6) {
      gameState = 'about';
    }
    return;
  }

  if (gameState === 'help') {
    // Back button (drawn at 14, 12, 65, 30)
    if (x >= 14 && x <= 79 && y >= 12 && y <= 42) {
      gameState = 'menu';
      return;
    }
    // Scroll up
    if (x >= W/2 - 20 && x <= W/2 + 20 && y >= 60 && y <= 80) {
      helpScroll = Math.max(0, helpScroll - 60);
      return;
    }
    // Scroll down
    if (x >= W/2 - 20 && x <= W/2 + 20 && y >= H - 30 && y <= H - 10) {
      helpScroll = Math.min(600, helpScroll + 60);
      return;
    }
    // Mouse wheel scroll
    return;
  }

  if (gameState === 'about') {
    // Back button (drawn at 14, 12, 65, 30)
    if (x >= 14 && x <= 79 && y >= 12 && y <= 42) {
      gameState = 'menu';
      return;
    }
    return;
  }

  if (gameState === 'settings') {
    // 拖拽刚结束，跳过滑块区域的click处理（mousedown+mouseup已处理）
    if (settingsJustDragged) {
      settingsJustDragged = false;
      return;
    }

    // Back button (top-left)
    if (x >= 14 && x <= 79 && y >= 12 && y <= 42) {
      settingsDragging = null;
      gameState = 'menu';
      return;
    }

    const pw = 420, ph = 280;
    const ppx = W/2 - pw/2, ppy = 100;
    const sliderX = ppx + 100;
    const sliderW = 220;
    const handleH = 22;

    // Music slider area
    const musicY = ppy + 70;
    if (x >= sliderX - 10 && x <= sliderX + sliderW + 10 && y >= musicY - 15 && y <= musicY + handleH + 5) {
      musicVolume = Math.max(0, Math.min(100, Math.round(((x - sliderX) / sliderW) * 100)));
      saveVolumeSettings();
      syncBgmVolume();
      return;
    }

    // SFX slider area
    const sfxY = ppy + 160;
    if (x >= sliderX - 10 && x <= sliderX + sliderW + 10 && y >= sfxY - 15 && y <= sfxY + handleH + 5) {
      sfxVolume = Math.max(0, Math.min(100, Math.round(((x - sliderX) / sliderW) * 100)));
      saveVolumeSettings();
      return;
    }

    return;
  }

  if (gameState === 'blacksmith') {
    // Back button (drawn at 14, 12, 65, 30)
    if (x >= 14 && x <= 79 && y >= 12 && y <= 42) {
      gameState = 'menu';
      return;
    }

    // Upgrade buttons — match drawBlacksmith() positions
    for (let i = 0; i < PERMANENT_UPGRADES.length; i++) {
      const up = PERMANENT_UPGRADES[i];
      const currentLv = saveData.permanentUpgrades[up.id] || 0;
      const uy = 120 + i * 120; // matches draw: y = 120 + i * 120

      for (let lv = 0; lv < 3; lv++) {
        const lx = 110 + lv * 270; // matches draw: lx = 110 + lv * 270
        if (lv === currentLv && x >= lx && x <= lx + 240 && y >= uy + 36 && y <= uy + 86) {
          if (saveData.gold >= up.costs[lv]) {
            saveData.gold -= up.costs[lv];
            saveData.permanentUpgrades[up.id] = lv + 1;
            saveToDisk();
          }
        }
      }
    }
    return;
  }

  if (gameState === 'saveGame' || gameState === 'loadGame') {
    const isSave = gameState === 'saveGame';
    // Back button
    if (x >= 14 && x <= 79 && y >= 12 && y <= 42) {
      gameState = 'menu';
      return;
    }

    for (let i = 0; i < 3; i++) {
      const slot = getSaveSlots()[i];
      const sy = 110 + i * 140;

      if (slot) {
        if (isSave) {
          // Overwrite button: W-220 to W-140, sy+40 to sy+74
          if (x >= W - 220 && x <= W - 140 && y >= sy + 40 && y <= sy + 74) {
            saveToSlot(i);
            gameState = 'menu';
            return;
          }
          // Delete button: W-130 to W-70, sy+40 to sy+74
          if (x >= W - 130 && x <= W - 70 && y >= sy + 40 && y <= sy + 74) {
            deleteSlot(i);
            return;
          }
        } else {
          // Load button: W-180 to W-100, sy+40 to sy+74
          if (x >= W - 180 && x <= W - 100 && y >= sy + 40 && y <= sy + 74) {
            loadFromSlot(i);
            gameState = 'menu';
            return;
          }
          // Delete button: W-130 to W-70, sy+40 to sy+74
          if (x >= W - 130 && x <= W - 70 && y >= sy + 40 && y <= sy + 74) {
            deleteSlot(i);
            return;
          }
        }
      } else {
        // Empty slot - save button: W/2-50 to W/2+50, sy+80 to sy+110
        if (isSave && x >= W/2 - 50 && x <= W/2 + 50 && y >= sy + 80 && y <= sy + 110) {
          saveToSlot(i);
          gameState = 'menu';
          return;
        }
      }
    }

    // Export button (save screen)
    const btnY = 560;
    if (isSave && x >= W/2 - 80 && x <= W/2 + 80 && y >= btnY && y <= btnY + 36) {
      exportSave();
      return;
    }
    // Import button (load screen)
    if (!isSave && x >= W/2 - 80 && x <= W/2 + 80 && y >= btnY && y <= btnY + 36) {
      importSave();
      return;
    }
    return;
  }

  if (gameState === 'levelSelect') {
    // Back button (drawn at 14, 12, 65, 30)
    if (x >= 14 && x <= 79 && y >= 12 && y <= 42) {
      gameState = 'menu';
      return;
    }

    // Blacksmith (drawn at W/2-80, H-55, 160, 38)
    if (x >= W/2 - 80 && x <= W/2 + 80 && y >= H - 55 && y <= H - 17) {
      gameState = 'blacksmith';
      return;
    }

    // Level cards — dynamically compute positions to match drawLevelSelect()
    const difficulties = [
      { prefix: '1' },
      { prefix: '2' },
      { prefix: '3' }
    ];
    let yPos = 75;
    for (const diff of difficulties) {
      yPos += 15; // difficulty label height
      const levels = LEVELS.filter(l => l.id.startsWith(diff.prefix + '-'));
      for (let i = 0; i < levels.length; i++) {
        const lx = 40 + i * 230;
        const ly = yPos;
        if (x >= lx && x <= lx + 210 && y >= ly && y <= ly + 70) {
          if (saveData.unlockedLevels.includes(levels[i].id)) {
            storyLevelId = levels[i].id;
            storyScroll = 0;
            gameState = 'story';
          }
        }
      }
      yPos += 90; // card height 70 + gap 20
    }
    return;
  }

  if (gameState === 'battle' && battle) {
    // Back button (return to level select)
    if (x >= 14 && x <= 79 && y >= 7 && y <= 35) {
      gameState = 'levelSelect';
      battle = null; battleVolPanel = false;
      switchBgm('menu');
      return;
    }

    // Pause/Start button
    const pauseBtnX = 170, pauseBtnY = 7, pauseBtnW = 55, pauseBtnH = 28;
    if (x >= pauseBtnX && x <= pauseBtnX + pauseBtnW && y >= pauseBtnY && y <= pauseBtnY + pauseBtnH) {
      battle.paused = !battle.paused;
      return;
    }

    // Speed button (right of pause)
    const spdBtnX = pauseBtnX + pauseBtnW + 8, spdBtnY = 7, spdBtnW = 64, spdBtnH = 28;
    if (x >= spdBtnX && x <= spdBtnX + spdBtnW && y >= spdBtnY && y <= spdBtnY + spdBtnH) {
      battle.speedMult = battle.speedMult >= 3 ? 1 : battle.speedMult + 1;
      return;
    }

    // Volume button (right of speed button)
    const volBtnX = spdBtnX + spdBtnW + 8, volBtnY = 7, volBtnW = 72, volBtnH = 28;
    if (x >= volBtnX && x <= volBtnX + volBtnW && y >= volBtnY && y <= volBtnY + volBtnH) {
      battleVolPanel = !battleVolPanel;
      return;
    }

    // Volume panel sliders (when open)
    if (battleVolPanel) {
      const pvW = 340, pvH = 180;
      const pvX = volBtnX, pvY = volBtnY + volBtnH + 4;
      const pvSliderX = pvX + 90;
      const pvSliderW = 180;
      const pvHandleH = 18;
      const pvMusicY = pvY + 40;
      const pvSfxY = pvY + 110;

      if (x >= pvSliderX - 10 && x <= pvSliderX + pvSliderW + 10) {
        if (y >= pvMusicY - 15 && y <= pvMusicY + pvHandleH + 5) {
          musicVolume = Math.max(0, Math.min(100, Math.round(((x - pvSliderX) / pvSliderW) * 100)));
          saveVolumeSettings();
          syncBgmVolume();
          return;
        } else if (y >= pvSfxY - 15 && y <= pvSfxY + pvHandleH + 5) {
          sfxVolume = Math.max(0, Math.min(100, Math.round(((x - pvSliderX) / pvSliderW) * 100)));
          saveVolumeSettings();
          return;
        }
      }

      // Click outside panel closes it
      if (x < pvX || x > pvX + pvW || y < pvY || y > pvY + pvH) {
        battleVolPanel = false;
      }
    }

    if (battle.gameOver) {
      // Dynamically calculate button positions to match drawVictoryDefeat()
      const story = LEVEL_STORIES[battle.level.id];
      const hasEpilogue = battle.result === 'victory' && story && story.epilogue;
      const pw = 480;
      let ph;
      if (hasEpilogue) {
        const epLines = story.epilogue.split('\n');
        const epilogueH = epLines.reduce((h, line) => h + (line ? 22 : 8), 0);
        ph = 178 + 16 + epilogueH + 94 + 40;
        ph = Math.max(ph, 360);
      } else {
        ph = 320;
      }
      const ppy = Math.max(20, H/2 - ph/2 - 20);
      const by = hasEpilogue ? ppy + ph - 94 : ppy + 210;
      // Retry (drawn at W/2-155, by, 140, 42)
      if (x >= W/2 - 155 && x <= W/2 - 15 && y >= by && y <= by + 42) {
        battle = createBattle(battle.level.id);
        gameState = 'battle';
        switchBgm('battle');
      }
      // Back (drawn at W/2+15, by, 140, 42)
      if (x >= W/2 + 15 && x <= W/2 + 155 && y >= by && y <= by + 42) {
        gameState = 'levelSelect';
        battle = null; battleVolPanel = false;
        switchBgm('menu');
      }
      // Next (drawn at W/2-70, by+52, 140, 42)
      if (battle.result === 'victory') {
        if (x >= W/2 - 70 && x <= W/2 + 70 && y >= by + 52 && y <= by + 94) {
          const idx = LEVELS.findIndex(l => l.id === battle.level.id);
          if (idx < LEVELS.length - 1) {
            storyLevelId = LEVELS[idx + 1].id;
            storyScroll = 0;
            gameState = 'story';
            battle = null; battleVolPanel = false;
            switchBgm('menu');
          }
        }
      }
      return;
    }

    // Close popup
    if (popupPanel) {
      if (popupPanel === 'castle') {
        const pw = 520, ph = 440;
        const px = W/2 - pw/2, py = H/2 - ph/2;
        // Close button (drawn at W/2-45, py+ph-42, 90, 32)
        if (x >= W/2 - 45 && x <= W/2 + 45 && y >= py + ph - 42 && y <= py + ph - 10) {
          popupPanel = null;
          return;
        }
        // Castle upgrade buttons — match draw positions
        const modules = ['wall', 'tower', 'goldGen', 'manaGen'];
        for (let i = 0; i < modules.length; i++) {
          const mod = modules[i];
          const lv = battle.playerCastle.modules[mod];
          if (lv < 4) {
            const cost = CASTLE_MODULES[mod].costs[lv + 1];
            const modY = py + 55 + i * 70;
            const bx = px + pw - 135;
            if (x >= bx && x <= bx + 105 && y >= modY + 12 && y <= modY + 48) {
              if (battle.gold >= cost) {
                battle.gold -= cost;
                battle.playerCastle.modules[mod] = lv + 1;
                if (mod === 'wall') {
                  const newVal = CASTLE_MODULES.wall.values[lv + 1];
                  const hpGain = newVal - battle.playerCastle.wallMaxHp;
                  battle.playerCastle.wallMaxHp = newVal;
                  battle.playerCastle.wallHp += hpGain;
                }
                if (mod === 'tower') battle.playerCastle.towerDps = CASTLE_MODULES.tower.values[lv + 1];
                if (mod === 'goldGen') battle.goldPerSec = CASTLE_MODULES.goldGen.values[lv + 1] * battle.diff.goldMult;
                if (mod === 'manaGen') battle.manaPerSec = CASTLE_MODULES.manaGen.values[lv + 1] * battle.diff.manaMult;
              }
            }
          }
        }
        // Castle repair button
        const repairY = py + 55 + modules.length * 70;
        if (!battle.repairActive && battle.repairCooldown <= 0) {
          const bx = px + pw - 135;
          if (x >= bx && x <= bx + 105 && y >= repairY + 12 && y <= repairY + 48) {
            if (battle.gold >= 100) {
              battle.gold -= 100;
              const repairLv = (saveData.permanentUpgrades && saveData.permanentUpgrades.repairTech) || 0;
              battle.repairDuration = 10 + (repairLv > 0 ? PERMANENT_UPGRADES[4].values[repairLv - 1] : 0);
              battle.repairTimer = battle.repairDuration;
              battle.repairActive = true;
            }
          }
        }
        return;
      }

      if (popupPanel === 'upgrade') {
        const pw = 720, ph = 510;
        const px = W/2 - pw/2, py = H/2 - ph/2;
        // Close button (drawn at W/2-45, py+ph-42, 90, 32)
        if (x >= W/2 - 45 && x <= W/2 + 45 && y >= py + ph - 42 && y <= py + ph - 10) {
          popupPanel = null;
          return;
        }
        // Upgrade buttons — match draw positions
        const units = Object.keys(UNIT_TYPES).filter(u => saveData.unlockedUnits.includes(u));
        const cols = 3;
        const cellW = (pw - 40) / cols;
        for (let i = 0; i < units.length; i++) {
          const type = units[i];
          if (battle.unitUpgrades[type]) continue;
          const cost = UPGRADE_COSTS[type];
          if (battle.gold < cost) continue;
          const col = i % cols;
          const row = Math.floor(i / cols);
          const cx = px + 20 + col * cellW;
          const cy = py + 50 + row * 145;

          // A button (drawn at cx+10, cy+108, 55, 22)
          if (x >= cx + 10 && x <= cx + 65 && y >= cy + 108 && y <= cy + 130) {
            battle.gold -= cost;
            battle.unitUpgrades[type] = 'A';
            return;
          }
          // B button (drawn at cx+75, cy+108, 55, 22)
          if (x >= cx + 75 && x <= cx + 130 && y >= cy + 108 && y <= cy + 130) {
            battle.gold -= cost;
            battle.unitUpgrades[type] = 'B';
            return;
          }
        }
        return;
      }
    }

    // Spell targeting
    if (selectedSpell) {
      const spell = SPELLS.find(s => s.id === selectedSpell);
      if (spell && spell.needTarget) {
        if (y >= 200 && y <= 550 && x >= BATTLEFIELD.left && x <= BATTLEFIELD.right) {
          castSpell(selectedSpell, x, y, battle, 'player');
          selectedSpell = null;
          return;
        }
      }
      // Cancel spell on right click or clicking outside
      selectedSpell = null;
      return;
    }

    // Bottom bar buttons
    const unitKeys = Object.keys(UNIT_TYPES);
    const btnW = 80, btnH = 55;
    const btnY = 625;
    const startX = 200;

    // Unit buttons
    for (let i = 0; i < unitKeys.length; i++) {
      const key = unitKeys[i];
      const bx = startX + i * (btnW + 5);
      if (x >= bx && x <= bx + btnW && y >= btnY && y <= btnY + btnH) {
        if (saveData.unlockedUnits.includes(key)) {
          const ut = UNIT_TYPES[key];
          if (battle.gold >= ut.gold) {
            battle.gold -= ut.gold;
            const trainTime = ut.trainTime * battle.trainMult;
            battle.trainQueue.push({ type: key, timer: trainTime, totalTime: trainTime });
          }
        }
        return;
      }
    }

    // Spell buttons
    const spellStartX = startX + unitKeys.length * (btnW + 5) + 20;
    for (let i = 0; i < battle.availableSpells.length; i++) {
      const spId = battle.availableSpells[i];
      const bx = spellStartX + i * 70;
      if (x >= bx && x <= bx + 65 && y >= btnY && y <= btnY + btnH) {
        const sp = SPELLS.find(s => s.id === spId);
        const cdKey = `player_${spId}`;
        if (battle.mana >= sp.mana && (!battle[cdKey] || battle[cdKey] <= 0)) {
          if (sp.needTarget) {
            selectedSpell = spId;
          } else {
            castSpell(spId, 0, 0, battle, 'player');
          }
        }
        return;
      }
    }

    // Function buttons — left-aligned with militia (startX), text aligned with mana row
    const funcBtnW = 80, funcBtnH = 28, funcGap = 5;
    const funcY = 565;
    // Castle
    if (x >= startX && x <= startX + funcBtnW && y >= funcY && y <= funcY + funcBtnH) {
      popupPanel = 'castle';
      popupAnimStart = Date.now();
      return;
    }
    // Upgrade
    if (x >= startX + funcBtnW + funcGap && x <= startX + 2 * funcBtnW + funcGap && y >= funcY && y <= funcY + funcBtnH) {
      popupPanel = 'upgrade';
      popupAnimStart = Date.now();
      return;
    }
  }
}

// Right click cancels spell
canvas.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  selectedSpell = null;
  popupPanel = null;
});

// Mouse wheel scrolling for help page
canvas.addEventListener('wheel', (e) => {
  if (gameState === 'help') {
    e.preventDefault();
    helpScroll = Math.max(0, Math.min(600, helpScroll + e.deltaY * 0.5));
  }
}, { passive: false });

// ============================================================
//  GAME LOOP
// ============================================================

let cgVideoActive = false;

function gameLoop(timestamp) {
  if (cgVideoActive) { requestAnimationFrame(gameLoop); return; }
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  ctx.clearRect(0, 0, W, H);

  switch(gameState) {
    case 'opening':
      drawOpening();
      break;
    case 'menu':
      drawMenuBg();
      drawMenu();
      break;
    case 'help':
      drawMenuBg();
      drawHelp();
      break;
    case 'about':
      drawMenuBg();
      drawAbout();
      break;
    case 'settings':
      drawMenuBg();
      drawSettings();
      break;
    case 'levelSelect':
      drawMenuBg();
      drawLevelSelect();
      break;
    case 'story':
      drawLevelIntro();
      break;
    case 'blacksmith':
      drawMenuBg();
      drawBlacksmith();
      break;
    case 'saveGame':
      drawMenuBg();
      drawSaveLoadScreen('saveGame');
      break;
    case 'loadGame':
      drawMenuBg();
      drawSaveLoadScreen('loadGame');
      break;
    case 'battle':
      if (battle) {
        const battleDt = dt * (battle.speedMult || 1);
        updateBattle(battle, battleDt);
        drawBattle(battle);
        drawPopup(battle);
        if (battle.gameOver) drawVictoryDefeat(battle);
      }
      break;
  }

  // Hover cursor feedback
  canvas.style.cursor = isAnyBtnHovered ? 'pointer' : 'default';
  isAnyBtnHovered = false;

  requestAnimationFrame(gameLoop);
}

async function preloadAll() {
  const bar = document.getElementById('preloadBar');
  const text = document.getElementById('preloadText');
  const overlay = document.getElementById('preloadOverlay');
  let loaded = 0;
  const total = PRELOAD_ASSETS.length;

  const promises = PRELOAD_ASSETS.map(asset => {
    const name = asset.url.split('/').pop();
    return fetch(asset.url)
      .then(r => {
        if (!r.ok) throw new Error(name + ' HTTP ' + r.status);
        return r.blob();
      })
      .then(blob => {
        // Cache as object URL so subsequent loads use browser cache
        const objUrl = URL.createObjectURL(blob);
        // Store in a global cache map for the game to use
        if (!window.__assetCache) window.__assetCache = {};
        window.__assetCache[asset.url] = objUrl;
        loaded++;
        const pct = Math.round(loaded / total * 100);
        bar.style.width = pct + '%';
        text.textContent = '加载中 ' + loaded + '/' + total + ' (' + name + ')';
      })
      .catch(err => {
        loaded++;
        console.warn('Preload failed:', name, err);
        bar.style.width = Math.round(loaded / total * 100) + '%';
      });
  });

  await Promise.all(promises);
  text.textContent = '加载完成！';
  bar.style.width = '100%';
  // Short delay then hide overlay
  setTimeout(() => {
    overlay.style.transition = 'opacity 0.5s';
    overlay.style.opacity = '0';
    setTimeout(() => { overlay.style.display = 'none'; }, 500);
    // Start game
    openingAlpha = Date.now();
    requestAnimationFrame(gameLoop);
  }, 300);
}

// Don't start game loop until preload finishes
// (gameLoop is defined but not started until preloader calls it above)
</script>
