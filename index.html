//  RENDERING
// ============================================================

// ── Anime-style skill banner ──
function drawSkillBanner(b) {
  if (!b.skillBanner) return;
  const sb = b.skillBanner;
  const totalDur = sb.duration;
  const t = sb.timer / totalDur; // 1→0 as time passes

  // Timing phases: fly-in (1~0.75), hold (0.75~0.3), fly-out (0.3~0)
  let bannerX, bannerAlpha;
  if (t > 0.75) {
    // Fly in from left — overshoot then settle
    const rawP = (1 - t) / 0.25;
    const p = easeOutBack(rawP); // 0→~1.08→1.0, overshoots then settles
    bannerX = -400 + p * (W / 2 + 400); // rawP=0 → -400, rawP=1 → W/2
    bannerAlpha = Math.min(1, rawP * 4);
  } else if (t > 0.3) {
    // Hold at center
    bannerX = W / 2;
    bannerAlpha = 1;
  } else {
    // Fly out to right — starts slow then accelerates
    const rawP = (0.3 - t) / 0.3;
    const p = rawP * rawP * (3 - 2 * rawP); // smoothstep acceleration
    bannerX = W / 2 + p * (W / 2 + 200);
    bannerAlpha = t / 0.3;
  }

  ctx.save();
  ctx.globalAlpha = Math.max(0, Math.min(1, bannerAlpha));

  const bannerW = 360;
  const bannerH = 52;
  const angle = -0.06;

  ctx.translate(bannerX, H * 0.38);
  ctx.rotate(angle);

  // Banner background - dark gradient with fade edges
  const bgGrad = ctx.createLinearGradient(-bannerW / 2, 0, bannerW / 2, 0);
  bgGrad.addColorStop(0, 'rgba(0,0,0,0)');
  bgGrad.addColorStop(0.08, 'rgba(10,10,30,0.92)');
  bgGrad.addColorStop(0.92, 'rgba(10,10,30,0.92)');
  bgGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(-bannerW / 2, -bannerH / 2, bannerW, bannerH);

  // Top & bottom accent lines
  ctx.fillStyle = sb.color || '#ffcc00';
  ctx.fillRect(-bannerW * 0.4, -bannerH / 2, bannerW * 0.8, 3);
  ctx.fillRect(-bannerW * 0.4, bannerH / 2 - 3, bannerW * 0.8, 3);

  // Side decorative triangles
  ctx.beginPath();
  ctx.moveTo(-bannerW / 2 + 10, -8);
  ctx.lineTo(-bannerW / 2 + 22, 0);
  ctx.lineTo(-bannerW / 2 + 10, 8);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(bannerW / 2 - 10, -8);
  ctx.lineTo(bannerW / 2 - 22, 0);
  ctx.lineTo(bannerW / 2 - 10, 8);
  ctx.closePath();
  ctx.fill();

  // Spell name with glow
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 26px "Noto Sans SC", sans-serif';
  ctx.shadowColor = sb.color || '#ffcc00';
  ctx.shadowBlur = 16;
  ctx.fillStyle = '#fff';
  ctx.fillText(sb.name, 0, 0);
  ctx.shadowBlur = 0;
  ctx.fillText(sb.name, 0, 0);

  // Icon
  if (sb.icon) {
    ctx.font = '22px serif';
    ctx.fillText(sb.icon, -ctx.measureText(sb.name).width / 2 - 20, 1);
  }

  ctx.restore();
}

function drawBattle(b) {
  ctx.save();

  // Screen shake
  if (b.shakeTimer > 0) {
    const sx = (Math.random() - 0.5) * b.shakeIntensity * 2;
    const sy = (Math.random() - 0.5) * b.shakeIntensity * 2;
    ctx.translate(sx, sy);
  }

  const colors = b.colors;

  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, colors.sky);
  skyGrad.addColorStop(1, colors.ground);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Ground
  ctx.fillStyle = colors.ground;
  ctx.fillRect(0, 450, W, 270);

  // Path
  ctx.fillStyle = colors.path;
  ctx.fillRect(BATTLEFIELD.left, 280, BATTLEFIELD.width, 220);

  // Terrain visuals
  drawTerrainFeatures(b);

  // Castles
  drawCastle(b, 'player', BATTLEFIELD.left, 200, b.playerCastle);
  drawCastle(b, 'ai', BATTLEFIELD.right, 200, b.aiCastle);

  // Sub-tower
  if (b.subTower && b.subTower.hp > 0) {
    drawSubTower(b);
  }

  // Mines (cartoon style)
  for (const mine of b.mines) {
    const mc = mine.owner === 'player' ? '#4488ff' : mine.owner === 'ai' ? '#ff4444' : '#888844';
    const mcDk = mine.owner === 'player' ? '#2266cc' : mine.owner === 'ai' ? '#cc2222' : '#666622';
    // Mine base (rocky)
    ctx.fillStyle = mcDk;
    ctx.beginPath();
    ctx.ellipse(mine.x, 432, 14, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = mc;
    ctx.beginPath();
    ctx.ellipse(mine.x, 430, 12, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(mine.x, 430, 12, 7, 0, 0, Math.PI * 2);
    ctx.stroke();
    // Pickaxe icon
    ctx.fillStyle = '#ffcc00';
    ctx.font = '14px "Noto Sans SC", Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('⛏', mine.x, 436);
  }

  // Poison fog
  if (b.terrain === 'poison') {
    ctx.fillStyle = 'rgba(0, 180, 0, 0.3)';
    ctx.fillRect(BATTLEFIELD.left, 280, b.poisonFogLeft - BATTLEFIELD.left, 220);
    ctx.fillRect(b.poisonFogRight, 280, BATTLEFIELD.right - b.poisonFogRight, 220);
  }

  // Vision fog (3-1)
  if (b.visionFog) {
    // Draw fog, cut out around player units
    ctx.save();
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(10, 10, 30, 0.85)';
    ctx.fillRect(BATTLEFIELD.left, 200, BATTLEFIELD.width, 350);

    // Cut circles around player units
    ctx.globalCompositeOperation = 'destination-out';
    for (const u of b.playerUnits) {
      if (u.state === 'die') continue;
      const grad = ctx.createRadialGradient(u.x, u.y, 0, u.x, u.y, 150);
      grad.addColorStop(0, 'rgba(0,0,0,1)');
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(u.x - 150, u.y - 150, 300, 300);
    }
    // Always show own castle
    const cGrad = ctx.createRadialGradient(BATTLEFIELD.left + 50, 350, 0, BATTLEFIELD.left + 50, 350, 200);
    cGrad.addColorStop(0, 'rgba(0,0,0,1)');
    cGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = cGrad;
    ctx.fillRect(BATTLEFIELD.left - 150, 150, 400, 450);
    ctx.restore();
  }

  // Units
  drawUnits(b, b.playerUnits);
  drawUnits(b, b.aiUnits);

  // Projectiles (cartoon style with glow)
  for (const p of b.projectiles) {
    // Glow trail
    ctx.fillStyle = p.color || '#ffcc00';
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    // Core
    ctx.fillStyle = p.color || '#ffcc00';
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2);
    ctx.stroke();
    // Highlight
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(p.x - 1, p.y - 1, 1.2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Effects
  drawEffects(b);

  // Anime-style skill banner
  drawSkillBanner(b);

  // UI Overlay
  drawBattleUI(b);

  // ── Spell targeting preview ──
  if (selectedSpell) {
    const spell = SPELLS.find(s => s.id === selectedSpell);
    if (spell && spell.needTarget && spell.radius) {
      const inBounds = mouseX >= BATTLEFIELD.left && mouseX <= BATTLEFIELD.right &&
                       mouseY >= 200 && mouseY <= 550;
      if (inBounds) {
        const t = Date.now() * 0.003;
        const pulse = 1 + Math.sin(t) * 0.04;
        const r = spell.radius * pulse;
        const baseColor = SPELL_COLORS[selectedSpell] || '#ffffff';

        // ── Filled area (semi-transparent) ──
        ctx.save();
        ctx.globalAlpha = 0.12 + Math.sin(t) * 0.03;
        const fillGrd = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, r);
        fillGrd.addColorStop(0, baseColor);
        fillGrd.addColorStop(0.7, baseColor);
        fillGrd.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = fillGrd;
        ctx.beginPath();
        ctx.arc(mouseX, mouseY, r, 0, Math.PI * 2);
        ctx.fill();

        // ── Main targeting ring ──
        ctx.globalAlpha = 0.7 + Math.sin(t * 2) * 0.15;
        ctx.strokeStyle = baseColor;
        ctx.lineWidth = 2;
        ctx.setLineDash([8, 6]);
        ctx.lineDashOffset = -t * 20;
        ctx.beginPath();
        ctx.arc(mouseX, mouseY, r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);

        // ── Outer thin ring ──
        ctx.globalAlpha = 0.3;
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(mouseX, mouseY, r + 4, 0, Math.PI * 2);
        ctx.stroke();

        // ── Crosshair ──
        ctx.globalAlpha = 0.5;
        ctx.strokeStyle = baseColor;
        ctx.lineWidth = 1.5;
        const chLen = 10;
        ctx.beginPath();
        ctx.moveTo(mouseX - chLen, mouseY); ctx.lineTo(mouseX + chLen, mouseY);
        ctx.moveTo(mouseX, mouseY - chLen); ctx.lineTo(mouseX, mouseY + chLen);
        ctx.stroke();

        // ── Cardinal tick marks on ring ──
        ctx.globalAlpha = 0.6;
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        for (let i = 0; i < 4; i++) {
          const a = (i / 4) * Math.PI * 2 - Math.PI / 2;
          ctx.beginPath();
          ctx.moveTo(mouseX + Math.cos(a) * (r - 6), mouseY + Math.sin(a) * (r - 6));
          ctx.lineTo(mouseX + Math.cos(a) * (r + 6), mouseY + Math.sin(a) * (r + 6));
          ctx.stroke();
        }

        // ── Center dot ──
        ctx.globalAlpha = 0.9;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(mouseX, mouseY, 2.5, 0, Math.PI * 2);
        ctx.fill();

        // ── Range label ──
        ctx.globalAlpha = 0.85;
        ctx.font = '13px "Noto Sans SC", sans-serif';
        ctx.fillStyle = baseColor;
        ctx.textAlign = 'center';
        ctx.fillText(`${spell.name} · 范围${spell.radius}`, mouseX, mouseY - r - 10);

        ctx.restore();
      }
    }
  }

  ctx.restore();
}

// ── Cartoon castle silhouette helper ──
function drawCartoonTower(cx, cy, w, h, color1, color2, roofColor) {
  const s = PX || 2;
  // Tower body with stone gradient
  const grd = ctx.createLinearGradient(cx - w/2, cy, cx + w/2, cy);
  grd.addColorStop(0, color2);
  grd.addColorStop(0.3, color1);
  grd.addColorStop(0.7, color1);
  grd.addColorStop(1, color2);
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.moveTo(cx - w/2, cy);
  ctx.lineTo(cx - w/2, cy - h);
  ctx.lineTo(cx + w/2, cy - h);
  ctx.lineTo(cx + w/2, cy);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Stone lines
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 1;
  for (let i = 1; i < 4; i++) {
    const ly = cy - h + i * h / 4;
    ctx.beginPath();
    ctx.moveTo(cx - w/2, ly);
    ctx.lineTo(cx + w/2, ly);
    ctx.stroke();
  }

  // Pointed roof
  ctx.beginPath();
  ctx.moveTo(cx - w/2 - 5, cy - h);
  ctx.lineTo(cx, cy - h - 18);
  ctx.lineTo(cx + w/2 + 5, cy - h);
  ctx.closePath();
  ctx.fillStyle = roofColor;
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Flag on top
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx, cy - h - 18);
  ctx.lineTo(cx, cy - h - 30);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx, cy - h - 30);
  ctx.lineTo(cx + 10, cy - h - 26);
  ctx.lineTo(cx, cy - h - 22);
  ctx.closePath();
  ctx.fillStyle = roofColor;
  ctx.fill();
}

function drawCartoonBattlement(cx, cy, count, spacing, w, h, color) {
  for (let i = 0; i < count; i++) {
    const bx = cx + i * spacing - (count - 1) * spacing / 2 - w / 2;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(bx, cy);
    ctx.lineTo(bx, cy - h);
    ctx.lineTo(bx + w, cy - h);
    ctx.lineTo(bx + w, cy);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}

function drawCastle(b, team, x, y, castle) {
  const isPlayer = team === 'player';
  const baseX = isPlayer ? x : x - 80;
  const c1 = isPlayer ? '#8899aa' : '#aa6655';
  const c2 = isPlayer ? '#667788' : '#884433';
  const towerC = isPlayer ? '#99aabb' : '#bb7766';
  const roofC = isPlayer ? '#5577aa' : '#aa4433';
  const battC = isPlayer ? '#aabbcc' : '#cc8877';

  // Main castle body (rounded top edges)
  const grd = ctx.createLinearGradient(baseX, y, baseX + 80, y);
  grd.addColorStop(0, c2);
  grd.addColorStop(0.2, c1);
  grd.addColorStop(0.8, c1);
  grd.addColorStop(1, c2);
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.moveTo(baseX, y + 280);
  ctx.lineTo(baseX, y);
  ctx.lineTo(baseX + 80, y);
  ctx.lineTo(baseX + 80, y + 280);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2.5;
  ctx.stroke();

  // Stone texture lines
  ctx.strokeStyle = 'rgba(0,0,0,0.12)';
  ctx.lineWidth = 1;
  for (let i = 1; i < 8; i++) {
    const ly = y + i * 35;
    ctx.beginPath();
    ctx.moveTo(baseX, ly);
    ctx.lineTo(baseX + 80, ly);
    ctx.stroke();
  }

  // Side towers
  drawCartoonTower(baseX + 14, y, 22, 40, towerC, c2, roofC);
  drawCartoonTower(baseX + 66, y, 22, 40, towerC, c2, roofC);

  // Battlements on main wall
  drawCartoonBattlement(baseX + 40, y, 5, 18, 10, 12, battC);

  // Arrow slit windows
  ctx.fillStyle = '#222';
  for (let i = 0; i < 3; i++) {
    const wx = baseX + 15 + i * 25;
    ctx.fillRect(wx, y + 60, 3, 12);
    ctx.fillRect(wx - 2, y + 64, 7, 3);
  }

  // Gate (arched with wood texture)
  ctx.fillStyle = '#4a3520';
  ctx.beginPath();
  ctx.moveTo(baseX + 22, y + 280);
  ctx.lineTo(baseX + 22, y + 210);
  ctx.quadraticCurveTo(baseX + 40, y + 190, baseX + 58, y + 210);
  ctx.lineTo(baseX + 58, y + 280);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Gate wood planks
  ctx.strokeStyle = '#3a2510';
  ctx.lineWidth = 1;
  for (let i = 0; i < 3; i++) {
    const gx = baseX + 28 + i * 10;
    ctx.beginPath();
    ctx.moveTo(gx, y + 215);
    ctx.lineTo(gx, y + 280);
    ctx.stroke();
  }

  // Gate metal studs
  ctx.fillStyle = '#888';
  for (let i = 0; i < 2; i++) {
    for (let j = 0; j < 3; j++) {
      ctx.beginPath();
      ctx.arc(baseX + 30 + i * 18, y + 230 + j * 18, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Gate handle
  ctx.strokeStyle = '#999';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(baseX + 40, y + 240, 5, 0, Math.PI);
  ctx.stroke();

  // HP Bar with rounded corners
  const hpRatio = castle.wallHp / castle.wallMaxHp;
  const barW = 70, barH = 14;
  const barX = baseX + 5, barY = y - 55;
  // Bar background
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.moveTo(barX + 3, barY);
  ctx.lineTo(barX + barW - 3, barY);
  ctx.quadraticCurveTo(barX + barW, barY, barX + barW, barY + 3);
  ctx.lineTo(barX + barW, barY + barH - 3);
  ctx.quadraticCurveTo(barX + barW, barY + barH, barX + barW - 3, barY + barH);
  ctx.lineTo(barX + 3, barY + barH);
  ctx.quadraticCurveTo(barX, barY + barH, barX, barY + barH - 3);
  ctx.lineTo(barX, barY + 3);
  ctx.quadraticCurveTo(barX, barY, barX + 3, barY);
  ctx.closePath();
  ctx.fill();
  // HP fill
  const hpColor = hpRatio > 0.5 ? '#44cc44' : hpRatio > 0.25 ? '#cccc44' : '#cc4444';
  const hpGrd = ctx.createLinearGradient(barX, barY, barX, barY + barH);
  hpGrd.addColorStop(0, hpColor);
  hpGrd.addColorStop(1, hpRatio > 0.5 ? '#338833' : hpRatio > 0.25 ? '#888833' : '#882222');
  ctx.fillStyle = hpGrd;
  ctx.beginPath();
  ctx.moveTo(barX + 2, barY + 1);
  ctx.lineTo(barX + barW * hpRatio - 2, barY + 1);
  ctx.quadraticCurveTo(barX + barW * hpRatio, barY + 1, barX + barW * hpRatio, barY + 3);
  ctx.lineTo(barX + barW * hpRatio, barY + barH - 3);
  ctx.quadraticCurveTo(barX + barW * hpRatio, barY + barH - 1, barX + barW * hpRatio - 2, barY + barH - 1);
  ctx.lineTo(barX + 2, barY + barH - 1);
  ctx.quadraticCurveTo(barX, barY + barH - 1, barX, barY + barH - 3);
  ctx.lineTo(barX, barY + 3);
  ctx.quadraticCurveTo(barX, barY + 1, barX + 2, barY + 1);
  ctx.closePath();
  ctx.fill();
  // Bar border
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(barX + 3, barY);
  ctx.lineTo(barX + barW - 3, barY);
  ctx.quadraticCurveTo(barX + barW, barY, barX + barW, barY + 3);
  ctx.lineTo(barX + barW, barY + barH - 3);
  ctx.quadraticCurveTo(barX + barW, barY + barH, barX + barW - 3, barY + barH);
  ctx.lineTo(barX + 3, barY + barH);
  ctx.quadraticCurveTo(barX, barY + barH, barX, barY + barH - 3);
  ctx.lineTo(barX, barY + 3);
  ctx.quadraticCurveTo(barX, barY, barX + 3, barY);
  ctx.closePath();
  ctx.stroke();

  // HP text
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px "Noto Sans SC", Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(`${Math.ceil(castle.wallHp)}/${castle.wallMaxHp}`, baseX + 40, y - 44);

  // Tower DPS indicator
  if (castle.towerDps > 0) {
    ctx.fillStyle = '#ffcc00';
    ctx.font = '14px "Noto Sans SC", Arial, sans-serif';
    ctx.fillText(`🏹 ${castle.towerDps}`, baseX + 40, y - 62);
  }

  // Module level indicators
  ctx.font = '13px "Noto Sans SC", Arial, sans-serif';
  ctx.fillStyle = '#ddd';
  ctx.textAlign = isPlayer ? 'left' : 'right';
  const lx = isPlayer ? baseX + 88 : baseX - 5;
  ctx.fillText(`城墙Lv.${castle.modules.wall + 1}`, lx, y + 20);
  ctx.fillText(`箭塔Lv.${castle.modules.tower + 1}`, lx, y + 32);

  // AI towers count
  if (!isPlayer && castle.towers > 1) {
    ctx.fillStyle = '#ff8844';
    ctx.font = 'bold 13px "Noto Sans SC", Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`×${castle.towers} 箭塔`, baseX + 40, y - 72);
  }
}

function drawSubTower(b) {
  const t = b.subTower;
  // Tower body
  const grd = ctx.createLinearGradient(t.x - 15, 280, t.x + 15, 280);
  grd.addColorStop(0, '#6b5530');
  grd.addColorStop(0.5, '#8b7355');
  grd.addColorStop(1, '#6b5530');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.moveTo(t.x - 15, 340);
  ctx.lineTo(t.x - 15, 285);
  ctx.quadraticCurveTo(t.x - 15, 280, t.x - 10, 280);
  ctx.lineTo(t.x + 10, 280);
  ctx.quadraticCurveTo(t.x + 15, 280, t.x + 15, 285);
  ctx.lineTo(t.x + 15, 340);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Roof
  ctx.beginPath();
  ctx.moveTo(t.x - 20, 280);
  ctx.lineTo(t.x, 265);
  ctx.lineTo(t.x + 20, 280);
  ctx.closePath();
  ctx.fillStyle = '#aa4433';
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Window
  ctx.fillStyle = '#222';
  ctx.fillRect(t.x - 3, 290, 6, 10);
  ctx.beginPath();
  ctx.arc(t.x, 290, 3, Math.PI, 0);
  ctx.fill();

  // Stone lines
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 1;
  for (let i = 1; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(t.x - 15, 280 + i * 20);
    ctx.lineTo(t.x + 15, 280 + i * 20);
    ctx.stroke();
  }

  // HP bar (rounded)
  const ratio = t.hp / t.maxHp;
  const barW = 34, barH = 8;
  const barX = t.x - 17, barY = 258;
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(barX + 4, barY + barH/2, 4, -Math.PI/2, Math.PI/2);
  ctx.arc(barX + barW - 4, barY + barH/2, 4, Math.PI/2, -Math.PI/2);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = ratio > 0.5 ? '#cc4444' : '#ff2222';
  ctx.beginPath();
  ctx.arc(barX + 4, barY + barH/2, 3, -Math.PI/2, Math.PI/2);
  ctx.lineTo(barX + barW * ratio - 3, barY + barH - 1);
  ctx.arc(barX + barW * ratio - 3, barY + barH/2, 3, Math.PI/2, -Math.PI/2);
  ctx.lineTo(barX + 4, barY + 1);
  ctx.closePath();
  ctx.fill();
}

function drawTerrainFeatures(b) {
  const t = animFrame; // animation ticker

  switch(b.terrain) {
    case 'river': {
      // Water body with gradient
      const wGrd = ctx.createLinearGradient(500, 280, 500, 500);
      wGrd.addColorStop(0, 'rgba(40, 90, 180, 0.5)');
      wGrd.addColorStop(1, 'rgba(30, 60, 140, 0.3)');
      ctx.fillStyle = wGrd;
      ctx.beginPath();
      ctx.moveTo(500, 280);
      ctx.lineTo(700, 280);
      ctx.lineTo(700, 500);
      ctx.lineTo(500, 500);
      ctx.closePath();
      ctx.fill();

      // Cartoon waves
      for (let i = 0; i < 6; i++) {
        const wy = 295 + i * 35 + Math.sin(t * 0.06 + i * 1.2) * 4;
        ctx.strokeStyle = `rgba(120, 180, 255, ${0.4 - i * 0.05})`;
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(500, wy);
        ctx.bezierCurveTo(550, wy - 8 + Math.sin(t * 0.08 + i) * 3, 650, wy + 8 + Math.cos(t * 0.07 + i) * 3, 700, wy);
        ctx.stroke();
      }
      // Sparkles
      for (let i = 0; i < 4; i++) {
        const sx = 520 + i * 50 + Math.sin(t * 0.05 + i * 2) * 10;
        const sy = 310 + i * 40 + Math.cos(t * 0.04 + i) * 5;
        const sAlpha = 0.3 + Math.sin(t * 0.1 + i * 1.5) * 0.3;
        ctx.fillStyle = `rgba(200, 230, 255, ${sAlpha})`;
        ctx.beginPath();
        ctx.arc(sx, sy, 2, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    }

    case 'forest':
    case 'darkForest': {
      const fogAlpha = b.terrain === 'darkForest' ? 0.5 : 0.35;
      const leafC = b.terrain === 'darkForest' ? '#1a3a1a' : '#2a6a2a';

      // Forest ground shadow
      ctx.fillStyle = `rgba(20, 50, 20, ${fogAlpha})`;
      ctx.fillRect(200, 280, 150, 220);
      ctx.fillRect(850, 280, 150, 220);

      // Trees with round canopy
      for (let i = 0; i < 8; i++) {
        drawCartoonTree(200 + i * 20, 300 + (i % 3) * 30, leafC);
      }
      for (let i = 0; i < 8; i++) {
        drawCartoonTree(850 + i * 20, 300 + (i % 3) * 30, leafC);
      }

      // Dark forest: add mist
      if (b.terrain === 'darkForest') {
        for (let i = 0; i < 3; i++) {
          const mx = 250 + i * 200 + Math.sin(t * 0.02 + i) * 30;
          ctx.fillStyle = 'rgba(80, 100, 80, 0.15)';
          ctx.beginPath();
          ctx.ellipse(mx, 400, 80, 20, 0, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      break;
    }

    case 'bridge': {
      // Water below
      const wGrd = ctx.createLinearGradient(500, 390, 500, 500);
      wGrd.addColorStop(0, 'rgba(40, 90, 180, 0.35)');
      wGrd.addColorStop(1, 'rgba(30, 60, 140, 0.2)');
      ctx.fillStyle = wGrd;
      ctx.fillRect(500, 390, 200, 110);

      // Bridge planks with wood texture
      ctx.fillStyle = '#8B7355';
      ctx.beginPath();
      ctx.moveTo(500, 340);
      ctx.lineTo(700, 340);
      ctx.lineTo(700, 390);
      ctx.lineTo(500, 390);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#5a4a30';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Plank lines
      ctx.strokeStyle = '#6a5a40';
      ctx.lineWidth = 1.5;
      for (let i = 0; i < 10; i++) {
        const px = 500 + i * 20;
        ctx.beginPath();
        ctx.moveTo(px, 340);
        ctx.lineTo(px, 390);
        ctx.stroke();
      }

      // Railings
      ctx.strokeStyle = '#7a6a50';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(500, 335);
      ctx.lineTo(700, 335);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(500, 395);
      ctx.lineTo(700, 395);
      ctx.stroke();

      // Railing posts
      for (let i = 0; i < 5; i++) {
        const rx = 520 + i * 45;
        ctx.fillStyle = '#6a5a40';
        ctx.fillRect(rx - 2, 330, 4, 70);
      }

      // Water waves under bridge
      for (let i = 0; i < 3; i++) {
        const wy = 400 + i * 25 + Math.sin(t * 0.05 + i) * 3;
        ctx.strokeStyle = 'rgba(100, 160, 255, 0.3)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(510, wy);
        ctx.quadraticCurveTo(600, wy + 6, 690, wy);
        ctx.stroke();
      }
      break;
    }

    case 'fireTrap': {
      // Lava cracks on ground
      ctx.strokeStyle = 'rgba(255, 100, 0, 0.4)';
      ctx.lineWidth = 2;
      for (let i = 0; i < 6; i++) {
        const fx = 300 + i * 150 + Math.sin(i * 1.7) * 30;
        const fy = 350 + Math.cos(i * 2.3) * 40;
        ctx.beginPath();
        ctx.moveTo(fx, fy);
        ctx.lineTo(fx + 20 + Math.sin(t * 0.03 + i) * 5, fy + 15);
        ctx.lineTo(fx + 10, fy + 30);
        ctx.stroke();
        // Glow
        ctx.fillStyle = `rgba(255, 80, 0, ${0.2 + Math.sin(t * 0.08 + i * 2) * 0.15})`;
        ctx.beginPath();
        ctx.arc(fx + 10, fy + 15, 8, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    }

    case 'rockfall': {
      // Rocks scattered
      const rocks = [[300,380],[450,350],[700,370],[850,360],[600,400]];
      for (const [rx, ry] of rocks) {
        ctx.fillStyle = '#777766';
        ctx.beginPath();
        ctx.moveTo(rx, ry - 12);
        ctx.lineTo(rx + 10, ry - 5);
        ctx.lineTo(rx + 8, ry + 5);
        ctx.lineTo(rx - 8, ry + 5);
        ctx.lineTo(rx - 10, ry - 5);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#555';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
      break;
    }

    case 'wind': {
      // Wind streaks
      for (let i = 0; i < 8; i++) {
        const wx = (200 + i * 130 + t * 2) % (W + 100) - 50;
        const wy = 300 + i * 25 + Math.sin(t * 0.05 + i) * 10;
        ctx.strokeStyle = `rgba(200, 220, 255, ${0.2 + Math.sin(t * 0.08 + i) * 0.15})`;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(wx, wy);
        ctx.quadraticCurveTo(wx + 30, wy - 5, wx + 60, wy);
        ctx.stroke();
      }
      break;
    }

    case 'volcano': {
      // Lava pools
      for (let i = 0; i < 4; i++) {
        const vx = 350 + i * 200;
        const vy = 420 + Math.sin(i * 1.5) * 30;
        const vGrd = ctx.createRadialGradient(vx, vy, 0, vx, vy, 25);
        vGrd.addColorStop(0, `rgba(255, 100, 0, ${0.5 + Math.sin(t * 0.06 + i) * 0.2})`);
        vGrd.addColorStop(1, 'rgba(200, 50, 0, 0.1)');
        ctx.fillStyle = vGrd;
        ctx.beginPath();
        ctx.ellipse(vx, vy, 25, 15, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    }

    case 'poison': {
      // Poison fog handled in drawBattle
      break;
    }
  }
}

function drawCartoonTree(x, y, leafColor) {
  // Trunk with gradient
  const tGrd = ctx.createLinearGradient(x - 3, y, x + 3, y);
  tGrd.addColorStop(0, '#3a2510');
  tGrd.addColorStop(0.5, '#5a4020');
  tGrd.addColorStop(1, '#3a2510');
  ctx.fillStyle = tGrd;
  ctx.beginPath();
  ctx.moveTo(x - 3, y);
  ctx.lineTo(x - 2, y - 8);
  ctx.lineTo(x + 2, y - 8);
  ctx.lineTo(x + 3, y);
  ctx.closePath();
  ctx.fill();

  // Round canopy (3 overlapping circles)
  const lc = leafColor || '#2a6a2a';
  const dk = leafColor === '#1a3a1a' ? '#0a2a0a' : '#1a4a1a';
  ctx.fillStyle = lc;
  ctx.beginPath();
  ctx.arc(x, y - 20, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x - 6, y - 15, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + 6, y - 15, 8, 0, Math.PI * 2);
  ctx.fill();
  // Highlight
  ctx.fillStyle = `rgba(100, 200, 100, 0.25)`;
  ctx.beginPath();
  ctx.arc(x - 2, y - 22, 5, 0, Math.PI * 2);
  ctx.fill();
  // Outline
  ctx.strokeStyle = dk;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(x, y - 20, 10, 0, Math.PI * 2);
  ctx.stroke();
}

// ============================================================
//  PIXEL ART SPRITE ANIMATION SYSTEM
// ============================================================
//  Each unit has 4 states: idle / walk / attack / die
//  Each state has 4 animation frames, drawn procedurally
//  Sprite grid: 16 wide × 22 tall pixels, rendered at 2x scale
// ============================================================

const PX = 2; // pixel scale
const SPRITE_W = 16;
const SPRITE_H = 22;

// ─── EASING FUNCTIONS ─────────────────────────────────────
function easeInQuad(t) { return t * t; }
function easeOutQuad(t) { return t * (2 - t); }
function easeInOutQuad(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
function easeOutBack(t) { const c=1.70158; return 1+(c+1)*Math.pow(t-1,3)+c*Math.pow(t-1,2); }
function easeOutElastic(t) {
  if(t===0||t===1) return t;
  return Math.pow(2,-10*t)*Math.sin((t-0.1)*5*Math.PI)+1;
}
function lerp(a,b,t) { return a+(b-a)*t; }
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

// ── Hover & hit-test helpers ──
function hitTest(mx, my, x, y, w, h) { return mx >= x && mx <= x + w && my >= y && my <= y + h; }

// ─── PARTICLE SYSTEM ──────────────────────────────────────
const _particles = [];
function spawnParticle(x,y,vx,vy,life,color,size,type) {
  _particles.push({x,y,vx,vy,life,maxLife:life,color,size,type,age:0});
}
function updateParticles(dt) {
  for(let i=_particles.length-1;i>=0;i--) {
    const p=_particles[i];
    p.age+=dt;
    p.x+=p.vx*dt;
    p.y+=p.vy*dt;
    if(p.type==='dust') p.vy-=15*dt; // dust floats up
    else if(p.type==='spark') p.vy+=120*dt; // sparks fall
    else if(p.type==='debris') p.vy+=200*dt; // debris falls faster
    if(p.age>=p.life) _particles.splice(i,1);
  }
}
function drawParticles() {
  for(const p of _particles) {
    const t=1-p.age/p.life;
    ctx.globalAlpha=t;
    ctx.fillStyle=p.color;
    if(p.type==='spark') {
      // Spark: small bright dot with trail
      const sz=p.size*t;
      ctx.beginPath();
      ctx.arc(p.x,p.y,sz,0,Math.PI*2);
      ctx.fill();
      // Trail
      ctx.globalAlpha=t*0.4;
      ctx.beginPath();
      ctx.moveTo(p.x,p.y);
      ctx.lineTo(p.x-p.vx*0.03,p.y-p.vy*0.03);
      ctx.strokeStyle=p.color;
      ctx.lineWidth=sz*0.6;
      ctx.stroke();
    } else if(p.type==='debris') {
      // Debris: small rotating rectangle
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(p.age*8);
      const sz=p.size*t;
      ctx.fillRect(-sz/2,-sz/2,sz,sz);
      ctx.restore();
    } else {
      // Dust: soft circle
      const sz=p.size*(0.5+t*0.5);
      ctx.beginPath();
      ctx.arc(p.x,p.y,sz,0,Math.PI*2);
      ctx.fill();
    }
  }
  ctx.globalAlpha=1;
}

// Spawn attack sparks at a position
function spawnAttackSparks(x,y,count) {
  for(let i=0;i<count;i++){

// Draw a single pixel (at sprite-local coords, scaled by PX)
function px(x, y, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x * PX, y * PX, PX, PX);
}

// Draw a filled rect of pixels
function pxr(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x * PX, y * PX, w * PX, h * PX);
}

//  GLASS / FROSTED UI HELPERS

function drawGlass(x, y, w, h, opts) {
  const o = Object.assign({ alpha: 0.55, radius: 12, border: 'rgba(255,255,255,0.15)', inner: 'rgba(255,255,255,0.06)' }, opts);
  ctx.save();
  // Rounded rect path
  const r = o.radius;
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  // Fill
  ctx.fillStyle = `rgba(15, 15, 35, ${o.alpha})`;
  ctx.fill();
  // Inner highlight (top edge)
  const hlGrad = ctx.createLinearGradient(x, y, x, y + h * 0.4);
  hlGrad.addColorStop(0, o.inner);
  hlGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = hlGrad;
  ctx.fill();
  // Border
  ctx.strokeStyle = o.border;
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // Outer glow
  if (o.glow) {
    ctx.shadowColor = o.glow;
    ctx.shadowBlur = 18;
    ctx.strokeStyle = o.glow;
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
  ctx.restore();
}

function drawGlassBtn(x, y, w, h, opts) {
  const o = Object.assign({ alpha: 0.45, radius: 8, color: 'rgba(200,168,78,0.25)', border: 'rgba(200,168,78,0.4)', hover: true }, opts);
  const isHover = o.hover && hitTest(mouseX, mouseY, x, y, w, h);
  if (isHover) isAnyBtnHovered = true;
  ctx.save();
  const r = o.radius;
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.fillStyle = `rgba(15, 15, 35, ${o.alpha})`;
  ctx.fill();
  // Color overlay (brighter on hover)
  ctx.fillStyle = o.color;
  ctx.fill();
  // Top highlight
  const hl = ctx.createLinearGradient(x, y, x, y + h * 0.5);
  hl.addColorStop(0, 'rgba(255,255,255,0.12)');
  hl.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = hl;
  ctx.fill();
  ctx.strokeStyle = o.border;
  ctx.lineWidth = isHover ? 2 : 1;
  ctx.stroke();
  // ── Hover glow effect ──
  if (isHover) {
    ctx.shadowColor = o.border;
    ctx.shadowBlur = 14;
    ctx.strokeStyle = o.border;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.shadowBlur = 0;
    // Bright overlay
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fill();
    // Top edge highlight boost
    const hl2 = ctx.createLinearGradient(x, y, x, y + h * 0.3);
    hl2.addColorStop(0, 'rgba(255,255,255,0.18)');
    hl2.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = hl2;
    ctx.fill();
  }
  ctx.restore();
}

function drawGlassText(text, x, y, opts) {
  const o = Object.assign({ font: '14px "Noto Sans SC", sans-serif', color: '#fff', align: 'left', shadow: true }, opts);
  ctx.save();
  ctx.font = o.font;
  ctx.textAlign = o.align;
  if (o.shadow) {
    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur = 4;
    ctx.shadowOffsetY = 1;
  }
  ctx.fillStyle = o.color;
  ctx.fillText(text, x, y);
  ctx.restore();
}

// ── Gold bar (ingot) icon ──
function drawGoldBar(cx, cy, size) {
  ctx.save();
  const w = size * 1.5, h = size * 0.65;
  // Front face
  const fg = ctx.createLinearGradient(cx, cy - h * 0.1, cx, cy + h * 0.55);
  fg.addColorStop(0, '#ffdd44');
  fg.addColorStop(1, '#aa7700');
  ctx.fillStyle = fg;
  ctx.beginPath();
  ctx.moveTo(cx - w * 0.32, cy - h * 0.12);
  ctx.lineTo(cx + w * 0.32, cy - h * 0.12);
  ctx.lineTo(cx + w * 0.25, cy + h * 0.52);
  ctx.lineTo(cx - w * 0.25, cy + h * 0.52);
  ctx.closePath();
  ctx.fill();
  // Top face
  const tg = ctx.createLinearGradient(cx, cy - h * 0.12, cx, cy - h * 0.55);
  tg.addColorStop(0, '#ffee77');
  tg.addColorStop(1, '#ffcc22');
  ctx.fillStyle = tg;
  ctx.beginPath();
  ctx.moveTo(cx - w * 0.32, cy - h * 0.12);
  ctx.lineTo(cx + w * 0.32, cy - h * 0.12);
  ctx.lineTo(cx + w * 0.40, cy - h * 0.52);
  ctx.lineTo(cx - w * 0.24, cy - h * 0.52);
  ctx.closePath();
  ctx.fill();
  // Outline
  ctx.strokeStyle = '#775500';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(cx - w * 0.32, cy - h * 0.12);
  ctx.lineTo(cx + w * 0.32, cy - h * 0.12);
  ctx.lineTo(cx + w * 0.25, cy + h * 0.52);
  ctx.lineTo(cx - w * 0.25, cy + h * 0.52);
  ctx.closePath();
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx - w * 0.32, cy - h * 0.12);
  ctx.lineTo(cx - w * 0.24, cy - h * 0.52);
  ctx.lineTo(cx + w * 0.40, cy - h * 0.52);
  ctx.lineTo(cx + w * 0.32, cy - h * 0.12);
  ctx.stroke();
  // Shine
  ctx.fillStyle = 'rgba(255,255,220,0.35)';
  ctx.beginPath();
  ctx.moveTo(cx - w * 0.28, cy - h * 0.10);
  ctx.lineTo(cx + w * 0.10, cy - h * 0.10);
  ctx.lineTo(cx + w * 0.05, cy + h * 0.10);
  ctx.lineTo(cx - w * 0.22, cy + h * 0.10);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// Draw gold bar icon + label text
function drawGoldLabel(text, x, y, opts) {
  const o = Object.assign({ font: '14px "Noto Sans SC", sans-serif', color: '#fff', align: 'left', shadow: true, iconSize: 12 }, opts);
  ctx.save();
  ctx.font = o.font;
  const align = o.align;
  // Measure text width
  const textW = ctx.measureText(text).width;
  const iconW = o.iconSize * 1.8; // approximate icon width
  const gap = 4;
  const totalW = iconW + gap + textW;
  let startX = x;
  if (align === 'center') startX = x - totalW / 2;
  else if (align === 'right') startX = x - totalW;
  // Draw icon
  drawGoldBar(startX + iconW / 2, y - o.iconSize * 0.22, o.iconSize);
  // Draw text
  ctx.textAlign = 'left';
  if (o.shadow) {
    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur = 4;
    ctx.shadowOffsetY = 1;
  }
  ctx.fillStyle = o.color;
  ctx.fillText(text, startX + iconW + gap, y);
  ctx.restore();
}

function drawGlowBar(x, y, w, h, ratio, color) {
  ctx.save();
  // Track
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(x, y, w, h);
  // Fill
  const grad = ctx.createLinearGradient(x, y, x + w * ratio, y);
  grad.addColorStop(0, color);
  grad.addColorStop(1, color.replace(')', ',0.7)').replace('rgb', 'rgba'));
  ctx.fillStyle = grad;
  ctx.fillRect(x, y, w * ratio, h);
  // Glow
  ctx.shadowColor = color;
  ctx.shadowBlur = 6;
  ctx.fillRect(x, y, w * ratio, h);
  ctx.shadowBlur = 0;
  ctx.restore();
}

// ─── CARTOON VECTOR SPRITE SYSTEM ──────────────────────────
// Smooth vector drawing with cartoon outlines, replacing pixel art

// Rounded rectangle
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function vRect(x, y, w, h, fill, stroke, r) {
  const s = PX, rx = (r||2)*s;
  ctx.beginPath();
  ctx.moveTo(x*s+rx, y*s);
  ctx.lineTo(x*s+w*s-rx, y*s);
  ctx.quadraticCurveTo(x*s+w*s, y*s, x*s+w*s, y*s+rx);
  ctx.lineTo(x*s+w*s, y*s+h*s-rx);
  ctx.quadraticCurveTo(x*s+w*s, y*s+h*s, x*s+w*s-rx, y*s+h*s);
  ctx.lineTo(x*s+rx, y*s+h*s);
  ctx.quadraticCurveTo(x*s, y*s+h*s, x*s, y*s+h*s-rx);
  ctx.lineTo(x*s, y*s+rx);
  ctx.quadraticCurveTo(x*s, y*s, x*s+rx, y*s);
  ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=1.6;ctx.stroke();}
}

function vCirc(cx,cy,r,fill,stroke){
  ctx.beginPath();ctx.arc(cx*PX,cy*PX,r*PX,0,Math.PI*2);
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=1.6;ctx.stroke();}
}

function vEllipse(cx,cy,rx,ry,fill,stroke){
  ctx.beginPath();ctx.ellipse(cx*PX,cy*PX,rx*PX,ry*PX,0,0,Math.PI*2);
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=1.6;ctx.stroke();}
}

function vEye(cx,cy,sz,dir){
  const s=sz||1.5;
  vCirc(cx,cy,s,'#fff','#333');
  vCirc(cx+(dir||0)*0.3,cy,s*0.5,'#333');
  vCirc(cx+(dir||0)*0.3+0.2,cy-0.3,s*0.2,'#fff');
}

function vGrad(x,y,w,h,c1,c2,r){
  const s=PX,grd=ctx.createLinearGradient(x*s,y*s,x*s,(y+h)*s);
  grd.addColorStop(0,c1);grd.addColorStop(1,c2);
  vRect(x,y,w,h,grd,'#333',r);
}

function vRound(x,y,w,h,fill,stroke){
  ctx.beginPath();
  ctx.moveTo(x*PX,y*PX+h*PX/2);
  ctx.bezierCurveTo(x*PX,y*PX,(x+w)*PX,y*PX,(x+w)*PX,y*PX+h*PX/2);
  ctx.bezierCurveTo((x+w)*PX,(y+h)*PX,x*PX,(y+h)*PX,x*PX,y*PX+h*PX/2);
  ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=1.6;ctx.stroke();}
}

// ─── MILITIA ───────────────────────────────────────────────
function drawMilitiaSprite(u, frame, state) {
  const c=getPalette(u),f=frame,br=u.branch;
  const t=f/8; // normalized 0-1
  const bob=(state==='idle')?Math.sin(t*Math.PI*2)*0.6:0;
  const wk=(state==='walk')?Math.sin(t*Math.PI*2)*3:0;
  const ak=(state==='attack')?((f<4)?lerp(0,-4,t*2):lerp(-4,4,(t-0.5)*2)):0;

  if(state==='die'){ctx.save();ctx.translate(-f*1.5,f*2.5);ctx.globalAlpha*=(1-f*0.12);}

  // Legs (smooth walk cycle)
  const legSwing=wk;
  vRect(5,14+Math.max(0,-legSwing),2.5,5+Math.abs(legSwing),c.pants,'#333',1);
  vRect(8.5,14+Math.max(0,legSwing),2.5,5+Math.abs(legSwing),c.pants,'#333',1);
  vRect(4.5,18+Math.abs(legSwing),3.5,2,c.boots,'#333',1);
  vRect(8,18+Math.abs(legSwing),3.5,2,c.boots,'#333',1);

  // Body
  vGrad(4,6+bob,8,8,c.body,c.bodyDk,2);
  vRect(4,12+bob,8,1.5,c.boots,null,0);

  // Arms (smooth swing)
  vRect(2,7+bob+ak*0.3,2.5,5,c.skin,'#333',1);
  vRect(11.5,7+bob-ak*0.3,2.5,5,c.skin,'#333',1);

  if(br==='A'){
    vRect(3.5,5.5+bob,9,3,c.armor||c.body,'#333',1);
    vRect(0.5,5+bob-legSwing*0.3,4.5,7.5,c.shield,'#333',2);
    vRect(1,5.5+bob-legSwing*0.3,3.5,1.2,c.weaponHi,null,0);
    vRect(12.5,4+bob-ak*0.5,1.5,5.5,c.weaponHi,'#333',0);
  } else if(br==='B'){
    vRect(5,7+bob,1.5,3,'#cc2200',null,0);
    vRect(9.5,7+bob,1.5,3,'#cc2200',null,0);
    vRect(1,7+bob,1.5,5,c.weapon,'#333',0);
    vRect(13.5,7+bob,1.5,5,c.weapon,'#333',0);
    if(state==='attack'){vCirc(0.5,6+bob,2,'#ff4444',null);vCirc(15,6+bob,2,'#ff4444',null);}
  } else {
    // Sword with smooth attack swing
    const swordSwing=(state==='attack')?lerp(0,3,easeOutQuad(Math.min(1,t*2))):0;
    vRect(12.5+swordSwing,3+bob-ak*0.5,1.5,6,c.weaponHi,'#333',0);
    vRect(12+swordSwing,2+bob-ak*0.5,2.5,1.5,c.weapon,null,0);
    if(state==='attack'&&f<3){vCirc(14+swordSwing,2+bob-ak*0.5,2.5,'#ffff44',null);}
    // Shield
    vRect(1.5,8+bob,3,4,c.shield,'#333',1.5);
  }

  // Head with hair flutter
  vGrad(5,-1,6,7,c.skin,'#d4a878',3);
  // Hair flutter on walk
  const hairFlutter=(state==='walk')?Math.sin(t*Math.PI*2+0.5)*1.2:0;
  vRect(4.5,-1.5+hairFlutter*0.2,7,3,c.hair,'#333',2);
  // Hair strand flutter
  if(state==='walk'){
    ctx.strokeStyle=c.hair;ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(4.5*PX,(-0.5)*PX);
    ctx.quadraticCurveTo((3+hairFlutter)*PX,(2)*PX,(2.5+hairFlutter)*PX,(4)*PX);
    ctx.stroke();
  }
  vEye(6.5,2.5,1.2,state==='attack'?1:0);
  vEye(9.5,2.5,1.2,state==='attack'?1:0);
  if(state==='attack'){vRect(7,4.5,2,1,'#aa4444',null,0);}
  else{vRect(7.5,4.5,1.2,0.5,'#aa8877',null,0);}

  if(state==='die')ctx.restore();
}

// ─── ARCHER ────────────────────────────────────────────────
function drawArcherSprite(u, frame, state) {
  const c=getPalette(u),f=frame,br=u.branch;
  const t=f/8;
  const bob=(state==='idle')?Math.sin(t*Math.PI*2)*0.5:0;
  const wk=(state==='walk')?Math.sin(t*Math.PI*2)*2.5:0;
  const ak=(state==='attack')?((f<4)?lerp(0,-3,t*2):lerp(-3,4,(t-0.5)*2)):0;

  if(state==='die'){ctx.save();ctx.translate(-f*1.5,f*2.5);ctx.globalAlpha*=(1-f*0.12);}

  // Legs
  vRect(5,14+Math.max(0,-wk),2.5,5+Math.abs(wk),c.pants,'#333',1);
  vRect(8.5,14+Math.max(0,wk),2.5,5+Math.abs(wk),c.pants,'#333',1);
  vRect(4.5,18+Math.abs(wk),3.5,2,c.boots,'#333',1);
  vRect(8,18+Math.abs(wk),3.5,2,c.boots,'#333',1);

  // Body (tunic)
  vGrad(4.5,6+bob,7,8,c.body,c.bodyDk,2);
  vRect(4.5,12+bob,7,1.2,'#554433',null,0);

  // Quiver on back
  vRect(12,6+bob,2,6,'#8b6914','#333',1);
  vRect(12.5,5+bob,1,1.5,'#ffcc00',null,0);

  // Arms
  vRect(2.5,7+bob+ak*0.3,2.5,5,c.skin,'#333',1);
  vRect(11,7+bob-ak*0.3,2.5,5,c.skin,'#333',1);

  // Bow with smooth draw animation
  if(state==='attack'){
    const bend=easeOutQuad(Math.min(1,t*2.5))*3;
    ctx.beginPath();
    ctx.moveTo((13+bend)*PX,(3+bob)*PX);
    ctx.quadraticCurveTo((15)*PX,(8+bob)*PX,(13+bend)*PX,(13+bob)*PX);
    ctx.strokeStyle=c.weapon||'#8b6914';ctx.lineWidth=2.5;ctx.stroke();
    // String
    ctx.beginPath();
    ctx.moveTo((13+bend)*PX,(3+bob)*PX);
    ctx.lineTo((11)*PX,(7+bob)*PX);
    ctx.lineTo((13+bend)*PX,(13+bob)*PX);
    ctx.strokeStyle=c.string||'#ddd';ctx.lineWidth=1;ctx.stroke();
    // Arrow
    ctx.beginPath();
    ctx.moveTo(11*PX,(7+bob)*PX);
    ctx.lineTo((13+bend+2)*PX,(7+bob)*PX);
    ctx.strokeStyle='#aa8844';ctx.lineWidth=1.5;ctx.stroke();
    // Arrowhead
    vCirc(13+bend+2.5,7+bob,1,'#888','#333');
    if(f<3){vCirc(13+bend+3,7+bob,2.5,'#ffff44',null);}
    // Branch B: fire arrow with enhanced flame trail
    if(c.fireArrow){
      for(let fi=0;fi<4;fi++){
        const fx=11+fi*((13+bend+2-11)/4);
        const fy=7+bob+Math.sin(animFrame*0.5+fi*1.5)*2;
        vCirc(fx,fy,1.5-fi*0.3,fi<2?'#ff6600':fi===2?'#ffaa00':'rgba(255,200,0,0.5)',null);
      }
      vCirc(13+bend+2.5,7+bob,3,'rgba(255,100,0,0.4)',null);
    }
  } else {
    // Idle bow with subtle sway
    const bowSway=Math.sin(t*Math.PI*2)*0.3;
    ctx.beginPath();
    ctx.moveTo(13*PX,(4+bob+bowSway)*PX);
    ctx.quadraticCurveTo(15*PX,(9+bob)*PX,13*PX,(14+bob-bowSway)*PX);
    ctx.strokeStyle=c.weapon||'#8b6914';ctx.lineWidth=2;ctx.stroke();
  }

  // Head with hood flutter
  vGrad(5,-1,6,7,c.skin,'#d4a878',3);
  const hoodFlutter=(state==='walk')?Math.sin(t*Math.PI*2+0.3)*1:0;
  vRound(4.5,-2+hoodFlutter*0.2,7,4,c.body,'#333');
  // Hair strand flutter
  if(state==='walk'){
    ctx.strokeStyle=c.hair||c.body;ctx.lineWidth=1.2;
    ctx.beginPath();
    ctx.moveTo(4.5*PX,(-0.5)*PX);
    ctx.quadraticCurveTo((3+hoodFlutter)*PX,(2)*PX,(2.5+hoodFlutter)*PX,(4)*PX);
    ctx.stroke();
  }
  vEye(6.5,2.5,1.1,state==='attack'?1:0);
  vEye(9.5,2.5,1.1,state==='attack'?1:0);
  if(br==='A'&&state==='attack'){vCirc(10,1.5,0.5,'#aaddff',null);}
  vRect(7.5,4.5,1.2,0.5,'#aa8877',null,0);

  if(state==='die')ctx.restore();
}

// ─── KNIGHT ────────────────────────────────────────────────
function drawKnightSprite(u, frame, state) {
  const c=getPalette(u),f=frame,br=u.branch;
  const t=f/8;
  const bob=(state==='idle')?Math.sin(t*Math.PI*2)*0.5:0;
  const wk=(state==='walk')?Math.sin(t*Math.PI*2)*3:0;
  const ak=(state==='attack')?((f<4)?lerp(0,-4,t*2):lerp(-4,6,(t-0.5)*2)):0;

  if(state==='die'){ctx.save();ctx.translate(-f*1.5,f*2.5);ctx.globalAlpha*=(1-f*0.12);}

  // Legs (armored)
  vRect(4.5,14+Math.max(0,-wk),3,5+Math.abs(wk),c.pants,'#333',1);
  vRect(8.5,14+Math.max(0,wk),3,5+Math.abs(wk),c.pants,'#333',1);
  vRect(4,18+Math.abs(wk),3.5,2.5,c.boots,'#333',1);
  vRect(8.5,18+Math.abs(wk),3.5,2.5,c.boots,'#333',1);

  // Body (armored) with plate shimmer
  vGrad(3.5,5+bob,9,9,c.armor||c.body,c.bodyDk,2);
  vRect(3.5,5+bob,9,2,c.armorHi||c.body,null,0);
  vRect(3.5,11+bob,9,1.5,'#444',null,0);
  // Armor shine sweep
  const shineX=3.5+((t*12)%9);
  ctx.fillStyle='rgba(255,255,255,0.1)';
  ctx.fillRect((shineX)*PX,(5+bob)*PX,2*PX,9*PX);

  // Arms (armored)
  vRect(1.5,6+bob+ak*0.2,3,5.5,c.armor||c.body,'#333',1);
  vRect(11.5,6+bob-ak*0.2,3,5.5,c.armor||c.body,'#333',1);

  // Weapon with smooth thrust
  const swordThrust=(state==='attack')?easeOutBack(Math.min(1,t*2.5))*2.5:0;
  const sx=12.5+swordThrust;
  vRect(sx,1+bob-ak*0.3,1.5,8,c.weaponHi,'#333',0);
  vRect(sx-0.5,0+bob-ak*0.3,2.5,2,c.weapon,null,0);
  if(state==='attack'&&f<3){vCirc(sx+1,0+bob-ak*0.3,3,'#ffff66',null);}
  // Weapon trail
  if(state==='attack'&&f>=2&&f<=5){
    ctx.globalAlpha=(1-(f-2)/3)*0.4;
    ctx.strokeStyle=c.weaponHi||'#fff';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc((sx+1)*PX,(0+bob-ak*0.3)*PX,6*PX,-Math.PI*0.6,Math.PI*0.3);ctx.stroke();
    ctx.globalAlpha=1;
  }
  // Shield with bash
  const shieldBash=(state==='attack')?easeOutQuad(Math.min(1,t*2))*1.5:0;
  vRect(0-shieldBash,6+bob+ak*0.2,3,6,c.weapon,'#333',2);
  vRect(0.5-shieldBash,7+bob+ak*0.2,2,1.5,c.weaponHi,null,0);

  // Helmet
  vGrad(4.5,-2,7,7,c.armor||c.body,c.bodyDk,3);
  vRect(4.5,-2,7,2.5,c.armorHi||'#aabbdd','#333',2);
  vRect(5.5,1.5,5,1.5,'#222',null,0);
  vEye(7,1.5,0.8,state==='attack'?1:0);
  vEye(9.5,1.5,0.8,state==='attack'?1:0);
  // Plume with flutter
  const plumeFlutter=(state==='walk')?Math.sin(t*Math.PI*2+0.5)*1.5:0;
  vRect(6,-4+plumeFlutter*0.2,4,2.5,br==='A'?'#eedd88':br==='B'?'#884488':'#cc3333','#333',1);
  // Plume tail flutter
  if(state==='walk'){
    ctx.strokeStyle=br==='A'?'#eedd88':br==='B'?'#884488':'#cc3333';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(10*PX,(-4+plumeFlutter*0.2)*PX);
    ctx.quadraticCurveTo((11+plumeFlutter)*PX,(-5)*PX,(12+plumeFlutter)*PX,(-3)*PX);ctx.stroke();

  // Branch A: halo pulsing
  if(br==='A'){

    ctx.strokeStyle='rgba(255,230,100,'+haloPulse+')';ctx.lineWidth=2;ctx.stroke();

// ─── GIANT ─────────────────────────────────────────────────
function drawGiantSprite(u, frame, state) {

  vRect(13,4+bob-ak*0.3,3,7,c.skin||'#c4a060','#333',2);

  // Weapon with earth-shaking slam

  if(br==='A'){
    vRect(3,5+bob,2,2,'#777766',null,0);
    vRect(7,4+bob+Math.sin(t*Math.PI)*0.5,2,2,'#666655',null,0);
    vRect(10,7+bob,2,2,'#777766',null,0);

  // Branch B: chains swinging
  if(br==='B'){
    const chainSwing=Math.sin(t*Math.PI*2)*2;
    ctx.strokeStyle='#cc8844';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(1*PX,(5+bob)*PX);ctx.quadraticCurveTo((1+chainSwing)*PX,(8+bob)*PX,1*PX,(12+bob)*PX);ctx.stroke();
    ctx.beginPath();ctx.moveTo(15*PX,(5+bob)*PX);ctx.quadraticCurveTo((15-chainSwing)*PX,(8+bob)*PX,15*PX,(12+bob)*PX);ctx.stroke();

  vRect(4.5,-2,7,2.5,c.skinDk||'#9a7840','#333',2);
  vEye(6.5,1.5,1.3,state==='attack'?1:0);
  vEye(9.5,1.5,1.3,state==='attack'?1:0);
  if(state==='attack'){vRect(6.5,3.5,3,1.5,'#884444',null,0);}
  else{vRect(7,3.5,2,0.8,'#aa8877',null,0);}

  if(state==='die')ctx.restore();
}

    vCirc(14+fireProgress*2,1+bob,2,'#ffcc00',null);

    for(let fi=0;fi<3;fi++){

      const fDist=2+fireProgress*2;
      vCirc(13+fDist+Math.cos(fAngle)*2,1+bob+Math.sin(fAngle)*2,1.2,
        fi%2===0?'#ff8800':'#ffcc44',null);
