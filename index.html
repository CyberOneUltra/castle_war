function getAnimState(u) {
  if (u.state === 'die') return 'die';
  if (u.state === 'attack') return 'attack';
  if (u.state === 'walk') return 'walk';
  return 'idle';
}

function getFrameCount(state) {
  return 8; // 8 frames with interpolated keyframes
}

// Get eased animation progress (0-1) for smooth interpolation
function getEasedProgress(frame, frameCount, state) {
  const t = frame / frameCount;
  switch(state) {
    case 'walk': return easeInOutQuad(t);
    case 'attack': return easeOutBack(Math.min(1, t * 2)); // fast snap
    case 'die': return easeInQuad(t);
    default: return easeInOutQuad(t); // idle breathing
  }
}

// Interpolate between two frame values based on 8-frame position
function frameLerp(frame, val0, val1, val2, val3) {
  // Map 8 frames to 4 keyframes with smooth interpolation
  const keyframes = [val0, val1, val2, val3];
  const pos = (frame / 8) * 4;
  const idx = Math.floor(pos) % 4;
  const next = (idx + 1) % 4;
  const frac = pos - Math.floor(pos);
  const eased = easeInOutQuad(frac);
  return lerp(keyframes[idx], keyframes[next], eased);
}

// ─── MAIN DRAW FUNCTION ────────────────────────────────────

function drawUnits(b, units) {
  for (const u of units) {
    if (u.hp <= 0 && u.stateTimer <= 0) continue;

    const flip = u.dir < 0;
    const alpha = u.stealth > 0 ? 0.3 : (u.state === 'die' ? Math.max(0, u.stateTimer * 2) : 1);

    // Animation timing — 8 frames with easing
    const animState = getAnimState(u);
    const fc = getFrameCount(animState);
    const fps = animState === 'attack' ? 12 : animState === 'walk' ? 10 : 5;
    if (!u._animTimer) u._animTimer = 0;
    if (!u._animFrame) u._animFrame = 0;
    if (!u._prevFrame) u._prevFrame = 0;
    u._animTimer += 1 / 60;
    if (u._animTimer >= 1 / fps) {
      u._animTimer = 0;
      u._prevFrame = u._animFrame;
      u._animFrame = (u._animFrame + 1) % fc;
    }

    // Spawn walk dust particles every 4th frame
    if (animState === 'walk' && u._animFrame % 4 === 0 && Math.random() < 0.6) {
      spawnWalkDust(u.x, u.y + 2);
    }

    // Spawn death debris once
    if (animState === 'die' && u._animFrame === 0 && !u._deathParticles) {
      u._deathParticles = true;
      try { spawnDeathDebris(u.x, u.y, getPalette(u)); } catch(e) {}
    }

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(u.x, u.y);

    // Boss aura effect (before scaling)
    if (u.isBoss && u.state !== 'die') {
      const bossData = b.boss;
      const auraColor = bossData ? bossData.type.color : '#ff4444';
      const auraPulse = 0.15 + Math.sin(animFrame * 0.08) * 0.08;
      const auraSize = 40 + Math.sin(animFrame * 0.05) * 8;
      ctx.fillStyle = auraColor.replace(')', ',' + auraPulse + ')').replace('rgb', 'rgba').replace('#', '');
      // Simple hex to rgba
      const r = parseInt(auraColor.slice(1,3), 16) || 255;
      const g = parseInt(auraColor.slice(3,5), 16) || 68;
      const bl = parseInt(auraColor.slice(5,7), 16) || 68;
      ctx.fillStyle = `rgba(${r},${g},${bl},${auraPulse})`;
      ctx.beginPath();
      ctx.arc(0, 0, auraSize, 0, Math.PI * 2);
      ctx.fill();

      // Entrance flash
      if (bossData && bossData.entranceTimer > 0) {
        const flashAlpha = bossData.entranceTimer * 0.3;
        ctx.fillStyle = `rgba(${r},${g},${bl},${flashAlpha})`;
        ctx.beginPath();
        ctx.arc(0, 0, 60, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Giants are larger
    const unitScale = u.type === 'giant' ? 1.5 : u.isBoss ? 2.0 : 1;
    if (unitScale !== 1) ctx.scale(unitScale, unitScale);

    // Offset so sprite origin is at feet center
    const spriteOffsetX = -(SPRITE_W * PX) / 2;
    const spriteOffsetY = -(SPRITE_H * PX) + 4;
    ctx.translate(spriteOffsetX, spriteOffsetY);

    if (flip) {
      ctx.translate(SPRITE_W * PX / 2, 0);
      ctx.scale(-1, 1);
      ctx.translate(-SPRITE_W * PX / 2, 0);
    }

    // Shadow at feet (pulsing slightly)
    const shadowPulse = 1 + Math.sin(animFrame * 0.08) * 0.1;
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(SPRITE_W * PX / 2, SPRITE_H * PX + 2, 12 * shadowPulse * unitScale, 4 * shadowPulse * unitScale, 0, 0, Math.PI * 2);
    ctx.fill();

    // Draw the sprite with 8-frame animation
    const renderer = spriteRenderers[u.type];
    if (renderer) {
      renderer(u, u._animFrame, animState);
    }

    // ── Secondary animations ──

    // Weapon trail (for melee attackers during attack)
    if (animState === 'attack' && u._animFrame >= 2 && u._animFrame <= 5) {
      const ut = UNIT_TYPES[u.type];
      if (ut && ut.type === 'melee') {
        const trailAlpha = 1 - (u._animFrame - 2) / 3;
        ctx.globalAlpha = trailAlpha * 0.5 * alpha;
        const trailColor = getPalette(u).weaponHi || '#fff';
        // Arc trail behind weapon
        ctx.strokeStyle = trailColor;
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        const cx = 14 * PX, cy = (4 - u._animFrame * 0.8) * PX;
        ctx.arc(cx, cy, 8 * PX, -Math.PI * 0.8, Math.PI * 0.2);
        ctx.stroke();
        ctx.globalAlpha = alpha;
      }
    }

    // Ranged projectile trail glow
    if (animState === 'attack' && u._animFrame <= 2) {
      const ut = UNIT_TYPES[u.type];
      if (ut && ut.type === 'ranged') {
        const glowAlpha = (1 - u._animFrame / 2) * 0.4;
        ctx.globalAlpha = glowAlpha * alpha;
        ctx.fillStyle = u.type === 'mage' ? '#88ccff' : '#ffcc44';
        ctx.beginPath();
        ctx.arc(13 * PX, 2 * PX, 6 * PX, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = alpha;
      }
    }

    // Frozen overlay
    if (u.frozen > 0) {
      ctx.fillStyle = 'rgba(100, 180, 255, 0.4)';
      ctx.fillRect(0, 0, SPRITE_W * PX, SPRITE_H * PX);
      // Ice crystals with shimmer
      for (let i = 0; i < 3; i++) {
        const shimmer = Math.sin(animFrame * 0.2 + i * 2) * 0.3 + 0.7;
        ctx.globalAlpha = shimmer * 0.7 * alpha;
        vCirc(4 + i * 4, 4 + i * 3, 2, 'rgba(200,230,255,0.7)', null);
      }
      ctx.globalAlpha = alpha;
    }

    // Burning flames with flicker
    if (u.burning > 0) {
      for (let i = 0; i < 4; i++) {
        const fx = 3 + i * 3.5 + Math.sin(animFrame * 0.3 + i * 2) * 2.5;
        const fy = -3 + Math.sin(animFrame * 0.5 + i) * 3;
        const fh = 5 + Math.sin(animFrame * 0.4 + i * 1.5) * 2.5;
        const flicker = 0.5 + Math.sin(animFrame * 0.6 + i * 3) * 0.3;
        ctx.globalAlpha = flicker * alpha;
        ctx.fillStyle = i < 2 ? 'rgba(255,200,0,0.7)' : 'rgba(255,80,0,0.6)';
        ctx.fillRect(fx * PX, fy * PX, 2.5 * PX, fh * PX);
      }
      ctx.globalAlpha = alpha;
    }

    // Ash Brand burn — orange-red embers rising
    if (u.ashBurn > 0) {
      for (let i = 0; i < 3; i++) {
        const ex = 4 + i * 3 + Math.sin(animFrame * 0.25 + i * 2.5) * 3;
        const ey = -4 - ((animFrame * 1.5 + i * 8) % 12);
        const ea = 1 - ((animFrame * 1.5 + i * 8) % 12) / 12;
        ctx.globalAlpha = ea * 0.8 * alpha;
        ctx.fillStyle = i === 1 ? '#ff6600' : '#ff4400';
        ctx.beginPath();
        ctx.arc(ex * PX, ey * PX, 1.5 * PX, 0, Math.PI * 2);
        ctx.fill();
      }
      // Subtle orange glow on body
      ctx.globalAlpha = 0.15 * alpha;
      ctx.fillStyle = '#ff4400';
      ctx.fillRect(0, 0, SPRITE_W * PX, SPRITE_H * PX);
      ctx.globalAlpha = alpha;
    }

    // 斗志昂扬 buff — golden aura with rising particles
    if (u.fightSpirit > 0) {
      const fsPulse = 0.15 + Math.sin(animFrame * 0.3) * 0.08;
      ctx.globalAlpha = fsPulse * alpha;
      ctx.fillStyle = '#ff8800';
      ctx.beginPath();
      ctx.arc(8 * PX, 8 * PX, 12 * PX, 0, Math.PI * 2);
      ctx.fill();
      // Rising golden sparkles
      for (let i = 0; i < 4; i++) {
        const fsx = 3 + i * 3 + Math.sin(animFrame * 0.2 + i * 1.8) * 3;
        const fsy = -2 - ((animFrame * 1.2 + i * 6) % 10);
        const fsa = 1 - ((animFrame * 1.2 + i * 6) % 10) / 10;
        ctx.globalAlpha = fsa * 0.7 * alpha;
        ctx.fillStyle = '#ffcc44';
        ctx.beginPath();
        ctx.arc(fsx * PX, fsy * PX, 1.2 * PX, 0, Math.PI * 2);
        ctx.fill();
      }
      // Upward arrow indicator
      ctx.globalAlpha = (0.5 + Math.sin(animFrame * 0.4) * 0.3) * alpha;
      ctx.fillStyle = '#ffcc44';
      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('⚔', 8 * PX, -6 * PX);
      ctx.globalAlpha = alpha;
    }

    // ⚡ Paralysis — electric sparks crackling around body
    if (u.paralyzed > 0) {
      const pPulse = 0.3 + Math.sin(animFrame * 0.5) * 0.15;
      ctx.globalAlpha = pPulse * alpha;
      ctx.fillStyle = '#88ccff';
      ctx.beginPath();
      ctx.arc(8 * PX, 8 * PX, 10 * PX, 0, Math.PI * 2);
      ctx.fill();
      // Electric arcs
      for (let i = 0; i < 3; i++) {
        const ex = 4 + i * 3.5 + Math.sin(animFrame * 0.6 + i * 2) * 3;
        const ey = 2 + Math.cos(animFrame * 0.7 + i * 1.5) * 5;
        ctx.globalAlpha = (0.5 + Math.sin(animFrame * 0.8 + i * 3) * 0.3) * alpha;
        ctx.strokeStyle = '#aaeeff';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(ex * PX, ey * PX);
        ctx.lineTo((ex + Math.sin(animFrame * 0.9 + i) * 3) * PX, (ey - 3) * PX);
        ctx.stroke();
      }
      // ⚡ icon
      ctx.globalAlpha = (0.6 + Math.sin(animFrame * 0.4) * 0.3) * alpha;
      ctx.fillStyle = '#88ccff';
      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('⚡', 8 * PX, -6 * PX);
      ctx.globalAlpha = alpha;
    }

    // 😱 Frighten — red aura with shaking effect
    if (u.frightened > 0) {
      const fPulse = 0.2 + Math.sin(animFrame * 0.6) * 0.1;
      ctx.globalAlpha = fPulse * alpha;
      ctx.fillStyle = '#ff2222';
      ctx.beginPath();
      ctx.arc(8 * PX, 8 * PX, 10 * PX, 0, Math.PI * 2);
      ctx.fill();
      // Fear wobble lines
      for (let i = 0; i < 2; i++) {
        const lx = 3 + i * 8;
        const ly = -2 + Math.sin(animFrame * 0.8 + i * 3) * 2;
        ctx.globalAlpha = 0.5 * alpha;
        ctx.strokeStyle = '#ff6666';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(lx * PX, ly * PX);
        ctx.lineTo((lx + 1) * PX, (ly - 2) * PX);
        ctx.lineTo((lx + 2) * PX, ly * PX);
        ctx.stroke();
      }
      // 💀 icon
      ctx.globalAlpha = (0.6 + Math.sin(animFrame * 0.4) * 0.3) * alpha;
      ctx.fillStyle = '#ff4444';
      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('😱', 8 * PX, -6 * PX);
      ctx.globalAlpha = alpha;
    }

    // Stealth shimmer
    if (u.stealth > 0) {
      ctx.fillStyle = 'rgba(150, 150, 255, 0.1)';
      for (let i = 0; i < 5; i++) {
        const sx = Math.sin(animFrame * 0.15 + i * 1.5) * 10;
        const sy = Math.cos(animFrame * 0.12 + i * 1.2) * 8;
        ctx.beginPath();
        ctx.arc((8 + sx) * PX, (11 + sy) * PX, 2.5 * PX, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Branch indicator (colored glow under feet, pulsing)
    if (u.branch) {
      const bColor = u.branch === 'A' ? 'rgba(68,136,255,' : 'rgba(255,68,68,';
      const pulse = 0.3 + Math.sin(animFrame * 0.1) * 0.15;
      ctx.fillStyle = bColor + pulse + ')';
      ctx.beginPath();
      ctx.ellipse(SPRITE_W * PX / 2, SPRITE_H * PX + 4, 11, 3.5, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // ── Spawn attack sparks ──
    if (animState === 'attack' && u._animFrame === 3 && !u._sparkedThisAttack) {
      u._sparkedThisAttack = true;
      const sparkX = u.x + (flip ? -20 : 20);
      const sparkY = u.y - 15;
      spawnAttackSparks(sparkX, sparkY, 6);
    }
    if (animState !== 'attack') u._sparkedThisAttack = false;

    ctx.restore();

    // ── Overhead indicators (drawn in world space) ──

    // HP bar with smooth gradient
    if (u.hp < u.maxHp && u.hp > 0) {
      const giantBar = u.type === 'giant' || u.isBoss;
      const barW = u.isBoss ? 60 : giantBar ? 36 : 24;
      const barX = u.x - barW / 2;
      const barY = u.y - SPRITE_H * PX * (u.isBoss ? 2.0 : giantBar ? 1.5 : 1) - 14;
      const ratio = u.hp / u.maxHp;
      ctx.fillStyle = '#222';
      ctx.fillRect(barX - 1, barY - 1, barW + 2, u.isBoss ? 7 : 5);
      // Gradient HP bar
      const hpGrad = ctx.createLinearGradient(barX, barY, barX + barW * ratio, barY);
      if (ratio > 0.5) {
        hpGrad.addColorStop(0, '#44cc44');
        hpGrad.addColorStop(1, '#66ee66');
      } else if (ratio > 0.25) {
        hpGrad.addColorStop(0, '#cccc44');
        hpGrad.addColorStop(1, '#eeee66');
      } else {
        hpGrad.addColorStop(0, '#cc4444');
        hpGrad.addColorStop(1, '#ee6666');
      }
      ctx.fillStyle = hpGrad;
      ctx.fillRect(barX, barY, barW * ratio, u.isBoss ? 5 : 3);
      // Shine on HP bar
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.fillRect(barX, barY, barW * ratio, 1);

      // Boss name label above HP bar
      if (u.isBoss && b.boss) {
        const bossName = b.boss.type.name;
        ctx.save();
        ctx.font = 'bold 12px "Noto Sans SC", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = b.boss.type.color;
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 2;
        ctx.strokeText(bossName, u.x, barY - 6);
        ctx.fillText(bossName, u.x, barY - 6);
        ctx.restore();
      }
    }

    // Shield bubble (pulsing)
    if (u.shield > 0) {
      const shieldPulse = 1 + Math.sin(animFrame * 0.15) * 0.1;
      ctx.strokeStyle = 'rgba(100,180,255,0.6)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      const giantScale = u.type === 'giant' ? 1.5 : 1;
      ctx.arc(u.x, u.y - SPRITE_H * PX * giantScale / 2, (SPRITE_W * PX / 2 + 4) * shieldPulse * giantScale, 0, Math.PI * 2);
      ctx.stroke();
      // Inner glow
      ctx.fillStyle = 'rgba(100,180,255,0.08)';
      ctx.fill();
      ctx.fillStyle = '#88ccff';
      ctx.font = '13px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(Math.ceil(u.shield), u.x, u.y - SPRITE_H * PX - 14);
    }

    // Unit type icon (tiny, above head)
    const ut = UNIT_TYPES[u.type];
    if (ut) {
      ctx.font = '14px "Noto Sans SC", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(ut.icon, u.x, u.y - SPRITE_H * PX - 6);
    }
  }

  // Draw all particles on top
  drawParticles();
  updateParticles(1/60);
}

function drawEffects(b) {
  for (const e of b.effects) {
    switch(e.type) {
      case 'hit': {
        // Cartoon impact star
        const r = 8 * (e.timer / 0.3);
        const alpha = e.timer / 0.3;
        ctx.save();
        ctx.translate(e.x, e.y);
        ctx.globalAlpha = alpha;
        // Glow
        ctx.fillStyle = '#ffcc00';
        ctx.beginPath();
        ctx.arc(0, 0, r * 1.5, 0, Math.PI * 2);
        ctx.fill();
        // Star shape
        ctx.fillStyle = '#ffff44';
        ctx.beginPath();
        for (let i = 0; i < 8; i++) {
          const a = (i / 8) * Math.PI * 2 - Math.PI / 2;
          const ir = i % 2 === 0 ? r : r * 0.4;
          ctx.lineTo(Math.cos(a) * ir, Math.sin(a) * ir);
        }
        ctx.closePath();
        ctx.fill();
        // Center
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(0, 0, r * 0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        break;
      }

      case 'aoe':
        if (e.delay && e.delay > 0) {
          // Cartoon target reticle
          ctx.strokeStyle = '#ff4400';
          ctx.lineWidth = 2.5;
          ctx.setLineDash([6, 4]);
          ctx.beginPath();
          ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
          ctx.stroke();
          ctx.setLineDash([]);
          // Crosshair
          ctx.strokeStyle = 'rgba(255, 80, 0, 0.5)';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(e.x - e.radius * 0.3, e.y);
          ctx.lineTo(e.x + e.radius * 0.3, e.y);
          ctx.moveTo(e.x, e.y - e.radius * 0.3);
          ctx.lineTo(e.x, e.y + e.radius * 0.3);
          ctx.stroke();
        } else {
          // Cartoon explosion
          const p = 1 - e.timer;
          ctx.save();
          ctx.globalAlpha = e.timer;
          // Outer glow
          const exGrd = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.radius * (p + 0.3));
          exGrd.addColorStop(0, e.color || '#ff6600');
          exGrd.addColorStop(0.5, e.color || '#ff4400');
          exGrd.addColorStop(1, 'rgba(255, 68, 0, 0)');
          ctx.fillStyle = exGrd;
          ctx.beginPath();
          ctx.arc(e.x, e.y, e.radius * (p + 0.3), 0, Math.PI * 2);
          ctx.fill();
          // Inner bright core
          ctx.fillStyle = '#ffcc44';
          ctx.beginPath();
          ctx.arc(e.x, e.y, e.radius * 0.3 * e.timer, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
        break;

      case 'chain_lightning': {
        // Spectacular chain lightning bolt between two points
        const clP = 1 - e.timer / 0.6;
        const clAlpha = Math.min(1, e.timer * 3);
        ctx.save();

        // ── Background electric flash ──
        if (e.isFirst) {
          ctx.globalAlpha = clAlpha * 0.15 * (1 - clP);
          const flashGrd = ctx.createRadialGradient(e.toX, e.toY, 10, e.toX, e.toY, 200);
          flashGrd.addColorStop(0, 'rgba(150, 200, 255, 0.8)');
          flashGrd.addColorStop(1, 'rgba(50, 100, 200, 0)');
          ctx.fillStyle = flashGrd;
          ctx.beginPath();
          ctx.arc(e.toX, e.toY, 200, 0, Math.PI * 2);
          ctx.fill();
        }

        // ── Outer glow bolt ──
        ctx.globalAlpha = clAlpha * 0.5;
        ctx.strokeStyle = '#4488ff';
        ctx.lineWidth = 8;
        ctx.shadowColor = '#88ccff';
        ctx.shadowBlur = 25;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(e.fromX, e.fromY);
        const segments = 10;
        const dx = e.toX - e.fromX;
        const dy = e.toY - e.fromY;
        const boltPts = [];
        for (let i = 1; i < segments; i++) {
          const t = i / segments;
          const perpX = -dy;
          const perpY = dx;
          const len = Math.hypot(perpX, perpY) || 1;
          const offset = (Math.random() - 0.5) * 50 * (1 - Math.abs(t - 0.5) * 2);
          const px = e.fromX + dx * t + (perpX / len) * offset;
          const py = e.fromY + dy * t + (perpY / len) * offset;
          boltPts.push({ x: px, y: py });
          ctx.lineTo(px, py);
        }
        ctx.lineTo(e.toX, e.toY);
        ctx.stroke();

        // ── Medium glow bolt ──
        ctx.globalAlpha = clAlpha * 0.7;
        ctx.strokeStyle = '#88ddff';
        ctx.lineWidth = 4;
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.moveTo(e.fromX, e.fromY);
        for (const pt of boltPts) {
          const ox = (Math.random() - 0.5) * 15;
          const oy = (Math.random() - 0.5) * 15;
          ctx.lineTo(pt.x + ox, pt.y + oy);
        }
        ctx.lineTo(e.toX, e.toY);
        ctx.stroke();

        // ── White-hot core bolt ──
        ctx.globalAlpha = clAlpha * 0.9;
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.shadowColor = '#aaddff';
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.moveTo(e.fromX, e.fromY);
        for (const pt of boltPts) {
          const ox = (Math.random() - 0.5) * 6;
          const oy = (Math.random() - 0.5) * 6;
          ctx.lineTo(pt.x + ox, pt.y + oy);
        }
        ctx.lineTo(e.toX, e.toY);
        ctx.stroke();

        // ── Branch bolts (small side arcs) ──
        ctx.globalAlpha = clAlpha * 0.4;
        ctx.strokeStyle = '#66bbff';
        ctx.lineWidth = 1.5;
        ctx.shadowBlur = 10;
        for (let b = 0; b < 3; b++) {
          if (boltPts.length < 2) break;
          const idx = Math.floor(Math.random() * (boltPts.length - 1));
          const bp = boltPts[idx];
          const bLen = 20 + Math.random() * 30;
          const bAng = Math.random() * Math.PI * 2;
          ctx.beginPath();
          ctx.moveTo(bp.x, bp.y);
          ctx.lineTo(bp.x + Math.cos(bAng) * bLen, bp.y + Math.sin(bAng) * bLen);
          ctx.stroke();
        }

        ctx.restore();
        break;
      }

      case 'lightning_impact': {
        // Bright impact flash and sparks on chain target
        const liP = 1 - e.timer / 0.4;
        const liAlpha = Math.min(1, e.timer * 4);
        ctx.save();

        // ── Radial flash ──
        ctx.globalAlpha = liAlpha * (1 - liP * 0.8);
        const liGrd = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, 40 + liP * 30);
        liGrd.addColorStop(0, 'rgba(255, 255, 255, 0.9)');
        liGrd.addColorStop(0.3, 'rgba(150, 200, 255, 0.6)');
        liGrd.addColorStop(0.6, 'rgba(80, 140, 255, 0.3)');
        liGrd.addColorStop(1, 'rgba(40, 80, 200, 0)');
        ctx.fillStyle = liGrd;
        ctx.beginPath();
        ctx.arc(e.x, e.y, 40 + liP * 30, 0, Math.PI * 2);
        ctx.fill();

        // ── Electric ring ──
        ctx.globalAlpha = liAlpha * Math.max(0, 1 - liP * 1.5);
        ctx.strokeStyle = '#aaddff';
        ctx.lineWidth = 2;
        ctx.shadowColor = '#88ccff';
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.arc(e.x, e.y, 15 + liP * 40, 0, Math.PI * 2);
        ctx.stroke();

        ctx.restore();

        // ── Spawn sparks on first frame ──
        if (liP < 0.15) {
          for (let i = 0; i < 12; i++) {
            const ang = Math.random() * Math.PI * 2;
            const speed = 80 + Math.random() * 150;
            const sparkColors = ['#ffffff', '#aaddff', '#88ccff', '#6699ff', '#4488ff'];
            spawnParticle(e.x, e.y,
              Math.cos(ang) * speed, Math.sin(ang) * speed,
              0.3 + Math.random() * 0.3,
              sparkColors[Math.floor(Math.random() * sparkColors.length)],
              1 + Math.random() * 1.5, 'spark');
          }
          // Electric arcs
          for (let i = 0; i < 6; i++) {
            const ang = Math.random() * Math.PI * 2;
            const speed = 40 + Math.random() * 80;
            spawnParticle(e.x, e.y,
              Math.cos(ang) * speed, Math.sin(ang) * speed,
              0.2 + Math.random() * 0.2,
              '#88ccff',
              2 + Math.random() * 2, 'dust');
          }
        }
        break;
      }

      case 'text':
        ctx.save();
        ctx.fillStyle = e.color || '#fff';
        ctx.font = 'bold 16px "Noto Sans SC", Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.globalAlpha = Math.min(1, e.timer);
        // Outline for readability
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 3;
        ctx.strokeText(e.text, e.x, e.y - (1 - e.timer) * 30);
        ctx.fillText(e.text, e.x, e.y - (1 - e.timer) * 30);
        ctx.restore();
        break;

      case 'gold':
        ctx.save();
        ctx.fillStyle = '#ffcc00';
        ctx.font = 'bold 14px "Noto Sans SC", Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.globalAlpha = e.timer;
        ctx.strokeStyle = '#664400';
        ctx.lineWidth = 2;
        ctx.strokeText(e.text, e.x, e.y - (1 - e.timer) * 20);
        ctx.fillText(e.text, e.x, e.y - (1 - e.timer) * 20);
        ctx.restore();
        break;

      case 'heal': {
        ctx.save();
        // Follow the unit's current position
        const hx0 = e.unit ? e.unit.x : e.x;
        const hy0 = e.unit ? e.unit.y - 10 : e.y;
        ctx.globalAlpha = e.timer;
        for (let i = 0; i < 6; i++) {
          const hx = hx0 + Math.sin(animFrame * 0.15 + i * 1.05) * 18;
          const hy = hy0 + Math.cos(animFrame * 0.15 + i * 0.7) * 14;
          // Green plus with glow
          ctx.fillStyle = '#44ff44';
          ctx.shadowColor = '#22cc22';
          ctx.shadowBlur = 8;
          ctx.font = 'bold 16px "Noto Sans SC", Arial, sans-serif';
          ctx.fillText('+', hx, hy);
        }
        // Subtle green aura ring around the unit
        const pulseR = 14 + Math.sin(animFrame * 0.2) * 3;
        ctx.globalAlpha = e.timer * 0.25;
        ctx.fillStyle = '#44ff44';
        ctx.beginPath();
        ctx.arc(hx0, hy0 + 4, pulseR, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        break;
      }

      case 'warning': {
        ctx.save();
        ctx.globalAlpha = 0.5 + Math.sin(animFrame * 0.2) * 0.3;
        // Pulsing danger zone
        const wGrd = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.radius);
        wGrd.addColorStop(0, 'rgba(255, 0, 0, 0.3)');
        wGrd.addColorStop(0.7, 'rgba(255, 0, 0, 0.15)');
        wGrd.addColorStop(1, 'rgba(255, 0, 0, 0)');
        ctx.fillStyle = wGrd;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
        ctx.fill();
        // Warning ring
        ctx.strokeStyle = 'rgba(255, 50, 0, 0.5)';
        ctx.lineWidth = 2;
        ctx.setLineDash([8, 4]);
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.radius * 0.8, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
        break;
      }

      case 'freeze_explosion': {
        const fzP = 1 - e.timer / 1.8; // progress 0→1
        const fzAlpha = Math.min(1, e.timer * 1.5);
        ctx.save();

        // ── Expanding frost shockwave ring ──
        const fzRingR = e.radius * (0.3 + fzP * 1.4);
        ctx.globalAlpha = Math.max(0, 1 - fzP * 0.8) * 0.7;
        ctx.strokeStyle = '#aaddff';
        ctx.lineWidth = 4 + (1 - fzP) * 5;
        ctx.shadowColor = '#88ccff';
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.arc(e.x, e.y, fzRingR, 0, Math.PI * 2);
        ctx.stroke();
        ctx.shadowBlur = 0;

        // ── Secondary inner frost ring ──
        const fzRing2 = e.radius * (0.2 + fzP * 1.0);
        ctx.globalAlpha = Math.max(0, 1 - fzP) * 0.5;
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 8]);
        ctx.lineDashOffset = fzP * 60;
        ctx.beginPath();
        ctx.arc(e.x, e.y, fzRing2, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);

        // ── Multi-layer radial frost glow ──
        ctx.globalAlpha = fzAlpha * (1 - fzP * 0.5);
        // Outer cold blue glow
        const fzGrd1 = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.radius * (0.9 + fzP * 0.6));
        fzGrd1.addColorStop(0, 'rgba(200, 230, 255, 0.9)');
        fzGrd1.addColorStop(0.15, 'rgba(140, 200, 255, 0.7)');
        fzGrd1.addColorStop(0.4, 'rgba(80, 160, 240, 0.4)');
        fzGrd1.addColorStop(0.7, 'rgba(40, 100, 200, 0.15)');
        fzGrd1.addColorStop(1, 'rgba(20, 60, 160, 0)');
        ctx.fillStyle = fzGrd1;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.radius * (0.9 + fzP * 0.6), 0, Math.PI * 2);
        ctx.fill();

        // ── Bright icy core (white-hot freeze) ──
        ctx.globalAlpha = fzAlpha * Math.max(0, 1 - fzP * 2.2);
        const fzGrd2 = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.radius * 0.4);
        fzGrd2.addColorStop(0, 'rgba(255, 255, 255, 1)');
        fzGrd2.addColorStop(0.3, 'rgba(220, 240, 255, 0.8)');
        fzGrd2.addColorStop(0.7, 'rgba(150, 210, 255, 0.3)');
        fzGrd2.addColorStop(1, 'rgba(100, 180, 255, 0)');
        ctx.fillStyle = fzGrd2;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.radius * 0.4, 0, Math.PI * 2);
        ctx.fill();

        // ── Crystalline shimmer overlay ──
        const shimmer = Math.sin(Date.now() * 0.015) * 0.12 + Math.cos(Date.now() * 0.025) * 0.08;
        ctx.globalAlpha = fzAlpha * (1 - fzP * 0.7) * (0.25 + shimmer);
        const fzGrd3 = ctx.createRadialGradient(e.x + 8, e.y - 8, 0, e.x, e.y, e.radius * 0.7);
        fzGrd3.addColorStop(0, 'rgba(255, 255, 255, 0.7)');
        fzGrd3.addColorStop(0.5, 'rgba(180, 220, 255, 0.3)');
        fzGrd3.addColorStop(1, 'rgba(100, 180, 255, 0)');
        ctx.fillStyle = fzGrd3;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.radius * 0.7, 0, Math.PI * 2);
        ctx.fill();

        // ── Radial ice crack lines ──
        ctx.globalAlpha = fzAlpha * Math.max(0, 1 - fzP * 1.5) * 0.5;
        ctx.strokeStyle = '#ccddff';
        ctx.lineWidth = 1.5;
        const crackCount = 8;
        for (let i = 0; i < crackCount; i++) {
          const baseAngle = (i / crackCount) * Math.PI * 2;
          const jitter = Math.sin(i * 7.3) * 0.2;
          const crackLen = e.radius * (0.5 + fzP * 0.8) * (0.7 + Math.sin(i * 3.7) * 0.3);
          const ax = e.x + Math.cos(baseAngle + jitter) * crackLen;
          const ay = e.y + Math.sin(baseAngle + jitter) * crackLen;
          ctx.beginPath();
          ctx.moveTo(e.x, e.y);
          // Jagged crack path
          const segments = 3;
          for (let s = 1; s <= segments; s++) {
            const st = s / segments;
            const mx = e.x + Math.cos(baseAngle + jitter) * crackLen * st + Math.sin(i * s * 5) * 6;
            const my = e.y + Math.sin(baseAngle + jitter) * crackLen * st + Math.cos(i * s * 3) * 6;
            ctx.lineTo(mx, my);
          }
          ctx.stroke();
        }

        ctx.restore();

        // ── Spawn ice particles & frost shards ──
        if (fzP < 0.12) {
          // Frost dust floating upward
          for (let i = 0; i < 20; i++) {
            const ang = Math.random() * Math.PI * 2;
            const dist = Math.random() * e.radius * 0.7;
            const px = e.x + Math.cos(ang) * dist;
            const py = e.y + Math.sin(ang) * dist;
            const colors = ['#ccddff', '#aaccff', '#88bbff', '#eef4ff', '#ffffff'];
            spawnParticle(px, py,
              (Math.random() - 0.5) * 50, -30 - Math.random() * 80,
              0.8 + Math.random() * 0.6,
              colors[Math.floor(Math.random() * colors.length)],
              1.5 + Math.random() * 3, 'dust');
          }
          // Ice shards flying outward (spark type)
          for (let i = 0; i < 28; i++) {
            const ang = Math.random() * Math.PI * 2;
            const speed = 80 + Math.random() * 180;
            const shardColors = ['#ffffff', '#ccddff', '#aaccff', '#88ccff', '#e0eeff'];
            spawnParticle(e.x, e.y,
              Math.cos(ang) * speed, Math.sin(ang) * speed - 40,
              0.5 + Math.random() * 0.5,
              shardColors[Math.floor(Math.random() * shardColors.length)],
              1 + Math.random() * 2.5, 'spark');
          }
          // Ice debris (debris type, rotating frost chunks)
          for (let i = 0; i < 10; i++) {
            const ang = Math.random() * Math.PI * 2;
            const speed = 50 + Math.random() * 100;
            spawnParticle(e.x, e.y,
              Math.cos(ang) * speed, Math.sin(ang) * speed - 60,
              0.6 + Math.random() * 0.5,
              '#aaccee',
              2 + Math.random() * 2.5, 'debris');
          }
          // Snowflake particles (slow, drifting)
          for (let i = 0; i < 12; i++) {
            const ang = Math.random() * Math.PI * 2;
            const dist = Math.random() * e.radius * 0.5;
            spawnParticle(e.x + Math.cos(ang) * dist, e.y + Math.sin(ang) * dist,
              (Math.random() - 0.5) * 25, -15 - Math.random() * 30,
              1.0 + Math.random() * 0.8,
              '#ffffff',
              2 + Math.random() * 2, 'dust');
          }
        }
        break;
      }

      case 'fireball_explosion': {
        const fbP = 1 - e.timer / 1.2; // progress 0→1
        const fbAlpha = Math.min(1, e.timer * 2);
        ctx.save();

        // ── Outer shockwave ring ──
        const ringR = e.radius * (0.5 + fbP * 1.2);
        ctx.globalAlpha = Math.max(0, 1 - fbP) * 0.6;
        ctx.strokeStyle = '#ff8800';
        ctx.lineWidth = 3 + (1 - fbP) * 4;
        ctx.beginPath();
        ctx.arc(e.x, e.y, ringR, 0, Math.PI * 2);
        ctx.stroke();

        // ── Multi-layer radial glow ──
        ctx.globalAlpha = fbAlpha * (1 - fbP * 0.6);
        // Outer orange-red glow
        const grd1 = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.radius * (0.8 + fbP * 0.8));
        grd1.addColorStop(0, 'rgba(255, 240, 180, 0.9)');
        grd1.addColorStop(0.2, 'rgba(255, 180, 50, 0.7)');
        grd1.addColorStop(0.5, 'rgba(255, 100, 20, 0.4)');
        grd1.addColorStop(1, 'rgba(200, 40, 0, 0)');
        ctx.fillStyle = grd1;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.radius * (0.8 + fbP * 0.8), 0, Math.PI * 2);
        ctx.fill();

        // ── Bright white-hot core ──
        ctx.globalAlpha = fbAlpha * Math.max(0, 1 - fbP * 2.5);
        const grd2 = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.radius * 0.35);
        grd2.addColorStop(0, 'rgba(255, 255, 240, 1)');
        grd2.addColorStop(0.5, 'rgba(255, 220, 150, 0.7)');
        grd2.addColorStop(1, 'rgba(255, 160, 50, 0)');
        ctx.fillStyle = grd2;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.radius * 0.35, 0, Math.PI * 2);
        ctx.fill();

        // ── Secondary flickering glow (flame wobble) ──
        const wobble = Math.sin(Date.now() * 0.02) * 0.15 + Math.cos(Date.now() * 0.035) * 0.1;
        ctx.globalAlpha = fbAlpha * (1 - fbP) * (0.3 + wobble);
        const grd3 = ctx.createRadialGradient(e.x, e.y - 5, 0, e.x, e.y - 5, e.radius * 0.6);
        grd3.addColorStop(0, 'rgba(255, 200, 80, 0.8)');
        grd3.addColorStop(1, 'rgba(255, 100, 20, 0)');
        ctx.fillStyle = grd3;
        ctx.beginPath();
        ctx.arc(e.x, e.y - 5, e.radius * 0.6, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();

        // ── Spawn fire particles & sparks on first frame ──
        if (fbP < 0.15) {
          // Fire embers rising up
          for (let i = 0; i < 18; i++) {
            const ang = Math.random() * Math.PI * 2;
            const dist = Math.random() * e.radius * 0.6;
            const px = e.x + Math.cos(ang) * dist;
            const py = e.y + Math.sin(ang) * dist;
            const colors = ['#ff4400', '#ff6600', '#ff8800', '#ffaa22', '#ffcc44'];
            spawnParticle(px, py,
              (Math.random() - 0.5) * 80, -40 - Math.random() * 100,
              0.6 + Math.random() * 0.5,
              colors[Math.floor(Math.random() * colors.length)],
              1.5 + Math.random() * 2.5, 'dust');
          }
          // Bright sparks flying outward
          for (let i = 0; i < 24; i++) {
            const ang = Math.random() * Math.PI * 2;
            const speed = 100 + Math.random() * 200;
            const sparkColors = ['#ffee66', '#ffcc33', '#ff9922', '#ffffff', '#ffdd88'];
            spawnParticle(e.x, e.y,
              Math.cos(ang) * speed, Math.sin(ang) * speed - 60,
              0.4 + Math.random() * 0.4,
              sparkColors[Math.floor(Math.random() * sparkColors.length)],
              1 + Math.random() * 2, 'spark');
          }
          // White-hot debris
          for (let i = 0; i < 8; i++) {
            const ang = Math.random() * Math.PI * 2;
            const speed = 60 + Math.random() * 120;
            spawnParticle(e.x, e.y,
              Math.cos(ang) * speed, Math.sin(ang) * speed - 80,
              0.5 + Math.random() * 0.4,
              '#ff6622',
              2 + Math.random() * 2, 'debris');
          }
        }
        break;
      }

      case 'doomsday': {
        // Legacy fallback (should not trigger with new spell)
        ctx.save();
        ctx.globalAlpha = e.timer;
        const dGrd = ctx.createRadialGradient(W/2, H/2, 50, W/2, H/2, 700);
        dGrd.addColorStop(0, 'rgba(255, 136, 0, 0.8)');
        dGrd.addColorStop(0.5, 'rgba(200, 100, 0, 0.6)');
        dGrd.addColorStop(1, 'rgba(100, 50, 0, 0.4)');
        ctx.fillStyle = dGrd;
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
        break;
      }

      case 'teleportFlash': {
        ctx.save();
        const tfP = 1 - e.timer / e.maxTimer; // 0→1
        const tfAlpha = Math.min(1, e.timer * 3);
        // Expanding golden flash
        const tfR = 10 + tfP * 30;
        ctx.globalAlpha = tfAlpha * (1 - tfP * 0.8);
        const tfGrd = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, tfR);
        tfGrd.addColorStop(0, 'rgba(255, 200, 80, 0.9)');
        tfGrd.addColorStop(0.4, 'rgba(255, 160, 40, 0.5)');
        tfGrd.addColorStop(1, 'rgba(255, 120, 0, 0)');
        ctx.fillStyle = tfGrd;
        ctx.beginPath();
        ctx.arc(e.x, e.y, tfR, 0, Math.PI * 2);
        ctx.fill();
        // Sparkle particles
        for (let i = 0; i < 6; i++) {
          const sa = (i / 6) * Math.PI * 2 + tfP * 4;
          const sr = tfR * 0.6 * (0.5 + tfP * 0.5);
          const sx = e.x + Math.cos(sa) * sr;
          const sy = e.y + Math.sin(sa) * sr;
          ctx.globalAlpha = tfAlpha * (1 - tfP);
          vCirc(sx, sy, 1.5, '#ffdd88', null);
        }
        ctx.restore();
        break;
      }

      case 'raidCircle': {
        ctx.save();
        const rcP = 1 - e.timer / e.maxTimer; // 0→1
        const rcAlpha = Math.min(1, e.timer * 2);
        const rcR = e.radius;
        // Pulsing orange circle
        const rcPulse = 1 + Math.sin(rcP * Math.PI * 6) * 0.05;
        ctx.globalAlpha = rcAlpha * (1 - rcP * 0.6);
        ctx.strokeStyle = '#ff8800';
        ctx.lineWidth = 3;
        ctx.shadowColor = '#ff8800';
        ctx.shadowBlur = 12;
        ctx.setLineDash([6, 4]);
        ctx.lineDashOffset = -rcP * 100;
        ctx.beginPath();
        ctx.arc(e.x, e.y, rcR * rcPulse, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.shadowBlur = 0;
        // Inner glow
        const rcGrd = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, rcR * 0.7);
        rcGrd.addColorStop(0, 'rgba(255, 160, 40, 0.3)');
        rcGrd.addColorStop(0.6, 'rgba(255, 120, 0, 0.1)');
        rcGrd.addColorStop(1, 'rgba(255, 80, 0, 0)');
        ctx.fillStyle = rcGrd;
        ctx.beginPath();
        ctx.arc(e.x, e.y, rcR * 0.7, 0, Math.PI * 2);
        ctx.fill();
        // Crosshair
        ctx.globalAlpha = rcAlpha * 0.5;
        ctx.strokeStyle = '#ffcc66';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(e.x - 12, e.y); ctx.lineTo(e.x + 12, e.y);
        ctx.moveTo(e.x, e.y - 12); ctx.lineTo(e.x, e.y + 12);
        ctx.stroke();
        ctx.restore();
        break;
      }

      case 'bossAoe': {
        const baoP = 1 - e.timer / e.maxTimer;
        ctx.save();
        ctx.globalAlpha = e.timer * 0.6;
        // Expanding ring
        const baoR = e.radius * (baoP + 0.3);
        ctx.strokeStyle = e.color || '#ff4444';
        ctx.lineWidth = 4 * (1 - baoP);
        ctx.beginPath();
        ctx.arc(e.x, e.y, baoR, 0, Math.PI * 2);
        ctx.stroke();
        // Inner glow
        const baoGrd = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, baoR * 0.5);
        baoGrd.addColorStop(0, (e.color || '#ff4444') + '44');
        baoGrd.addColorStop(1, (e.color || '#ff4444') + '00');
        ctx.fillStyle = baoGrd;
        ctx.beginPath();
        ctx.arc(e.x, e.y, baoR * 0.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        break;
      }

      case 'bossDeathParticle': {
        ctx.save();
        ctx.globalAlpha = Math.min(1, e.timer);
        ctx.fillStyle = e.color || '#ff4444';
        ctx.shadowColor = e.color || '#ff4444';
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.size || 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        break;
      }

      case 'holyShield': {
        ctx.save();
        const hsP = 1 - e.timer / e.maxTimer; // 0→1
        const hsAlpha = Math.min(1, e.timer * 2);
        // Expanding golden ring
        const hsR = 30 + hsP * 50;
        ctx.globalAlpha = hsAlpha * (1 - hsP * 0.7);
        ctx.strokeStyle = '#ffcc44';
        ctx.lineWidth = 3;
        ctx.shadowColor = '#ffcc44';
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.arc(e.x, e.y, hsR, 0, Math.PI * 2);
        ctx.stroke();
        ctx.shadowBlur = 0;
        // Inner golden glow
        const hsGrd = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, hsR * 0.6);
        hsGrd.addColorStop(0, 'rgba(255,220,100,0.5)');
        hsGrd.addColorStop(0.5, 'rgba(255,200,60,0.2)');
        hsGrd.addColorStop(1, 'rgba(255,180,40,0)');
        ctx.fillStyle = hsGrd;
        ctx.beginPath();
        ctx.arc(e.x, e.y, hsR * 0.6, 0, Math.PI * 2);
        ctx.fill();
        // Rising golden particles
        for (let i = 0; i < 6; i++) {
          const pa = (i / 6) * Math.PI * 2 + hsP * 3;
          const pr = hsR * 0.4;
          const px = e.x + Math.cos(pa) * pr;
          const py = e.y + Math.sin(pa) * pr - hsP * 20;
          ctx.globalAlpha = hsAlpha * (1 - hsP) * 0.8;
          vCirc(px, py, 1.5, '#ffdd88', null);
        }
        ctx.restore();
        break;
      }

      case 'castleDebris': {
        // 物理模拟：重力抛射碎片
        e.vy += 400 * (1/60); // 重力
        e.x += e.vx * (1/60);
        e.y += e.vy * (1/60);
        e.rotation += e.rotSpeed * (1/60);
        ctx.save();
        ctx.globalAlpha = Math.min(1, e.timer);
        ctx.translate(e.x, e.y);
        ctx.rotate(e.rotation);
        ctx.fillStyle = e.color;
        ctx.shadowColor = '#ff6622';
        ctx.shadowBlur = 4;
        ctx.fillRect(-e.size/2, -e.size/2, e.size, e.size * 0.6);
        ctx.shadowBlur = 0;
        // 裂纹
        ctx.strokeStyle = 'rgba(0,0,0,0.4)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(-e.size/3, 0);
        ctx.lineTo(e.size/3, -e.size/4);
        ctx.stroke();
        ctx.restore();
        break;
      }

      case 'castleSmoke': {
        e.x += e.vx * (1/60);
        e.y += e.vy * (1/60);
        e.size += 15 * (1/60);
        e.alpha -= 0.3 * (1/60);
        ctx.save();
        ctx.globalAlpha = Math.max(0, e.alpha * Math.min(1, e.timer));
        const smokeGrd = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.size);
        smokeGrd.addColorStop(0, 'rgba(80,60,40,0.6)');
        smokeGrd.addColorStop(0.5, 'rgba(60,40,30,0.3)');
        smokeGrd.addColorStop(1, 'rgba(40,30,20,0)');
        ctx.fillStyle = smokeGrd;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
        ctx.fill();
        // 火光
        if (e.timer > 1) {
          ctx.globalAlpha = Math.max(0, (e.timer - 1) * 0.3);
          const fireGrd = ctx.createRadialGradient(e.x, e.y + 5, 0, e.x, e.y + 5, e.size * 0.4);
          fireGrd.addColorStop(0, 'rgba(255,120,20,0.6)');
          fireGrd.addColorStop(1, 'rgba(255,80,10,0)');
          ctx.fillStyle = fireGrd;
          ctx.beginPath();
          ctx.arc(e.x, e.y + 5, e.size * 0.4, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
        break;
      }
    }
  }
}

function drawBattleUI(b) {
  // ── Top bar: frosted glass ──
  drawGlass(0, 0, W, 42, { alpha: 0.6, radius: 0, border: 'rgba(200,168,78,0.2)', glow: 'rgba(200,168,78,0.08)' });

  // Back button (same position/style as level select)
  drawGlassBtn(14, 7, 65, 28, { alpha: 0.4, color: 'rgba(80,80,80,0.2)', border: 'rgba(150,150,150,0.3)' });
  drawGlassText('← 返回', 46, 26, { font: '14px "Noto Sans SC", Arial, sans-serif', color: '#ccc', align: 'center' });

  // Timer — 倒计时 (right of back button)
  const remain = Math.max(0, b.maxTime - b.time);
  const rMins = Math.floor(remain / 60);
  const rSecs = Math.floor(remain % 60);
  const timerColor = remain <= 60 ? '#ff4444' : remain <= 120 ? '#ffaa44' : 'rgba(255,255,255,0.8)';
  const timerPrefix = remain <= 60 ? '⚠ ' : '⏱ ';
  drawGlassText(`${timerPrefix}${rMins}:${rSecs.toString().padStart(2, '0')}`, 95, 27, { font: '14px Consolas, monospace', color: timerColor, align: 'left' });

  // Pause/Start button (right of timer)
  const pauseBtnX = 170, pauseBtnY = 7, pauseBtnW = 55, pauseBtnH = 28;
  const pauseColor = b.paused ? 'rgba(68,180,68,0.35)' : 'rgba(200,160,60,0.3)';
  const pauseBorder = b.paused ? 'rgba(100,220,100,0.5)' : 'rgba(220,180,80,0.4)';
  drawGlassBtn(pauseBtnX, pauseBtnY, pauseBtnW, pauseBtnH, { color: pauseColor, border: pauseBorder });
  drawGlassText(b.paused ? '▶ 开始' : '⏸ 暂停', pauseBtnX + pauseBtnW / 2, pauseBtnY + 19, {
    font: 'bold 14px "Noto Sans SC", Arial, sans-serif', color: b.paused ? '#88ee88' : '#ddcc88', align: 'center'
  });

  // Speed button (right of pause button)
  const spdBtnX = pauseBtnX + pauseBtnW + 8, spdBtnY = 7, spdBtnW = 64, spdBtnH = 28;
  const spdColors = { 1: 'rgba(100,140,200,0.3)', 2: 'rgba(200,160,60,0.35)', 3: 'rgba(200,80,60,0.35)' };
  const spdBorders = { 1: 'rgba(120,160,220,0.4)', 2: 'rgba(220,180,80,0.5)', 3: 'rgba(220,100,80,0.5)' };
  const spdTextColors = { 1: '#88aaee', 2: '#ddcc88', 3: '#ee8866' };
  drawGlassBtn(spdBtnX, spdBtnY, spdBtnW, spdBtnH, { color: spdColors[b.speedMult], border: spdBorders[b.speedMult] });
  drawGlassText(`倍速×${b.speedMult}`, spdBtnX + spdBtnW / 2, spdBtnY + 19, {
    font: 'bold 14px "Noto Sans SC", Arial, sans-serif', color: spdTextColors[b.speedMult], align: 'center'
  });

  // Volume button (right of speed button)
  const volBtnX = spdBtnX + spdBtnW + 8, volBtnY = 7, volBtnW = 72, volBtnH = 28;
  const volBtnColor = battleVolPanel ? 'rgba(160,120,200,0.4)' : 'rgba(100,100,160,0.3)';
  const volBtnBorder = battleVolPanel ? 'rgba(180,140,220,0.6)' : 'rgba(140,140,200,0.4)';
  drawGlassBtn(volBtnX, volBtnY, volBtnW, volBtnH, { color: volBtnColor, border: volBtnBorder });
  drawGlassText('📢 音量', volBtnX + volBtnW / 2, volBtnY + 19, {
    font: 'bold 14px "Noto Sans SC", Arial, sans-serif', color: battleVolPanel ? '#ccaaff' : '#aaaacc', align: 'center'
  });

  // Volume settings panel (below volume button)
  if (battleVolPanel) {
    const pvW = 340, pvH = 180;
    const pvX = volBtnX, pvY = volBtnY + volBtnH + 4;
    drawGlass(pvX, pvY, pvW, pvH, { alpha: 0.75, glow: 'rgba(160,120,200,0.15)', border: 'rgba(160,120,200,0.3)' });

    // Panel slider layout
    const pvSliderX = pvX + 90;
    const pvSliderW = 180;
    const pvSliderH = 5;
    const pvHandleW = 14;
    const pvHandleH = 18;

    // Music slider
    const pvMusicY = pvY + 40;
    drawGlassText('🎵 音乐', pvX + 16, pvMusicY + 5, { font: 'bold 14px "Noto Sans SC", sans-serif', color: '#ddbb88', align: 'left' });
    if (musicVolume === 0) drawMuteIcon(pvX + 31, pvMusicY + 1);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    roundRect(ctx, pvSliderX, pvMusicY, pvSliderW, pvSliderH, 3);
    ctx.fill();
    const pvMusicFillW = (musicVolume / 100) * pvSliderW;
    const pvMusicGrd = ctx.createLinearGradient(pvSliderX, pvMusicY, pvSliderX + pvMusicFillW, pvMusicY);
    pvMusicGrd.addColorStop(0, '#aa66cc');
    pvMusicGrd.addColorStop(1, '#dd88ff');
    ctx.fillStyle = pvMusicGrd;
    roundRect(ctx, pvSliderX, pvMusicY, pvMusicFillW, pvSliderH, 3);
    ctx.fill();
    ctx.fillStyle = '#ddaaff';
    ctx.shadowColor = '#aa66cc';
    ctx.shadowBlur = 6;
    roundRect(ctx, pvSliderX + pvMusicFillW - pvHandleW / 2, pvMusicY - (pvHandleH - pvSliderH) / 2, pvHandleW, pvHandleH, 3);
    ctx.fill();
    ctx.shadowBlur = 0;
    drawGlassText(String(musicVolume), pvSliderX + pvSliderW + 14, pvMusicY + 5, { font: 'bold 14px Consolas, monospace', color: '#ddaaff', align: 'left' });

    // SFX slider
    const pvSfxY = pvY + 110;
    drawGlassText('🔊 音效', pvX + 16, pvSfxY + 5, { font: 'bold 14px "Noto Sans SC", sans-serif', color: '#88bbdd', align: 'left' });
    if (sfxVolume === 0) drawMuteIcon(pvX + 31, pvSfxY + 1);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    roundRect(ctx, pvSliderX, pvSfxY, pvSliderW, pvSliderH, 3);
    ctx.fill();
    const pvSfxFillW = (sfxVolume / 100) * pvSliderW;
    const pvSfxGrd = ctx.createLinearGradient(pvSliderX, pvSfxY, pvSliderX + pvSfxFillW, pvSfxY);
    pvSfxGrd.addColorStop(0, '#4488cc');
    pvSfxGrd.addColorStop(1, '#66bbff');
    ctx.fillStyle = pvSfxGrd;
    roundRect(ctx, pvSliderX, pvSfxY, pvSfxFillW, pvSliderH, 3);
    ctx.fill();
    ctx.fillStyle = '#88ddff';
    ctx.shadowColor = '#4488cc';
    ctx.shadowBlur = 6;
    roundRect(ctx, pvSliderX + pvSfxFillW - pvHandleW / 2, pvSfxY - (pvHandleH - pvSliderH) / 2, pvHandleW, pvHandleH, 3);
    ctx.fill();
    ctx.shadowBlur = 0;
    drawGlassText(String(sfxVolume), pvSliderX + pvSliderW + 14, pvSfxY + 5, { font: 'bold 14px Consolas, monospace', color: '#88ddff', align: 'left' });

    // Handle dragging in battle volume panel
    if (settingsDragging) {
      const pvSliderLeft = pvSliderX;
      const pvSliderRight = pvSliderX + pvSliderW;
      const clampMx = Math.max(pvSliderLeft, Math.min(pvSliderRight, mouseX));
      const val = Math.round(((clampMx - pvSliderLeft) / pvSliderW) * 100);
      if (settingsDragging === 'music') {
        musicVolume = val;
      } else if (settingsDragging === 'sfx') {
        sfxVolume = val;
      }
      saveVolumeSettings();
      syncBgmVolume();
    }
  }

  // Level name + difficulty (center)
  const diffNames = { normal: '普通', hard: '困难', nightmare: '噩梦' };
  const diffKey = b.level.difficulty;
  const diffColor = diffKey === 'normal' ? '#44cc44' : diffKey === 'hard' ? '#cccc44' : '#cc4444';
  const levelText = `${b.level.id} · ${b.level.name}`;
  const diffText = ` 【${diffNames[diffKey] || diffKey}】`;
  ctx.font = 'bold 14px "Noto Sans SC", Arial, sans-serif';
  const levelTextW = ctx.measureText(levelText).width;
  const diffTextW = ctx.measureText(diffText).width;
  const totalW = levelTextW + diffTextW;
  const centerX = W / 2;
  drawGlassText(levelText, centerX - diffTextW / 2, 27, { font: 'bold 14px "Noto Sans SC", Arial, sans-serif', color: '#c8a84e', align: 'center' });
  drawGlassText(diffText, centerX + levelTextW / 2, 27, { font: 'bold 14px "Noto Sans SC", Arial, sans-serif', color: diffColor, align: 'center' });



  // Paused overlay
  if (b.paused) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
    ctx.fillRect(0, 42, W, 513);
    ctx.save();
    ctx.shadowColor = 'rgba(200,168,78,0.5)';
    ctx.shadowBlur = 20;
    drawGlassText('⏸ 已暂停', W / 2, 300, { font: 'bold 42px "Noto Serif SC", serif', color: '#c8a84e', align: 'center' });
    ctx.restore();
    drawGlassText('点击 ▶ 开始 继续战斗', W / 2, 340, { font: '15px "Noto Sans SC", Arial, sans-serif', color: 'rgba(255,255,255,0.5)', align: 'center' });
  }

  // ── Boss HP Bar ──
  if (b.boss && !b.bossDefeated) {
    const boss = b.boss;
    const bu = boss.unit;
    const hpRatio = Math.max(0, bu.hp / boss.maxHp);

    // Boss HP bar dimensions
    const barW = 400, barH = 20;
    const barX = (W - barW) / 2;
    const barY = 48;

    // Background
    drawGlass(barX - 10, barY - 8, barW + 20, barH + 24, { alpha: 0.8, radius: 8, border: boss.type.color + '88', glow: boss.type.color + '22' });

    // Boss name & phase
    const phaseText = boss.phase === 3 ? ' [最终阶段]' : boss.phase === 2 ? ' [激怒]' : '';
    drawGlassText(`${boss.type.icon} ${boss.type.name}${phaseText}`, W / 2, barY + 4, {
      font: 'bold 14px "Noto Sans SC", sans-serif', color: boss.type.color, align: 'center'
    });

    // HP bar background
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    roundRect(ctx, barX, barY + 10, barW, barH, 4);
    ctx.fill();

    // HP bar fill with gradient
    const hpGrd = ctx.createLinearGradient(barX, 0, barX + barW * hpRatio, 0);
    hpGrd.addColorStop(0, boss.type.color);
    hpGrd.addColorStop(1, hpRatio > 0.3 ? '#ff6644' : '#ff2222');
    ctx.fillStyle = hpGrd;
    roundRect(ctx, barX, barY + 10, barW * hpRatio, barH, 4);
    ctx.fill();

    // HP bar border
    ctx.strokeStyle = boss.type.color;
    ctx.lineWidth = 1.5;
    roundRect(ctx, barX, barY + 10, barW, barH, 4);
    ctx.stroke();

    // HP text
    const hpText = `${Math.ceil(bu.hp)} / ${boss.maxHp}`;
    drawGlassText(hpText, W / 2, barY + 24, {
      font: '12px Consolas, monospace', color: 'rgba(255,255,255,0.9)', align: 'center'
    });

    // Phase indicators (dots)
    for (let i = 1; i <= 3; i++) {
      const dotX = barX + barW + 15;
      const dotY = barY + 8 + (i - 1) * 8;
      const active = boss.phase >= i;
      ctx.fillStyle = active ? boss.type.color : 'rgba(255,255,255,0.2)';
      ctx.beginPath();
      ctx.arc(dotX, dotY, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    // Ability glow effect on boss
    if (boss.abilityGlow > 0) {
      const glowAlpha = Math.min(boss.abilityGlow * 0.4, 0.6);
      ctx.save();
      ctx.globalAlpha = glowAlpha;
      ctx.fillStyle = boss.type.color;
      ctx.beginPath();
      const bx = boss.unit.x, by = boss.unit.y - 20;
      ctx.arc(bx, by, 40, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // Ash Brand fire shield visual
    if (boss.ashBrand > 0) {
      const bx = boss.unit.x, by = boss.unit.y - 20;
      const t = animFrame * 0.1;
      ctx.save();
      // Pulsing fire ring
      const pulse = 0.6 + Math.sin(t * 4) * 0.2;
      ctx.globalAlpha = pulse * 0.5;
      ctx.strokeStyle = '#ff4400';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(bx, by, 45 + Math.sin(t * 3) * 5, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = pulse * 0.3;
      ctx.strokeStyle = '#ff8800';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(bx, by, 50 + Math.cos(t * 5) * 4, 0, Math.PI * 2);
      ctx.stroke();
      // Fire particles rising from boss
      for (let i = 0; i < 5; i++) {
        const px = bx + Math.sin(t * 2 + i * 1.3) * 30;
        const py = by - 20 - ((t * 40 + i * 17) % 50);
        const pa = 1 - ((t * 40 + i * 17) % 50) / 50;
        ctx.globalAlpha = pa * 0.7;
        ctx.fillStyle = i % 2 === 0 ? '#ff4400' : '#ffaa00';
        ctx.beginPath();
        ctx.arc(px, py, 2 + Math.random(), 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
  }

  // ── Bottom bar: frosted glass ──
  drawGlass(0, 555, W, 165, { alpha: 0.65, radius: 0, border: 'rgba(200,168,78,0.15)' });

  // Resources
  // Rolling counter interpolation
  displayGold = lerp(displayGold, b.gold, 0.08);
  displayMana = lerp(displayMana, b.mana, 0.1);
  if (b.mana >= b.maxMana) displayMana = b.maxMana;
  drawGlassText(`💰 ${Math.floor(displayGold)}`, 14, 583, { font: 'bold 15px "Noto Sans SC", sans-serif', color: '#ffcc00' });
  drawGlassText(`🔮 ${Math.floor(displayMana)}/${b.maxMana}`, 125, 583, { font: 'bold 15px "Noto Sans SC", sans-serif', color: '#4488ff' });
  drawGlassText(`+${b.goldPerSec.toFixed(1)}/s`, 14, 599, { font: '14px "Noto Sans SC", sans-serif', color: 'rgba(255,255,255,0.4)', shadow: false });

  // Training queue with progress bars
  if (b.trainQueue.length > 0) {
    let tqY = 613;
    for (const q of b.trainQueue) {
      const ut = UNIT_TYPES[q.type];
      const progress = 1 - q.timer / q.totalTime;
      const remainS = Math.ceil(q.timer);
      drawGlassText(`${ut.icon}${ut.name}`, 14, tqY, { font: '14px "Noto Sans SC", sans-serif', color: 'rgba(255,255,255,0.6)', shadow: false });
      // Progress bar background
      ctx.fillStyle = 'rgba(255,255,255,0.1)';
      ctx.fillRect(75, tqY - 8, 80, 8);
      // Progress bar fill
      const grd = ctx.createLinearGradient(75, 0, 75 + 80 * progress, 0);
      grd.addColorStop(0, 'rgba(200,168,78,0.6)');
      grd.addColorStop(1, 'rgba(200,168,78,0.9)');
      ctx.fillStyle = grd;
      ctx.fillRect(75, tqY - 8, 80 * progress, 8);
      // Time remaining
      drawGlassText(`${remainS}s`, 162, tqY, { font: '14px "Noto Sans SC", sans-serif', color: 'rgba(255,255,255,0.4)', shadow: false });
      tqY += 14;
    }
  }

  // Unit buttons — shifted right to leave room for training queue
  const unitKeys = Object.keys(UNIT_TYPES);
  const btnW = 80, btnH = 55;
  const startX = 200;
  const btnY = 625;

  for (let i = 0; i < unitKeys.length; i++) {
    const key = unitKeys[i];
    const ut = UNIT_TYPES[key];
    const bx = startX + i * (btnW + 5);
    const unlocked = saveData.unlockedUnits.includes(key);
    const canAfford = b.gold >= ut.gold;
    const isUpgraded = b.unitUpgrades[key];

    if (unlocked) {
      drawGlassBtn(bx, btnY, btnW, btnH, {
        alpha: canAfford ? 0.4 : 0.55,
        color: canAfford ? 'rgba(100,160,200,0.15)' : 'rgba(80,40,40,0.15)',
        border: isUpgraded ? (isUpgraded === 'A' ? 'rgba(68,136,255,0.6)' : 'rgba(255,68,68,0.6)') : (canAfford ? 'rgba(200,168,78,0.3)' : 'rgba(100,80,80,0.2)')
      });
    } else {
      drawGlassBtn(bx, btnY, btnW, btnH, { alpha: 0.6, color: 'rgba(30,30,30,0.3)', border: 'rgba(60,60,60,0.3)' });
    }

    // Icon & name
    drawGlassText(ut.icon, bx + btnW/2, btnY + 18, { font: '14px "Noto Sans SC", sans-serif', color: unlocked ? '#fff' : '#444', align: 'center' });
    drawGlassText(ut.name, bx + btnW/2, btnY + 32, { font: '14px "Noto Sans SC", sans-serif', color: unlocked ? 'rgba(255,255,255,0.8)' : '#333', align: 'center' });
    drawGlassText(`💰${ut.gold}`, bx + btnW/2, btnY + 45, { font: '14px "Noto Sans SC", sans-serif', color: canAfford ? '#ffcc00' : '#aa6666', align: 'center' });

    if (!unlocked) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(bx + 2, btnY + 2, btnW - 4, btnH - 4);
      drawGlassText('🔒', bx + btnW/2, btnY + 34, { font: '18px "Noto Sans SC", sans-serif', color: '#666', align: 'center' });
    }

    if (isUpgraded) {
      drawGlassText(isUpgraded, bx + btnW - 8, btnY + 12, { font: 'bold 13px "Noto Sans SC", sans-serif', color: isUpgraded === 'A' ? '#4488ff' : '#ff4444' });
    }
  }

  // Spell buttons
  const spellStartX = startX + unitKeys.length * (btnW + 5) + 20;
  for (let i = 0; i < b.availableSpells.length; i++) {
    const spId = b.availableSpells[i];
    const sp = SPELLS.find(s => s.id === spId);
    const bx = spellStartX + i * 70;
    const spBtnW = 65;
    const cdKey = `player_${spId}`;
    const onCd = b[cdKey] > 0;
    const canCast = b.mana >= sp.mana && !onCd;
    const isSelected = selectedSpell === spId;

    drawGlassBtn(bx, btnY, spBtnW, btnH, {
      alpha: isSelected ? 0.35 : canCast ? 0.4 : 0.55,
      color: isSelected ? 'rgba(100,200,60,0.2)' : canCast ? 'rgba(60,100,160,0.15)' : 'rgba(80,40,40,0.15)',
      border: isSelected ? 'rgba(136,255,68,0.6)' : canCast ? 'rgba(100,150,200,0.3)' : 'rgba(100,80,80,0.2)'
    });

    if (onCd) {
      const cdMax = sp.initialCd || sp.cd;
      const cdRatio = Math.min(1, b[cdKey] / cdMax);
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(bx + 2, btnY + 2, spBtnW - 4, (btnH - 4) * cdRatio);
    }

    const nameText = sp.name.length > 4 ? sp.name.substring(0, 4) : sp.name;
    drawGlassText(nameText, bx + spBtnW/2, btnY + 18, { font: '13px "Noto Sans SC", sans-serif', color: isSelected ? '#aaffaa' : 'rgba(255,255,255,0.8)', align: 'center' });
    drawGlassText(`🔮${sp.mana}`, bx + spBtnW/2, btnY + 35, { font: '13px "Noto Sans SC", sans-serif', color: canCast ? '#88aaff' : '#aa6666', align: 'center' });
    if (onCd) {
      drawGlassText(`${Math.ceil(b[cdKey])}s`, bx + spBtnW/2, btnY + 48, { font: '14px "Noto Sans SC", sans-serif', color: '#ff8844', align: 'center' });
    }
  }

  // Function buttons — left-aligned with militia (startX), text aligned with mana row (y=583)
  const funcs = [
    { label: '🏰 城堡', action: 'castle' },
    { label: '⬆ 兵种', action: 'upgrade' },
  ];
  const funcBtnW = 80, funcBtnH = 28, funcGap = 5;
  const funcY = 565;
  for (let i = 0; i < funcs.length; i++) {
    const bx = startX + i * (funcBtnW + funcGap);
    drawGlassBtn(bx, funcY, funcBtnW, funcBtnH, { alpha: 0.45, color: 'rgba(120,100,80,0.15)', border: 'rgba(200,168,78,0.25)' });
    drawGlassText(funcs[i].label, bx + funcBtnW / 2, funcY + 18, { font: '13px "Noto Sans SC", sans-serif', color: 'rgba(255,255,255,0.7)', align: 'center' });
  }
}

// ============================================================
//  MENU / LEVEL SELECT / POPUPS
// ============================================================

function drawOpening() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#080818');
  grad.addColorStop(0.5, '#0d0d28');
  grad.addColorStop(1, '#060612');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Ambient particles
  for (let i = 0; i < 30; i++) {
    const px = (i * 137 + Date.now() * 0.01) % W;
    const py = (i * 89 + Date.now() * 0.005) % H;
    const alpha = 0.15 + Math.sin(Date.now() * 0.002 + i) * 0.1;
    ctx.fillStyle = `rgba(200, 168, 78, ${alpha})`;
    ctx.beginPath();
    ctx.arc(px, py, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Title
  ctx.save();
  ctx.shadowColor = 'rgba(200, 168, 78, 0.5)';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#c8a84e';
  ctx.font = 'bold 52px serif';
  ctx.textAlign = 'center';
  ctx.fillText(OPENING_STORY.title, W/2, 80);
  ctx.restore();

  // Divider line
  ctx.strokeStyle = 'rgba(200, 168, 78, 0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(W/2 - 150, 100);
  ctx.lineTo(W/2 + 150, 100);
  ctx.stroke();

  // Story lines
  const startY = 140;
  const lineH = 28;
  ctx.font = '16px serif';
  ctx.textAlign = 'center';
  for (let i = 0; i < OPENING_STORY.lines.length; i++) {
    const line = OPENING_STORY.lines[i];
    if (!line) continue;
    // Fade in each line with delay
    const delay = i * 120;
    const elapsed = Date.now() - openingAlpha;
    const lineAlpha = Math.min(1, Math.max(0, (elapsed - delay) / 800));
    if (lineAlpha <= 0) continue;
    ctx.globalAlpha = lineAlpha;
    ctx.fillStyle = i >= OPENING_STORY.lines.length - 2 ? '#c8a84e' : 'rgba(255,255,255,0.7)';
    ctx.fillText(line, W/2, startY + i * lineH);
  }
  ctx.globalAlpha = 1;

  // Continue button (only after text has appeared)
  const totalTime = OPENING_STORY.lines.length * 120 + 800;
  if (Date.now() - openingAlpha > totalTime) {
    const pulse = 0.6 + Math.sin(Date.now() * 0.003) * 0.4;
    ctx.globalAlpha = pulse;
    drawGlassText('— 双击鼠标继续 —', W/2, H - 60, { font: '15px "Noto Sans SC", sans-serif', color: 'rgba(200,168,78,0.6)', align: 'center' });
    ctx.globalAlpha = 1;
  }

  // ── Fullscreen Suggestion Popup (on opening screen) ──
  if (showFullscreenSuggest) {
    const fsOverlayAlpha = Math.min(0.6, 0.6);
    ctx.fillStyle = `rgba(0, 0, 10, ${fsOverlayAlpha})`;
    ctx.fillRect(0, 0, W, H);
    const fsVign = ctx.createRadialGradient(W/2, H/2, 100, W/2, H/2, 600);
    fsVign.addColorStop(0, 'rgba(0,0,0,0)');
    fsVign.addColorStop(1, 'rgba(0,0,0,0.4)');
    ctx.fillStyle = fsVign;
    ctx.fillRect(0, 0, W, H);

    const fsPw = 380, fsPh = 200;
    const fsPx = W/2 - fsPw/2, fsPy = H/2 - fsPh/2;
    drawGlass(fsPx, fsPy, fsPw, fsPh, { alpha: 0.5, glow: 'rgba(200,168,78,0.2)' });

    drawGlassText('🖥️ 建议开启全屏', W/2, fsPy + 36, { font: 'bold 20px "Noto Serif SC", serif', color: '#c8a84e', align: 'center' });
    drawGlassText('全屏模式可获得更佳的游戏体验', W/2, fsPy + 72, { font: '14px "Noto Sans SC", sans-serif', color: 'rgba(255,255,255,0.65)', align: 'center' });

function drawLevelIntro() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#080818');
  grad.addColorStop(0.5, '#0d0d28');
  grad.addColorStop(1, '#060612');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  if (!storyLevelId) return;
  const story = LEVEL_STORIES[storyLevelId];
  const level = LEVELS.find(l => l.id === storyLevelId);
  if (!story || !level) return;

  const chapterKey = level.difficulty;
  const chapter = CHAPTER_INTROS[chapterKey];

  // Ambient particles
  for (let i = 0; i < 20; i++) {
    const px = (i * 137 + Date.now() * 0.01) % W;
    const py = (i * 89 + Date.now() * 0.005) % H;
    const alpha = 0.1 + Math.sin(Date.now() * 0.002 + i) * 0.06;
    ctx.fillStyle = `rgba(200, 168, 78, ${alpha})`;
    ctx.beginPath();
    ctx.arc(px, py, 1, 0, Math.PI * 2);
    ctx.fill();
  }

  // Chapter title
  const diffColors = { normal: '#44cc44', hard: '#cccc44', nightmare: '#cc4444' };
  drawGlassText(chapter.title, W/2, 50, { font: 'bold 22px "Noto Serif SC", serif', color: diffColors[chapterKey], align: 'center' });
  drawGlassText(chapter.subtitle, W/2, 78, { font: '14px "Noto Sans SC", sans-serif', color: 'rgba(255,255,255,0.35)', align: 'center' });

  // Level name
  ctx.save();
  ctx.shadowColor = 'rgba(200, 168, 78, 0.4)';
  ctx.shadowBlur = 20;
  drawGlassText(`${storyLevelId}  ${level.name}`, W/2, 130, { font: 'bold 32px "Noto Serif SC", serif', color: '#c8a84e', align: 'center' });
  ctx.restore();

  // Divider
  ctx.strokeStyle = 'rgba(200, 168, 78, 0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(W/2 - 200, 155);
  ctx.lineTo(W/2 + 200, 155);
  ctx.stroke();

  // Intro text (large, centered)
  const introLines = story.intro.split('\n');
  let y = 195;
  ctx.font = '17px serif';
  ctx.textAlign = 'center';
  for (const line of introLines) {
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.fillText(line, W/2, y);
    y += 30;
  }

  // Detail text (smaller, scrollable area)
  y += 15;
  const detailLines = story.detail.split('\n');
  ctx.font = '14px serif';
  for (const line of detailLines) {
    if (!line) { y += 10; continue; }
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fillText(line, W/2, y);
    y += 24;
  }

  // Hint box
  y += 20;
  drawGlass(W/2 - 250, y, 500, 36, { alpha: 0.25, radius: 8, border: 'rgba(200,168,78,0.15)' });
  drawGlassText(`💡 ${story.hint}`, W/2, y + 23, { font: '14px "Noto Sans SC", sans-serif', color: 'rgba(200,168,78,0.7)', align: 'center' });

  // Boss indicator
  if (level.boss) {
    const bossKey = level.id === '1-5' ? 'boss_ashfang' : level.id === '2-5' ? 'boss_rockcore' : 'boss_darklord';
    const bossInfo = BOSS_TYPES[bossKey];
    if (bossInfo) {
      drawGlassText(`⚔️ BOSS: ${bossInfo.name} — ${bossInfo.title}`, W/2, y + 60, { font: 'bold 14px "Noto Sans SC", sans-serif', color: '#ff4444', align: 'center' });
    } else {
      drawGlassText('⚔️ BOSS战', W/2, y + 60, { font: 'bold 14px "Noto Sans SC", sans-serif', color: '#ff4444', align: 'center' });
    }
  }

  // Start button
  const btnY = H - 70;
  const pulse = 0.7 + Math.sin(Date.now() * 0.003) * 0.3;
  ctx.globalAlpha = pulse;
  drawGlassBtn(W/2 - 80, btnY, 160, 45, { color: 'rgba(68,136,68,0.3)', border: 'rgba(100,180,100,0.5)' });
  drawGlassText('⚔️ 出征', W/2, btnY + 28, { font: 'bold 18px "Noto Sans SC", sans-serif', color: '#aaddaa', align: 'center' });
  ctx.globalAlpha = 1;

  // Back hint
  drawGlassText('← 返回选关', 60, H - 20, { font: '13px "Noto Sans SC", sans-serif', color: 'rgba(255,255,255,0.25)', align: 'center' });
}

let settingsDragging = null; // 'music' or 'sfx' or null

// 绘制静音禁止图标（红色圆圈+斜线）
function drawMuteIcon(cx, cy) {
  const r = 9;
  ctx.save();
  ctx.globalAlpha = 0.9;
  // 红色圆圈
  ctx.strokeStyle = '#ff3333';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.stroke();
  // 斜线（左下到右上）
  ctx.beginPath();
  ctx.moveTo(cx - r * 0.65, cy + r * 0.65);
  ctx.lineTo(cx + r * 0.65, cy - r * 0.65);
  ctx.stroke();
  ctx.restore();
}

function drawSettings() {
  // Back button (top-left, consistent with other screens)
  drawGlassBtn(14, 12, 65, 30, { alpha: 0.4, color: 'rgba(80,80,80,0.2)', border: 'rgba(150,150,150,0.3)' });
  drawGlassText('← 返回', 46, 32, { font: '14px "Noto Sans SC", Arial, sans-serif', color: '#ccc', align: 'center' });

  // Title
  drawGlassText('⚙️ 游戏设置', W/2, 55, { font: 'bold 28px "Noto Serif SC", serif', color: '#c8a84e', align: 'center' });

  // Panel
  const pw = 420, ph = 280;
  const ppx = W/2 - pw/2, ppy = 100;
  drawGlass(ppx, ppy, pw, ph, { alpha: 0.45, glow: 'rgba(200,168,78,0.15)' });

  // ── Slider layout constants ──
  const sliderX = ppx + 100;
  const sliderW = 220;
  const sliderH = 6;
  const handleW = 16;
  const handleH = 22;

  // ── Music slider ──
  const musicY = ppy + 70;
  drawGlassText('🎵 音乐', ppx + 30, musicY + 6, { font: 'bold 16px "Noto Sans SC", sans-serif', color: '#ddbb88', align: 'left' });
  // 静音禁止图标
  if (musicVolume === 0) drawMuteIcon(ppx + 45, musicY + 2);

  // Track
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  roundRect(ctx, sliderX, musicY, sliderW, sliderH, 3);
  ctx.fill();
  // Filled portion
  const musicFillW = (musicVolume / 100) * sliderW;
  const musicGrd = ctx.createLinearGradient(sliderX, musicY, sliderX + musicFillW, musicY);
  musicGrd.addColorStop(0, '#aa66cc');
  musicGrd.addColorStop(1, '#dd88ff');
  ctx.fillStyle = musicGrd;
  roundRect(ctx, sliderX, musicY, musicFillW, sliderH, 3);
  ctx.fill();
  // Handle
  const musicHandleX = sliderX + musicFillW - handleW/2;
  ctx.fillStyle = '#ddaaff';
  ctx.shadowColor = '#aa66cc';
  ctx.shadowBlur = 8;
  roundRect(ctx, musicHandleX, musicY - (handleH - sliderH)/2, handleW, handleH, 3);
  ctx.fill();
  ctx.shadowBlur = 0;
  // Value text
  drawGlassText(String(musicVolume), sliderX + sliderW + 20, musicY + 6, { font: 'bold 16px Consolas, monospace', color: '#ddaaff', align: 'left' });

  // ── SFX slider ──
  const sfxY = ppy + 160;
  drawGlassText('🔊 音效', ppx + 30, sfxY + 6, { font: 'bold 16px "Noto Sans SC", sans-serif', color: '#88bbdd', align: 'left' });
  // 静音禁止图标
  if (sfxVolume === 0) drawMuteIcon(ppx + 45, sfxY + 2);

  // Track
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  roundRect(ctx, sliderX, sfxY, sliderW, sliderH, 3);
  ctx.fill();
  // Filled portion
  const sfxFillW = (sfxVolume / 100) * sliderW;
  const sfxGrd = ctx.createLinearGradient(sliderX, sfxY, sliderX + sfxFillW, sfxY);
  sfxGrd.addColorStop(0, '#4488cc');
  sfxGrd.addColorStop(1, '#66bbff');
  ctx.fillStyle = sfxGrd;
  roundRect(ctx, sliderX, sfxY, sfxFillW, sliderH, 3);
  ctx.fill();
  // Handle
  const sfxHandleX = sliderX + sfxFillW - handleW/2;
  ctx.fillStyle = '#88ddff';
  ctx.shadowColor = '#4488cc';
  ctx.shadowBlur = 8;
  roundRect(ctx, sfxHandleX, sfxY - (handleH - sliderH)/2, handleW, handleH, 3);
  ctx.fill();
  ctx.shadowBlur = 0;
  // Value text
  drawGlassText(String(sfxVolume), sliderX + sliderW + 20, sfxY + 6, { font: 'bold 16px Consolas, monospace', color: '#88ddff', align: 'left' });

  // Handle dragging
  if (settingsDragging) {
    const sliderLeft = sliderX;
    const sliderRight = sliderX + sliderW;
    const mx = Math.max(sliderLeft, Math.min(sliderRight, mouseX));
    const val = Math.round(((mx - sliderLeft) / sliderW) * 100);
    if (settingsDragging === 'music') {
      musicVolume = val;
    } else if (settingsDragging === 'sfx') {
      sfxVolume = val;
    }
    saveVolumeSettings();
    syncBgmVolume();
  }
}

  drawGlassText('▼', W/2, H - 8, { font: '14px "Noto Sans SC", sans-serif', color: 'rgba(255,255,255,0.25)', align: 'center', shadow: false });

  // Content area with clipping
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 72, W, H - 92);
  ctx.clip();

  const margin = 30;
  const gap = 14;
  const colW = (W - margin * 2 - gap * 2) / 3;
  const lx = margin;
  const mx = margin + colW + gap;
  const rx = margin + (colW + gap) * 2;

  function drawCard(x, yy, w, h, borderColor) {
    drawGlass(x, yy, w, h, { alpha: 0.45, radius: 8, border: borderColor || 'rgba(200,168,78,0.15)' });
  }

  function drawCardTitle(title, x, yy) {
    ctx.fillStyle = '#c8a84e';
    ctx.font = 'bold 16px "Noto Sans SC", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(title, x, yy);
    return yy + 24;
  }

  function drawLine(text, x, yy, color, size) {
    ctx.fillStyle = color || '#ccc';
    ctx.font = (size || '14px') + ' "Noto Sans SC", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(text, x, yy);
    return yy + 21;
  }

  function drawCounter(from, arrow, to, note, x, yy) {
    ctx.fillStyle = '#88cc88';
    ctx.font = '13px "Noto Sans SC", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(`${from} ${arrow} ${to}`, x, yy);
    if (note) {
      ctx.fillStyle = '#888';
      ctx.font = '13px "Noto Sans SC", sans-serif';
      ctx.fillText(`(${note})`, x + 190, yy);
    }
    return yy + 20;
  }

  // Helper: draw a gold coin icon (oval)
  function drawCoinIcon(cx, cy, size) {
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(cx, cy, size * 0.7, size, 0, 0, Math.PI * 2);
    const coinGrad = ctx.createRadialGradient(cx - size * 0.2, cy - size * 0.3, 0, cx, cy, size);
    coinGrad.addColorStop(0, '#ffe680');
    coinGrad.addColorStop(0.6, '#ddaa00');
    coinGrad.addColorStop(1, '#aa7700');
    ctx.fillStyle = coinGrad;
    ctx.fill();
    ctx.strokeStyle = '#cc9900';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Inner ring
    ctx.beginPath();
    ctx.ellipse(cx, cy, size * 0.45, size * 0.65, 0, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,230,130,0.5)';
    ctx.lineWidth = 0.8;
    ctx.stroke();
    ctx.restore();
  }

function drawLevelSelect() {
  // Header glass bar
  drawGlass(0, 0, W, 55, { alpha: 0.5, radius: 0, border: 'rgba(200,168,78,0.15)' });
  drawGlassText('选 择 关 卡', W/2, 36, { font: 'bold 28px "Noto Serif SC", serif', color: '#c8a84e', align: 'center' });
  drawGoldLabel(`黄金 ${saveData.gold}`, W - 20, 36, { font: '14px "Noto Sans SC", sans-serif', color: '#ffcc00', align: 'right', iconSize: 12 });

  drawGlassBtn(14, 12, 65, 30, { alpha: 0.4, color: 'rgba(80,80,80,0.2)', border: 'rgba(150,150,150,0.3)' });
  drawGlassText('← 返回', 46, 32, { font: '14px "Noto Sans SC", sans-serif', color: '#ccc', align: 'center' });

  const difficulties = [
    { key: 'normal', name: '普通难度 · 收复边境', color: '#44cc44', prefix: '1' },
    { key: 'hard', name: '困难难度 · 攻入腹地', color: '#cccc44', prefix: '2', req: '1-5' },
    { key: 'nightmare', name: '噩梦难度 · 最终决战', color: '#cc4444', prefix: '3', req: '2-5' }
  ];

  let yPos = 75;
  for (const diff of difficulties) {
    const unlocked = !diff.req || saveData.unlockedLevels.includes(diff.req);

    drawGlassText(`★ ${diff.name}`, 40, yPos, { font: 'bold 17px "Noto Sans SC", sans-serif', color: diff.color });
    if (!unlocked) {
      drawGlassText(`(需通关 ${diff.req} 解锁)`, 300, yPos, { font: '13px "Noto Sans SC", sans-serif', color: 'rgba(255,255,255,0.3)' });
    }

    yPos += 15;
    const levels = LEVELS.filter(l => l.id.startsWith(diff.prefix + '-'));

    for (const lvl of levels) {
      const lvUnlocked = saveData.unlockedLevels.includes(lvl.id);
      const stars = saveData.stars[lvl.id] || 0;
      const lx = 40 + (parseInt(lvl.id.split('-')[1]) - 1) * 230;
      const ly = yPos;

      drawGlass(lx, ly, 210, 70, {
        alpha: lvUnlocked ? 0.35 : 0.55,
        radius: 10,
        border: lvUnlocked ? diff.color.replace(')', ',0.4)').replace('#', 'rgba(').replace(/([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})/, (m,r,g,b) => `${parseInt(r,16)},${parseInt(g,16)},${parseInt(b,16)}`) : 'rgba(60,60,60,0.3)'
      });

      // Simplified border color for unlocked
      if (lvUnlocked) {
        ctx.strokeStyle = diff.color;
        ctx.globalAlpha = 0.4;
        ctx.strokeRect(lx, ly, 210, 70);
        ctx.globalAlpha = 1;
      }

      drawGlassText(lvUnlocked ? `${lvl.id} ${lvl.name}` : `${lvl.id} 🔒`, lx + 12, ly + 25, { font: '13px "Noto Sans SC", sans-serif', color: lvUnlocked ? '#eee' : '#444' });

      if (stars > 0) {
        drawGlassText('★'.repeat(stars) + '☆'.repeat(3 - stars), lx + 12, ly + 50, { font: '13px "Noto Sans SC", sans-serif', color: '#ffcc00' });
      }

      if (lvl.boss) {
        const bossKey = lvl.id === '1-5' ? 'boss_ashfang' : lvl.id === '2-5' ? 'boss_rockcore' : 'boss_darklord';
        const bossName = BOSS_TYPES[bossKey] ? BOSS_TYPES[bossKey].name : 'BOSS';
        drawGlassText(`💀 ${bossName}`, lx + 198, ly + 16, { font: 'bold 13px "Noto Sans SC", sans-serif', color: '#ff4444', align: 'right' });
      }

      const terrainNames = {
        none: '', river: '河流', forest: '树林', bridge: '窄桥', mine: '矿点',
        fireTrap: '火焰陷阱', rockfall: '落石', wind: '风向', subTower: '副塔',
        dualMine: '双矿', fog: '视野', volcano: '火山', darkForest: '暗林',
        poison: '毒雾', final: '综合'
      };
      drawGlassText(terrainNames[lvl.terrain] || '', lx + 198, ly + 50, { font: '14px "Noto Sans SC", sans-serif', color: 'rgba(255,255,255,0.3)', align: 'right' });
    }

    yPos += 90;
  }

  // Blacksmith button
  drawGlassBtn(W/2 - 80, H - 55, 160, 38, { color: 'rgba(136,100,68,0.25)', border: 'rgba(200,160,80,0.4)' });
  drawGlassText('🔧 锻灵工坊', W/2, H - 32, { font: '13px "Noto Sans SC", sans-serif', color: '#ddbb88', align: 'center' });
}

function drawPopup(b) {
  if (!popupPanel) return;

  // Overlay with subtle blur effect
  const overlayAlpha = Math.min(0.6, (Date.now() - popupAnimStart) / 200 * 0.6);
  ctx.fillStyle = `rgba(0, 0, 10, ${overlayAlpha})`;
  ctx.fillRect(0, 0, W, H);
  // Vignette
  const vign = ctx.createRadialGradient(W/2, H/2, 100, W/2, H/2, 600);
  vign.addColorStop(0, 'rgba(0,0,0,0)');
  vign.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = vign;
  ctx.fillRect(0, 0, W, H);

  // Slide-in animation
  const animDur = 350;
  const animT = Math.min(1, (Date.now() - popupAnimStart) / animDur);
  const animEase = easeOutCubic(animT);
  const slideOffset = (1 - animEase) * 50;
  const popupAlpha = 0.5 + animEase * 0.5;
  ctx.save();
  ctx.globalAlpha = popupAlpha;
  ctx.translate(0, slideOffset);

  if (popupPanel === 'castle') {
    const pw = 520, ph = 440;
    const px = W/2 - pw/2, py = H/2 - ph/2;

    drawGlass(px, py, pw, ph, { alpha: 0.5, glow: 'rgba(200,168,78,0.2)' });
    drawGlassText('城 堡 管 理', W/2, py + 30, { font: 'bold 20px "Noto Serif SC", serif', color: '#c8a84e', align: 'center' });

    const modules = ['wall', 'tower', 'goldGen', 'manaGen'];
    const modIcons = ['🛡️', '🏹', '💰', '🔮'];
    for (let i = 0; i < modules.length; i++) {
      const mod = modules[i];
      const cm = CASTLE_MODULES[mod];
      const lv = b.playerCastle.modules[mod];
      const y = py + 55 + i * 70;

      drawGlass(px + 15, y, pw - 30, 60, { alpha: 0.35, radius: 8, border: 'rgba(255,255,255,0.08)' });

      drawGlassText(`${modIcons[i]} ${cm.name}`, px + 30, y + 22, { font: '13px "Noto Sans SC", sans-serif', color: '#ddd' });
      drawGlassText(`Lv.${lv + 1}  (${cm.values[lv]})`, px + 30, y + 42, { font: '13px "Noto Sans SC", sans-serif', color: 'rgba(255,255,255,0.5)' });

      // Level bar with glow
      for (let l = 0; l < 5; l++) {
        const barColor = l <= lv ? '#44cc44' : 'rgba(255,255,255,0.08)';
        ctx.fillStyle = barColor;
        ctx.fillRect(px + 170 + l * 28, y + 16, 20, 8);
        if (l <= lv) {
          ctx.shadowColor = '#44cc44';
          ctx.shadowBlur = 4;
          ctx.fillRect(px + 170 + l * 28, y + 16, 20, 8);
          ctx.shadowBlur = 0;
        }
      }

      // Upgrade button
      if (lv < 4) {
        const cost = cm.costs[lv + 1];
        const canAfford = b.gold >= cost;

        drawGlassBtn(bx, y + 12, 105, 36, {
          color: canAfford ? 'rgba(68,136,68,0.25)' : 'rgba(50,50,50,0.2)',
